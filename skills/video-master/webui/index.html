<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Master 节点式分镜预览编辑器</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #070a0f;
      --panel: #101722;
      --panel-2: #141d2a;
      --panel-3: #1a2535;
      --ink: #f4f7fb;
      --muted: #9aa6b8;
      --faint: #647184;
      --line: #263247;
      --line-bright: #4d5f79;
      --blue: #5b8cff;
      --cyan: #3dd6d0;
      --green: #4ade80;
      --amber: #f8b84e;
      --rose: #fb7185;
      --violet: #a78bfa;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      --glow-blue: 0 0 0 1px rgba(91, 140, 255, 0.55), 0 0 34px rgba(91, 140, 255, 0.28);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at 20% 15%, rgba(91, 140, 255, 0.12), transparent 28%),
        radial-gradient(circle at 78% 10%, rgba(61, 214, 208, 0.09), transparent 26%),
        var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(16, 23, 34, 0.92);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover,
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      border-color: var(--blue);
      outline: 3px solid rgba(91, 140, 255, 0.16);
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #03060b;
      transition: opacity 360ms ease, visibility 360ms ease;
    }

    .intro.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-video,
    .intro-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.72;
      transform: scale(1.02);
    }

    .intro-image {
      background:
        linear-gradient(110deg, rgba(6, 10, 18, 0.28), rgba(6, 10, 18, 0.78)),
        var(--intro-image, linear-gradient(135deg, rgba(91, 140, 255, 0.28), rgba(61, 214, 208, 0.18)));
      background-size: cover;
      background-position: center;
    }

    .intro-fallback {
      position: absolute;
      inset: 0;
      opacity: 0;
      background:
        linear-gradient(120deg, rgba(91, 140, 255, 0.20), transparent 35%),
        linear-gradient(310deg, rgba(61, 214, 208, 0.16), transparent 42%),
        radial-gradient(circle at 30% 52%, rgba(255, 255, 255, 0.12), transparent 18%),
        #060a12;
      transition: opacity 260ms ease;
    }

    .intro-fallback.visible {
      opacity: 1;
    }

    .intro-fallback::before,
    .intro-fallback::after {
      content: "";
      position: absolute;
      width: 42vw;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(125, 165, 255, 0.35);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(91, 140, 255, 0.22), rgba(61, 214, 208, 0.12)),
        rgba(12, 18, 27, 0.78);
      box-shadow: 0 30px 110px rgba(0, 0, 0, 0.35);
      animation: introDrift 12s ease-in-out infinite alternate;
    }

    .intro-fallback::before {
      left: 8vw;
      top: 18vh;
    }

    .intro-fallback::after {
      right: 7vw;
      bottom: 14vh;
      animation-delay: -4s;
    }

    @keyframes introDrift {
      from {
        transform: translate3d(-1.4vw, 0, 0) scale(1);
      }
      to {
        transform: translate3d(1.6vw, -1.1vh, 0) scale(1.035);
      }
    }

    .intro-scrim {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(3, 6, 11, 0.78) 0%, rgba(3, 6, 11, 0.38) 52%, rgba(3, 6, 11, 0.72) 100%),
        linear-gradient(0deg, rgba(3, 6, 11, 0.92) 0%, transparent 38%, rgba(3, 6, 11, 0.38) 100%);
    }

    .intro-copy {
      position: relative;
      width: min(1080px, calc(100vw - 56px));
      display: grid;
      gap: 18px;
      justify-items: start;
      padding-top: 8vh;
      transform: translate(-7vw, 8vh);
    }

    .intro-kicker {
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .intro-title {
      margin: 0;
      max-width: 780px;
      color: #fff;
      font-size: clamp(38px, 6.4vw, 92px);
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 18px 70px rgba(0, 0, 0, 0.58);
    }

    .intro-subtitle {
      max-width: 560px;
      margin: 0;
      color: rgba(244, 247, 251, 0.78);
      font-size: clamp(15px, 1.35vw, 20px);
      line-height: 1.62;
    }

    .intro-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .intro-button {
      min-width: 134px;
      height: 44px;
      padding: 0 16px;
      border-color: rgba(125, 165, 255, 0.58);
      background: rgba(11, 16, 24, 0.58);
      backdrop-filter: blur(16px);
      font-weight: 800;
    }

    .intro-button.primary {
      color: #071018;
      background: linear-gradient(135deg, #e8f6ff, #74f7ee 44%, #6a91ff);
      border-color: transparent;
    }

    .app {
      display: grid;
      grid-template-columns: 72px 300px minmax(520px, 1fr) 380px;
      grid-template-rows: 68px minmax(0, 1fr);
      width: 100vw;
      height: 100vh;
    }

    .app.side-hidden {
      grid-template-columns: 72px 0 minmax(520px, 1fr) 380px;
    }

    .app.inspector-hidden {
      grid-template-columns: 72px 300px minmax(520px, 1fr) 0;
    }

    .app.side-hidden.inspector-hidden {
      grid-template-columns: 72px 0 minmax(520px, 1fr) 0;
    }

    .app.side-hidden .side,
    .app.inspector-hidden .inspector {
      display: none;
    }

    .topbar {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) repeat(4, auto);
      gap: 10px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(77, 95, 121, 0.46);
      background: rgba(8, 12, 18, 0.92);
      backdrop-filter: blur(16px);
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #071018;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      font-weight: 900;
      box-shadow: 0 0 28px rgba(91, 140, 255, 0.28);
      flex: 0 0 auto;
    }

    .brand-text {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .brand strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 17px;
      line-height: 1.1;
    }

    .brand span,
    .small,
    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .root-control {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      min-width: 0;
    }

    .project-control-shell {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(77, 95, 121, 0.34);
    }

    .root-control input,
    .root-control select {
      height: 40px;
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(20, 29, 42, 0.9);
      color: var(--ink);
      padding: 0 12px;
    }

    .root-control select {
      color: #dce7fb;
    }

    .voiceover-controls {
      display: grid;
      gap: 9px;
    }

    .voiceover-controls label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 740;
    }

    .voiceover-controls input,
    .voiceover-controls select,
    .voiceover-controls textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(20, 29, 42, 0.9);
      color: var(--ink);
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
    }

    .voiceover-controls input,
    .voiceover-controls select {
      height: 36px;
    }

    .voiceover-controls textarea {
      min-height: 72px;
    }

    .voiceover-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 76px;
      gap: 8px;
    }

    .voiceover-actions {
      display: grid;
      gap: 8px;
    }

    .voiceover-actions .top-button {
      width: 100%;
    }

    .top-button,
    .tool-button {
      height: 40px;
      padding: 0 12px;
      white-space: nowrap;
      font-weight: 700;
    }

    .top-button.active {
      color: #ecfdf5;
      border-color: rgba(74, 222, 128, 0.54);
      background: rgba(21, 128, 61, 0.22);
    }

    .top-button.waiting {
      color: #fff7ed;
      border-color: rgba(248, 184, 78, 0.62);
      background: rgba(180, 83, 9, 0.24);
    }

    .project-library-button {
      min-width: 74px;
    }

    .primary-button {
      background: linear-gradient(135deg, #1d4ed8, #0f766e);
      border-color: rgba(125, 165, 255, 0.56);
    }

    .rail {
      grid-row: 2;
      border-right: 1px solid rgba(77, 95, 121, 0.38);
      background: rgba(8, 12, 18, 0.86);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 10px;
      z-index: 4;
    }

    .rail-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: var(--muted);
    }

    .rail-button.active {
      color: var(--ink);
      border-color: var(--blue);
      box-shadow: var(--glow-blue);
    }

    .project-panel-icon {
      width: 18px;
      height: 16px;
      display: grid;
      grid-template-columns: 6px 1fr;
      gap: 3px;
      padding: 2px;
      border: 1px solid currentColor;
      border-radius: 4px;
      opacity: 0.92;
    }

    .project-panel-icon::before,
    .project-panel-icon::after {
      content: "";
      border-radius: 2px;
      background: currentColor;
      opacity: 0.72;
    }

    .project-panel-icon::after {
      opacity: 0.34;
    }

    .side,
    .inspector {
      min-height: 0;
      overflow: auto;
      background: rgba(11, 16, 24, 0.82);
      backdrop-filter: blur(12px);
    }

    .side {
      grid-column: 2;
      grid-row: 2;
      border-right: 1px solid rgba(77, 95, 121, 0.38);
      padding: 16px;
    }

    .inspector {
      grid-column: 4;
      grid-row: 2;
      border-left: 1px solid rgba(77, 95, 121, 0.38);
      padding: 16px;
    }

    .canvas {
      grid-column: 3;
      grid-row: 2;
      min-width: 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle, rgba(92, 108, 132, 0.34) 1px, transparent 1px),
        linear-gradient(135deg, rgba(13, 19, 29, 0.42), rgba(7, 10, 15, 0.18));
      background-size: 24px 24px, auto;
    }

    .canvas-head {
      position: absolute;
      left: 18px;
      top: 16px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      z-index: 3;
      pointer-events: none;
    }

    .canvas-title {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h1 {
      font-size: 21px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    h2 {
      font-size: 15px;
      font-weight: 780;
    }

    h3 {
      font-size: 13px;
      font-weight: 760;
    }

    .canvas-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .canvas-tools button {
      min-width: 42px;
      height: 36px;
      padding: 0 10px;
      color: var(--muted);
      background: rgba(12, 18, 27, 0.78);
    }

    .canvas-tools button.active {
      color: #ecfdf5;
      border-color: rgba(74, 222, 128, 0.54);
      background: rgba(21, 128, 61, 0.22);
    }

    .canvas-tools select {
      height: 36px;
      min-width: 112px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 10px;
      color: var(--muted);
      background: rgba(12, 18, 27, 0.84);
    }

    .canvas-tools option {
      color: var(--ink);
      background: #101722;
    }

    .canvas-context-menu {
      position: fixed;
      z-index: 12;
      min-width: 180px;
      padding: 6px;
      border: 1px solid rgba(77, 95, 121, 0.8);
      border-radius: var(--radius);
      background: rgba(11, 16, 24, 0.96);
      box-shadow: var(--shadow);
    }

    .canvas-context-menu.hidden {
      display: none;
    }

    .sync-review-panel {
      position: fixed;
      right: 18px;
      top: 78px;
      z-index: 14;
      width: min(360px, calc(100vw - 36px));
      border: 1px solid rgba(77, 95, 121, 0.76);
      border-radius: var(--radius);
      background: rgba(11, 16, 24, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .sync-review-panel.hidden {
      display: none;
    }

    .sync-review-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(77, 95, 121, 0.48);
    }

    .sync-review-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 12px 14px;
      list-style: none;
      color: #c7d2e4;
      font-size: 12px;
      line-height: 1.45;
    }

    .sync-review-list li {
      padding: 8px 10px;
      border: 1px solid rgba(77, 95, 121, 0.45);
      border-radius: 7px;
      background: rgba(20, 29, 42, 0.72);
    }

    .sync-review-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .sync-review-actions button {
      height: 34px;
      padding: 0 12px;
      font-weight: 760;
    }

    .codex-login-panel {
      position: fixed;
      right: 18px;
      top: 78px;
      z-index: 15;
      width: min(430px, calc(100vw - 36px));
      border: 1px solid rgba(91, 140, 255, 0.74);
      border-radius: var(--radius);
      background: rgba(11, 16, 24, 0.98);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .codex-login-panel.hidden {
      display: none;
    }

    .codex-login-body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .codex-login-status {
      min-height: 36px;
      display: flex;
      align-items: center;
      padding: 9px 11px;
      border: 1px solid rgba(91, 140, 255, 0.36);
      border-radius: 7px;
      background: rgba(91, 140, 255, 0.12);
      color: #dce7fb;
      font-weight: 780;
      line-height: 1.35;
    }

    .codex-login-help {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .codex-login-code-wrap {
      display: grid;
      gap: 7px;
      padding: 11px;
      border: 1px solid rgba(77, 95, 121, 0.62);
      border-radius: 7px;
      background: rgba(20, 29, 42, 0.8);
    }

    .codex-login-code-wrap span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .codex-login-code {
      width: 100%;
      min-height: 44px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: #f8fbff;
      background: rgba(3, 6, 11, 0.56);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 22px;
      letter-spacing: 0.14em;
      overflow-wrap: anywhere;
    }

    .codex-login-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .codex-login-actions button,
    .codex-login-panel .sync-review-head button {
      min-height: 36px;
      padding: 0 10px;
      font-weight: 760;
    }

    .canvas-context-menu button {
      width: 100%;
      height: 32px;
      padding: 0 10px;
      text-align: left;
      color: #dce7fb;
      background: transparent;
      border-color: transparent;
    }

    .canvas-context-menu button:hover {
      background: rgba(91, 140, 255, 0.16);
      border-color: rgba(91, 140, 255, 0.32);
    }

    .viewport {
      position: absolute;
      inset: 0;
      overflow: auto;
      padding: 94px 34px 34px 34px;
      cursor: grab;
      overscroll-behavior: contain;
      touch-action: none;
    }

    .viewport.panning {
      cursor: grabbing;
    }

    body.canvas-space-panning .viewport {
      cursor: grab;
    }

    .viewport.connecting {
      cursor: crosshair;
    }

    .world {
      position: relative;
      min-width: 100%;
      min-height: 100%;
      transform-origin: 0 0;
      will-change: transform;
    }

    .connection-layer {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: auto;
      z-index: 0;
    }

    .edge-path {
      fill: none;
      pointer-events: none;
      stroke: rgba(91, 140, 255, 0.46);
      stroke-width: 2;
      filter: drop-shadow(0 0 10px rgba(91, 140, 255, 0.3));
    }

    .edge-path.alt {
      stroke: rgba(61, 214, 208, 0.44);
    }

    .edge-path.idea-link {
      stroke: rgba(248, 184, 78, 0.72);
      stroke-dasharray: 7 8;
      filter: drop-shadow(0 0 10px rgba(248, 184, 78, 0.22));
    }

    .edge-path.manual {
      stroke: rgba(61, 214, 208, 0.82);
      stroke-width: 2.6;
      filter: drop-shadow(0 0 12px rgba(61, 214, 208, 0.22));
    }

    .edge-path.selected {
      stroke: rgba(250, 204, 21, 0.98);
      stroke-width: 3.2;
      filter: drop-shadow(0 0 16px rgba(250, 204, 21, 0.34));
    }

    .edge-path.connection-preview {
      stroke: rgba(226, 232, 240, 0.72);
      stroke-width: 2.4;
      stroke-dasharray: 5 7;
      filter: drop-shadow(0 0 12px rgba(148, 163, 184, 0.2));
    }

    .edge-dot {
      fill: rgba(15, 23, 42, 0.95);
      pointer-events: none;
      stroke: rgba(125, 165, 255, 0.76);
      stroke-width: 2;
    }

    .edge-dot.idea-link {
      stroke: rgba(248, 184, 78, 0.82);
    }

    .edge-dot.manual {
      stroke: rgba(61, 214, 208, 0.88);
    }

    .edge-dot.connection-preview {
      stroke: rgba(226, 232, 240, 0.72);
    }

    .edge-dot.selected {
      stroke: rgba(250, 204, 21, 0.96);
      fill: rgba(69, 48, 10, 0.96);
    }

    .edge-select-hit {
      fill: none;
      pointer-events: stroke;
      stroke: rgba(255, 255, 255, 0.001);
      stroke-width: 18;
      cursor: pointer;
    }

    .edge-control-halo,
    .edge-control-handle {
      pointer-events: auto;
      cursor: grab;
    }

    .edge-control-halo {
      fill: rgba(248, 184, 78, 0.14);
      stroke: rgba(248, 184, 78, 0.34);
      stroke-width: 1.5;
    }

    .edge-control-handle {
      fill: rgba(248, 184, 78, 0.96);
      stroke: rgba(7, 10, 15, 0.94);
      stroke-width: 2;
      filter: drop-shadow(0 0 10px rgba(248, 184, 78, 0.36));
    }

    .edge-control-halo:hover,
    .edge-control-halo.active,
    .edge-control-handle:hover,
    .edge-control-handle.active {
      fill: rgba(250, 204, 21, 0.98);
      stroke: rgba(254, 243, 199, 0.82);
      cursor: grabbing;
    }

    .edge-delete-button {
      opacity: 0.76;
      pointer-events: auto;
      cursor: pointer;
      transition: opacity 140ms ease;
    }

    .edge-delete-hit {
      fill: rgba(255, 255, 255, 0.001);
      stroke: transparent;
      filter: none;
    }

    .edge-delete-icon {
      fill: rgba(127, 29, 29, 0.92);
      stroke: rgba(254, 202, 202, 0.78);
      stroke-width: 1.5;
      filter: drop-shadow(0 0 10px rgba(251, 113, 133, 0.28));
    }

    .edge-delete-button text {
      fill: #ffe4e6;
      font-size: 15px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }

    .edge-delete-button:hover,
    .edge-delete-button:focus-visible {
      opacity: 1;
    }

    .edge-delete-button:hover .edge-delete-icon,
    .edge-delete-button:focus-visible .edge-delete-icon {
      fill: rgba(153, 27, 27, 0.98);
      stroke: rgba(254, 226, 226, 0.94);
    }

    .edge-selection-label {
      fill: #fde68a;
      stroke: rgba(7, 10, 15, 0.96);
      stroke-width: 5;
      paint-order: stroke;
      font-size: 12px;
      font-weight: 820;
      pointer-events: none;
      text-anchor: middle;
    }

    .node-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .graph-node {
      position: absolute;
      pointer-events: auto;
      width: 286px;
      min-height: 154px;
      border: 1px solid rgba(77, 95, 121, 0.8);
      border-radius: var(--radius);
      background: rgba(20, 29, 42, 0.94);
      box-shadow: var(--shadow);
      cursor: grab;
      overflow: visible;
      user-select: none;
      touch-action: none;
      transition: border-color 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
    }

    .graph-node.dragging {
      cursor: grabbing;
      opacity: 0.92;
      z-index: 6;
      will-change: transform;
    }

    .graph-node.inertia {
      cursor: grabbing;
      z-index: 5;
      will-change: transform;
    }

    .graph-node.selected {
      border-color: rgba(125, 165, 255, 0.95);
      box-shadow: var(--glow-blue), var(--shadow);
    }

    .graph-node.pinned {
      border-color: rgba(248, 184, 78, 0.82);
    }

    .graph-node.shot {
      width: 392px;
      min-height: 470px;
      border-color: rgba(125, 165, 255, 0.72);
    }

    .graph-node.frame {
      width: 340px;
      min-height: 256px;
    }

    .graph-node.packaging {
      width: 294px;
      min-height: 154px;
      border-color: rgba(248, 184, 78, 0.58);
    }

    .graph-node.copywriting {
      width: 286px;
      min-height: 154px;
      border-color: rgba(167, 139, 250, 0.58);
    }

    .graph-node.character {
      width: 286px;
      min-height: 154px;
      border-color: rgba(61, 214, 208, 0.58);
    }

    .graph-node.idea {
      width: 320px;
      min-height: 212px;
      border-color: rgba(248, 184, 78, 0.68);
    }

    .node-head {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 12px;
      border-bottom: 1px solid rgba(77, 95, 121, 0.55);
      background: rgba(11, 16, 24, 0.72);
    }

    .node-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 760;
    }

    .node-head-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .node-pin {
      height: 22px;
      min-width: 38px;
      padding: 0 7px;
      border-radius: 999px;
      border-color: rgba(77, 95, 121, 0.72);
      color: var(--muted);
      background: rgba(7, 10, 15, 0.64);
      font-size: 11px;
      font-weight: 760;
      line-height: 1;
    }

    .node-pin.active {
      color: #fde68a;
      border-color: rgba(248, 184, 78, 0.76);
      background: rgba(120, 78, 18, 0.28);
    }

    .node-port {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(125, 165, 255, 0.55);
      color: var(--blue);
      background: rgba(7, 10, 15, 0.82);
      flex: 0 0 auto;
      font-size: 17px;
      line-height: 1;
      padding: 0;
    }

    .node-flow-ports {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .flow-port {
      position: absolute;
      top: 50%;
      width: 36px;
      height: 36px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 2px solid rgba(125, 165, 255, 0.76);
      color: #dbeafe;
      background: rgba(7, 10, 15, 0.9);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 0 0 5px rgba(91, 140, 255, 0.12),
        0 10px 28px rgba(0, 0, 0, 0.34);
      font-size: 12px;
      font-weight: 820;
      line-height: 1;
      overflow: visible;
      pointer-events: auto;
      transform: translateY(-50%);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      z-index: 2;
    }

    .flow-port:hover,
    .flow-port.active {
      border-color: rgba(61, 214, 208, 0.86);
      background: rgba(15, 118, 110, 0.34);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        0 0 0 6px rgba(61, 214, 208, 0.18),
        0 12px 34px rgba(0, 0, 0, 0.42);
      transform: translateY(-50%) scale(1.08);
    }

    .flow-port-in {
      left: -18px;
    }

    .flow-port-out {
      right: -18px;
    }

    .port-dot {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .port-label {
      position: absolute;
      top: 50%;
      min-width: max-content;
      padding: 5px 8px;
      border: 1px solid rgba(125, 165, 255, 0.44);
      border-radius: 999px;
      color: #e0f2fe;
      background: rgba(7, 10, 15, 0.92);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.34);
      font-size: 11px;
      font-weight: 760;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .flow-port-in .port-label {
      left: 42px;
      transform: translate(-4px, -50%);
    }

    .flow-port-out .port-label {
      right: 42px;
      transform: translate(4px, -50%);
    }

    .flow-port:hover .port-label,
    .flow-port.active .port-label {
      opacity: 1;
      transform: translate(0, -50%);
    }

    .node-drag-hint {
      color: var(--faint);
      font-size: 11px;
      white-space: nowrap;
    }

    .node-body {
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .node-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(77, 95, 121, 0.64);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(91, 140, 255, 0.14), rgba(61, 214, 208, 0.12)),
        rgba(8, 12, 18, 0.88);
      display: grid;
      place-items: center;
      color: var(--muted);
      overflow: hidden;
    }

    .shot-image-wrap {
      position: relative;
    }

    .node-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .shot-image-actions {
      position: absolute;
      inset: auto 8px 8px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-start;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 140ms ease, transform 140ms ease;
      pointer-events: none;
    }

    .shot-image-wrap:hover .shot-image-actions,
    .shot-image-wrap:focus-within .shot-image-actions {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .shot-image-action {
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      color: #edf6ff;
      background: rgba(7, 10, 15, 0.78);
      border-color: rgba(226, 232, 240, 0.22);
      font-size: 11px;
      font-weight: 780;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .shot-image-action:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .node-text {
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .node-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .shot-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
      align-items: start;
    }

    .adaptive-shot-media {
      min-height: 188px;
      aspect-ratio: 16 / 9;
      align-self: start;
    }

    .shot-media-top {
      width: 100%;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .adaptive-shot-media img {
      object-fit: contain;
      background: rgba(4, 7, 12, 0.72);
    }

    .shot-content {
      min-width: 0;
      display: grid;
      gap: 9px;
    }

    .shot-details {
      align-content: start;
    }

    .shot-card-brief {
      color: #e8f0ff;
      font-size: 12px;
      line-height: 1.48;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .shot-tech-line {
      min-height: 20px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .shot-prompt-preview {
      padding: 8px 9px;
      border: 1px solid rgba(91, 140, 255, 0.24);
      border-radius: 7px;
      background: rgba(91, 140, 255, 0.08);
      color: #c7d2e4;
      font-size: 11px;
      line-height: 1.42;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .shot-prompt-preview strong {
      color: #dbeafe;
      font-weight: 820;
    }

    .shot-card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(77, 95, 121, 0.42);
    }

    .shot-card-hint {
      color: var(--faint);
      font-size: 11px;
      line-height: 1.35;
      white-space: nowrap;
    }

    .shot-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
    }

    .shot-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .shot-action {
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      color: #dce7fb;
      background: rgba(91, 140, 255, 0.14);
      border-color: rgba(91, 140, 255, 0.38);
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .shot-action:disabled {
      opacity: 0.46;
      cursor: not-allowed;
    }

    .shot-local-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .shot-section-label {
      color: #dce7fb;
      font-size: 11px;
      font-weight: 800;
    }

    .shot-bindings {
      display: grid;
      gap: 6px;
    }

    .shot-binding {
      display: grid;
      gap: 4px;
      padding: 7px 8px;
      border: 1px solid rgba(77, 95, 121, 0.44);
      border-radius: var(--radius);
      background: rgba(9, 14, 22, 0.58);
    }

    .shot-binding-head {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #e8f0ff;
      font-size: 11px;
      font-weight: 820;
    }

    .binding-chip {
      height: 20px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0 7px;
      color: #dbeafe;
      background: rgba(91, 140, 255, 0.16);
      font-size: 11px;
      font-weight: 780;
    }

    .binding-chip.packaging-chip {
      color: #dcfce7;
      background: rgba(22, 163, 74, 0.18);
    }

    .shot-binding-text {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .storyboard-frame-only {
      gap: 10px;
    }

    .density-thumbnail {
      gap: 8px;
    }

    .density-thumbnail .adaptive-shot-media {
      min-height: 142px;
    }

    .density-thumbnail .node-meta {
      gap: 5px;
    }

    .density-thumbnail .shot-card-brief,
    .density-thumbnail .shot-tech-line,
    .density-thumbnail .shot-prompt-preview,
    .density-thumbnail .shot-card-foot {
      display: none;
    }

    .density-standard .shot-prompt,
    .density-standard .shot-bindings {
      display: none;
    }

    .density-full .shot-prompt {
      display: block;
    }

    .density-full .shot-bindings {
      display: grid;
    }

    .storyboard-frame-only .node-text {
      -webkit-line-clamp: 3;
    }

    .shot-prompt {
      max-height: 62px;
      overflow: auto;
      border: 1px solid rgba(77, 95, 121, 0.52);
      border-radius: var(--radius);
      background: rgba(7, 10, 15, 0.7);
      color: #d7e3f6;
      padding: 7px 8px;
      font-size: 11px;
      line-height: 1.42;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .shot-editor {
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(77, 95, 121, 0.45);
      display: grid;
      gap: 9px;
    }

    .shot-editor-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #eef5ff;
      font-size: 12px;
      font-weight: 820;
    }

    .shot-form-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 86px;
      gap: 8px;
    }

    .shot-editor label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 720;
    }

    .shot-editor input,
    .shot-editor textarea {
      width: 100%;
      border: 1px solid rgba(77, 95, 121, 0.62);
      border-radius: var(--radius);
      background: rgba(7, 10, 15, 0.78);
      color: var(--ink);
      padding: 7px 8px;
      font-size: 12px;
      line-height: 1.35;
    }

    .shot-editor textarea {
      min-height: 70px;
      resize: vertical;
    }

    .shot-editor-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .idea-form,
    .idea-status {
      display: grid;
      gap: 9px;
    }

    .idea-form label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 740;
    }

    .idea-form textarea,
    .idea-form select {
      width: 100%;
      border: 1px solid rgba(77, 95, 121, 0.62);
      border-radius: var(--radius);
      background: rgba(7, 10, 15, 0.78);
      color: var(--ink);
      padding: 8px;
      font-size: 12px;
      line-height: 1.4;
    }

    .idea-form textarea {
      min-height: 82px;
      resize: vertical;
    }

    .idea-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      border-radius: 999px;
      padding: 3px 8px;
      background: rgba(100, 113, 132, 0.18);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
    }

    .badge.complete,
    .badge.autopilot {
      color: var(--green);
      background: rgba(74, 222, 128, 0.12);
    }

    .badge.guided,
    .badge.partial {
      color: var(--blue);
      background: rgba(91, 140, 255, 0.13);
    }

    .badge.missing {
      color: var(--rose);
      background: rgba(251, 113, 133, 0.12);
    }

    .badge.skipped {
      color: var(--amber);
      background: rgba(248, 184, 78, 0.13);
    }

    .badge.style {
      color: var(--violet);
      background: rgba(167, 139, 250, 0.14);
    }

    .badge.project-context {
      max-width: min(520px, 46vw);
      overflow: hidden;
      text-overflow: ellipsis;
      color: #dce7fb;
      background: rgba(20, 29, 42, 0.82);
    }

    .side-section,
    .detail-block {
      border: 1px solid rgba(77, 95, 121, 0.55);
      border-radius: var(--radius);
      background: rgba(16, 23, 34, 0.82);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.24);
    }

    .side-section {
      padding: 12px;
      margin-bottom: 12px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .project-list {
      display: grid;
      gap: 9px;
    }

    .project-item {
      width: 100%;
      text-align: left;
      padding: 11px;
      display: grid;
      gap: 9px;
      background: rgba(20, 29, 42, 0.88);
    }

    .project-item.active {
      border-color: var(--blue);
      box-shadow: var(--glow-blue);
    }

    .project-name,
    .shot-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .project-name span:first-child,
    .shot-title span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-map {
      display: grid;
      gap: 8px;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      align-items: center;
    }

    .mini-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(100, 113, 132, 0.2);
      overflow: hidden;
    }

    .mini-bar i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--blue));
    }

    .detail-block {
      padding: 13px;
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 10px;
      align-items: baseline;
    }

    .kv-row span:first-child {
      color: var(--muted);
      font-size: 12px;
    }

    .kv-row span:last-child,
    .path {
      overflow-wrap: anywhere;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid rgba(77, 95, 121, 0.56);
      background: rgba(7, 10, 15, 0.76);
      color: #e8eef8;
      border-radius: var(--radius);
      padding: 11px;
      max-height: 260px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.55;
    }

    textarea {
      width: 100%;
      min-height: 98px;
      resize: vertical;
      border: 1px solid rgba(77, 95, 121, 0.7);
      border-radius: var(--radius);
      background: rgba(7, 10, 15, 0.78);
      color: var(--ink);
      padding: 10px;
    }

    .empty {
      min-height: 148px;
      display: grid;
      place-items: center;
      border: 1px dashed rgba(77, 95, 121, 0.72);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(16, 23, 34, 0.48);
      text-align: center;
      padding: 18px;
    }

    .error {
      color: var(--rose);
    }

    @media (max-width: 1220px) {
      .app {
        grid-template-columns: 60px 260px minmax(360px, 1fr) 340px;
      }

      .app.side-hidden {
        grid-template-columns: 60px 0 minmax(360px, 1fr) 340px;
      }

      .topbar {
        grid-template-columns: minmax(220px, 1fr) repeat(4, auto);
      }
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .app {
        display: block;
        min-height: 100vh;
        height: auto;
      }

      .topbar,
      .root-control {
        grid-template-columns: 1fr;
      }

      .rail {
        display: none;
      }

      .side,
      .inspector {
        max-height: none;
      }

      .canvas {
        min-height: 720px;
      }
    }
  </style>
</head>
<body>
  <section id="intro" class="intro" aria-label="Video Master 开场页">
    <video id="introVideo" class="intro-video" src="/assets/intro-background-20260427-v2.mp4" autoplay muted loop playsinline></video>
    <div id="introImage" class="intro-image" hidden></div>
    <div id="introFallback" class="intro-fallback visible"></div>
    <div class="intro-scrim"></div>
    <div class="intro-copy">
      <div class="intro-kicker">videomaster</div>
      <h1 class="intro-title">把想法变成可编辑的影像工作流</h1>
      <p class="intro-subtitle">从分镜图、视频提示词、文字包装到最终交付，所有素材都在节点画布里重新组织、预览和完善。</p>
      <div class="intro-actions">
        <button id="enterWorkbenchButton" class="intro-button primary" type="button">进入节点编辑器</button>
        <button id="pickProjectButton" class="intro-button" type="button">选择项目</button>
      </div>
    </div>
  </section>

  <div class="app side-hidden">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">VM</div>
        <div class="brand-text">
          <strong>节点式分镜预览编辑器</strong>
          <span id="serverState">正在连接本地工作流</span>
        </div>

  <script>
    const UI_PREFS_KEY = "video-master-ui-prefs-v1";
    const CANVAS_FILTERS = new Set(["all", "shots", "framework", "packaging"]);
    const CARD_DENSITIES = new Set(["thumbnail", "standard", "full"]);
    const MIN_CANVAS_ZOOM = 0.35;
    const MAX_CANVAS_ZOOM = 2.2;
    const WHEEL_ZOOM_SENSITIVITY = 0.00072;
    const ZOOM_EASING = 0.24;

    const state = {
      root: "",
      projects: [],
      currentProject: "",
      project: null,
      heroMedia: null,
      authStatus: null,
      codexDevice: null,
      codexPollTimer: 0,
      graph: { nodes: [], edges: [] },
      selectedNodeId: "",
      zoom: 1,
      targetZoom: 1,
      canvasBounds: { maxX: 1500, maxY: 820 },
      zoomFrame: 0,
      zoomAnchor: null,
      zoomAnimationActive: false,
      preferenceSaveTimer: 0,
      filter: "all",
      cardDensity: "standard",
      frameworkOnly: false,
      contextMenu: null,
      draftIdea: null,
      manualEdges: [],
      deletedEdges: [],
      manualEdgeControls: {},
      selectedEdgeKey: "",
      canvasBaseline: "",
      canvasBaselineState: null,
      pendingCanvasSyncReport: null,
      hasZoomPreference: false,
      sideHidden: true,
      inspectorHidden: false,
      pan: null,
      spacePanning: false,
      nodeDrag: null,
      nodeInertia: null,
      connectionDrag: null,
      edgeControlDrag: null,
      editingShot: null,
      voiceoverBusy: false,
      suppressClickUntil: 0,
    };

    const INTRO_BACKGROUND_VIDEO = "/assets/intro-background-20260427-v2.mp4";

    const els = {
      intro: document.querySelector("#intro"),
      introVideo: document.querySelector("#introVideo"),
      introImage: document.querySelector("#introImage"),
      introFallback: document.querySelector("#introFallback"),
      enterWorkbenchButton: document.querySelector("#enterWorkbenchButton"),
      pickProjectButton: document.querySelector("#pickProjectButton"),
      serverState: document.querySelector("#serverState"),
      projectLibraryButton: document.querySelector("#projectLibraryButton"),
      rootInput: document.querySelector("#rootInput"),
      projectQuickSelect: document.querySelector("#projectQuickSelect"),
      refreshButton: document.querySelector("#refreshButton"),
      showIntroButton: document.querySelector("#showIntroButton"),
      fitButton: document.querySelector("#fitButton"),
      codexLoginButton: document.querySelector("#codexLoginButton"),
      writeStateButton: document.querySelector("#writeStateButton"),
      toggleProjectPanelButton: document.querySelector("#toggleProjectPanelButton"),
      zoomInButton: document.querySelector("#zoomInButton"),
      zoomOutButton: document.querySelector("#zoomOutButton"),
      resetZoomButton: document.querySelector("#resetZoomButton"),
      syncCanvasButton: document.querySelector("#syncCanvasButton"),
      canvasModeSelect: document.querySelector("#canvasModeSelect"),
      cardDensitySelect: document.querySelector("#cardDensitySelect"),
      organizeCanvasButton: document.querySelector("#organizeCanvasButton"),
      syncReviewPanel: document.querySelector("#syncReviewPanel"),
      syncReviewHint: document.querySelector("#syncReviewHint"),
      syncReviewList: document.querySelector("#syncReviewList"),
      cancelCanvasSyncButton: document.querySelector("#cancelCanvasSyncButton"),
      confirmCanvasSyncButton: document.querySelector("#confirmCanvasSyncButton"),
      codexLoginPanel: document.querySelector("#codexLoginPanel"),
      codexLoginStatus: document.querySelector("#codexLoginStatus"),
      codexLoginCode: document.querySelector("#codexLoginCode"),
      openCodexVerifyButton: document.querySelector("#openCodexVerifyButton"),
      copyCodexCodeButton: document.querySelector("#copyCodexCodeButton"),
      restartCodexLoginButton: document.querySelector("#restartCodexLoginButton"),
      closeCodexLoginPanelButton: document.querySelector("#closeCodexLoginPanelButton"),
      projectList: document.querySelector("#projectList"),
      projectCount: document.querySelector("#projectCount"),
      projectTitle: document.querySelector("#projectTitle"),
      modeBadges: document.querySelector("#modeBadges"),
      graphSummary: document.querySelector("#graphSummary"),
      miniMap: document.querySelector("#miniMap"),
      voiceoverStatus: document.querySelector("#voiceoverStatus"),
      voiceoverEngine: document.querySelector("#voiceoverEngine"),
      voiceoverBaseUrl: document.querySelector("#voiceoverBaseUrl"),
      voiceoverPersona: document.querySelector("#voiceoverPersona"),
      voiceoverSteps: document.querySelector("#voiceoverSteps"),
      voiceoverControlInstruction: document.querySelector("#voiceoverControlInstruction"),
      generateVoiceoverButton: document.querySelector("#generateVoiceoverButton"),
      dryRunVoiceoverButton: document.querySelector("#dryRunVoiceoverButton"),
      viewport: document.querySelector("#viewport"),
      world: document.querySelector("#world"),
      canvasContextMenu: document.querySelector("#canvasContextMenu"),
      connectionLayer: document.querySelector("#connectionLayer"),
      nodeLayer: document.querySelector("#nodeLayer"),
      inspector: document.querySelector("#inspector"),
      inspectorType: document.querySelector("#inspectorType"),
    };

    const statusNames = {
      complete: "完成",
      partial: "进行中",
      missing: "缺失",
      skipped: "跳过",
      ready: "就绪",
      unknown: "未知",
    };

    const workflowNames = {
      autopilot: "全委托",
      guided: "协作导演",
      unknown: "未识别",
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function badge(text, className = "") {
      return `<span class="badge ${className}">${escapeHtml(text)}</span>`;
    }

    function statusClass(value) {
      return String(value || "unknown").toLowerCase().replace(/[^a-z0-9_-]/g, "");
    }

    function tStatus(value) {
      return statusNames[value] || value || "未知";
    }

    function tWorkflow(value) {
      return workflowNames[value] || value || "未设置";
    }

    function fileUrl(projectPath, filePath) {
      const params = new URLSearchParams({ project: projectPath, path: filePath });
      return `/api/file?${params.toString()}`;
    }

    function loadUiPreferences() {
      try {
        const prefs = JSON.parse(localStorage.getItem(UI_PREFS_KEY) || "{}");
        return prefs && typeof prefs === "object" && !Array.isArray(prefs) ? prefs : {};
      } catch {
        return {};
      }
    }

    function saveUiPreferences() {
      const prefs = {
        sideHidden: Boolean(state.sideHidden),
        inspectorHidden: Boolean(state.inspectorHidden),
        filter: CANVAS_FILTERS.has(state.filter) ? state.filter : "all",
        cardDensity: CARD_DENSITIES.has(state.cardDensity) ? state.cardDensity : "standard",
        zoom: Number((Number.isFinite(state.targetZoom) ? state.targetZoom : state.zoom).toFixed(2)),
      };
      localStorage.setItem(UI_PREFS_KEY, JSON.stringify(prefs));
    }

    function scheduleUiPreferenceSave() {
      window.clearTimeout(state.preferenceSaveTimer);
      state.preferenceSaveTimer = window.setTimeout(saveUiPreferences, 160);
    }

    function applyUiPreferences() {
      const prefs = loadUiPreferences();
      if (typeof prefs.sideHidden === "boolean") state.sideHidden = prefs.sideHidden;
      state.inspectorHidden = false;
      if (CANVAS_FILTERS.has(prefs.filter)) {
        state.filter = prefs.filter;
        state.frameworkOnly = prefs.filter === "framework";
      }
      if (CARD_DENSITIES.has(prefs.cardDensity)) {
        state.cardDensity = prefs.cardDensity;
      }
      const savedZoom = Number(prefs.zoom);
      state.hasZoomPreference = Number.isFinite(savedZoom);
      if (state.hasZoomPreference) {
        state.zoom = clamp(savedZoom, MIN_CANVAS_ZOOM, MAX_CANVAS_ZOOM);
        state.targetZoom = state.zoom;
      }
    }

    async function readJson(url) {
      const response = await fetch(url);
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || response.statusText);
      }
      return payload;
    }

    async function writeJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const result = await response.json();
      if (!response.ok) {
        throw new Error(result.error || response.statusText);
      }
      return result;
    }

    function renderCodexLoginPanel(statusText = "") {
      const available = Boolean(state.authStatus?.codex?.available);
      const device = state.codexDevice;
      const hasDevice = Boolean(device?.userCode);
      let status = statusText || "未登录：登录后可直接生成分镜图";
      if (!statusText && available) status = "Codex 已登录，可直接生成分镜图";
      if (!statusText && hasDevice) status = "等待授权：请在授权页输入下方验证码";
      els.codexLoginStatus.textContent = status;
      els.codexLoginCode.textContent = hasDevice ? device.userCode : "等待生成";
      els.openCodexVerifyButton.disabled = !device?.verificationUrl;
      els.copyCodexCodeButton.disabled = !hasDevice;
      els.restartCodexLoginButton.textContent = hasDevice ? "重新获取" : available ? "重新登录" : "开始登录";
    }

    function updateCodexLoginButton(statusText = "") {
      const available = Boolean(state.authStatus?.codex?.available);
      const waiting = Boolean(state.codexDevice?.userCode);
      els.codexLoginButton.textContent = available ? "Codex 已登录" : waiting ? "等待授权" : "Codex 登录";
      els.codexLoginButton.classList.toggle("active", available);
      els.codexLoginButton.classList.toggle("waiting", !available && waiting);
      els.codexLoginButton.title = available
        ? "Codex 原生生图会话可用"
        : waiting
          ? "打开登录面板查看验证码"
          : "登录后可直接生成分镜图";
      renderCodexLoginPanel(statusText);
    }

    function openCodexLoginPanel(statusText = "") {
      els.codexLoginPanel.classList.remove("hidden");
      renderCodexLoginPanel(statusText);
    }

    function closeCodexLoginPanel() {
      els.codexLoginPanel.classList.add("hidden");
    }

    function openCodexVerificationPage() {
      if (!state.codexDevice?.verificationUrl) return;
      window.open(state.codexDevice.verificationUrl, "_blank", "noopener,noreferrer");
    }

    async function copyCodexLoginCode() {
      if (!state.codexDevice?.userCode) return;
      await copyText(state.codexDevice.userCode);
      renderCodexLoginPanel("验证码已复制，请在授权页粘贴或输入");
    }

    async function loadCodexAuthStatus() {
      state.authStatus = await readJson("/api/auth/codex/status");
      updateCodexLoginButton();
      return state.authStatus;
    }

    function scheduleCodexPoll(device, intervalSeconds) {
      window.clearTimeout(state.codexPollTimer);
      state.codexPollTimer = window.setTimeout(() => {
        pollCodexLogin(device).catch(showError);
      }, Math.max(1, Number(intervalSeconds) || 5) * 1000);
    }

    async function pollCodexLogin(device) {
      const result = await writeJson("/api/auth/codex/device/poll", {
        deviceAuthId: device.deviceAuthId,
        userCode: device.userCode,
      });
      if (result.status === "authorized") {
        state.authStatus = result.auth || await readJson("/api/auth/codex/status");
        state.codexDevice = null;
        updateCodexLoginButton("Codex 已登录，可直接生成分镜图");
        els.serverState.textContent = "Codex 已登录，可直接生成分镜图";
        return;
      }
      if (result.status === "pending") {
        state.codexDevice = {
          ...device,
          interval: result.interval || device.interval,
        };
        updateCodexLoginButton("等待授权：请在授权页输入下方验证码");
        els.serverState.textContent = `等待 Codex 授权，授权码：${device.userCode}`;
        scheduleCodexPoll(device, result.interval || device.interval);
        return;
      }
      const message = result.message || "Codex 登录未完成，请重新获取验证码";
      state.codexDevice = null;
      state.authStatus = await readJson("/api/auth/codex/status");
      updateCodexLoginButton(message);
      els.serverState.textContent = message;
    }

    async function startCodexLogin() {
      window.clearTimeout(state.codexPollTimer);
      els.codexLoginButton.disabled = true;
      openCodexLoginPanel("正在获取 Codex 登录验证码");
      els.serverState.textContent = "正在启动 Codex 登录";
      try {
        const device = await writeJson("/api/auth/codex/device/start", {});
        state.codexDevice = device;
        updateCodexLoginButton("等待授权：请在授权页输入下方验证码");
        openCodexVerificationPage();
        els.serverState.textContent = `请在打开的页面输入授权码：${device.userCode}`;
        scheduleCodexPoll(device, device.interval);
      } catch (error) {
        updateCodexLoginButton(`Codex 登录服务异常：${error.message || error}`);
        throw error;
      } finally {
        window.setTimeout(() => {
          els.codexLoginButton.disabled = false;
        }, 700);
      }
    }

    async function loadProjects(selectFirst = true) {
      els.serverState.textContent = "读取项目中";
      const params = new URLSearchParams();
      const root = els.rootInput.value.trim();
      if (root) params.set("root", root);
      const payload = await readJson(`/api/projects?${params.toString()}`);
      state.root = payload.root || root;
      state.projects = payload.projects || [];
      els.rootInput.value = state.root;
      els.serverState.textContent = "本地工作流已连接";
      renderProjectQuickSelect();
      renderProjectList();
      loadHeroMedia().catch(showIntroFallback);

      const stillExists = state.projects.some((project) => project.path === state.currentProject);
      if (selectFirst && state.projects.length) {
        await loadProject(state.projects[0].path, false);
      } else if (stillExists && state.currentProject) {
        await loadProject(state.currentProject, false);
      } else if (state.projects.length) {
        await loadProject(state.projects[0].path, false);
      } else {
        state.currentProject = "";
        state.project = null;
        state.graph = { nodes: [], edges: [] };
        state.manualEdges = [];
        state.deletedEdges = [];
        state.manualEdgeControls = {};
        state.selectedEdgeKey = "";
        state.canvasBaseline = "";
        renderProjectQuickSelect();
        renderVoiceoverPanel();
        renderProject();
      }
    }

    async function loadProject(projectPath, writeState) {
      state.currentProject = projectPath;
      state.selectedNodeId = "";
      state.editingShot = null;
      state.contextMenu = null;
      state.draftIdea = null;
      closeCanvasContextMenu();
      const params = new URLSearchParams({ path: projectPath });
      if (writeState) params.set("write", "true");
      state.project = await readJson(`/api/project?${params.toString()}`);
      state.graph = buildGraph(state.project);
      state.manualEdges = loadManualEdges();
      state.deletedEdges = loadDeletedEdges();
      state.manualEdgeControls = loadManualEdgeControls();
      state.selectedEdgeKey = "";
      state.selectedNodeId = state.graph.nodes[0]?.id || "";
      renderProjectQuickSelect();
      renderProjectList();
      renderProject();
      captureCanvasBaseline();
      setTimeout(() => {
        if (state.hasZoomPreference) {
          renderBoard();
          return;
        }
        fitCanvas({ persist: false });
      }, 20);
    }

    function voiceoverStatusText(project) {
      if (!project) return "未选择项目";
      const audio = project.copywriting?.voiceover_audio;
      const manifest = project.copywriting?.tts_manifest;
      if (audio?.exists) return audio.path?.endsWith(".wav") ? "WAV 已生成" : "口播已生成";
      if (manifest?.exists) return "文本已打包";
      return "等待生成";
    }

    function renderVoiceoverPanel() {
      const hasProject = Boolean(state.currentProject && state.project);
      els.voiceoverStatus.textContent = state.voiceoverBusy ? "生成中" : voiceoverStatusText(state.project);
      els.generateVoiceoverButton.disabled = !hasProject || state.voiceoverBusy;
      els.dryRunVoiceoverButton.disabled = !hasProject || state.voiceoverBusy;
    }

    function voiceoverPayload(dryRun = false) {
      const engine = els.voiceoverEngine.value || "voxcpm2";
      const personaOrVoice = els.voiceoverPersona.value.trim();
      const payload = {
        project: state.currentProject,
        engine,
        dry_run: dryRun,
        dit_steps: Number(els.voiceoverSteps.value || 10),
      };
      if (engine === "voxcpm2") {
        payload.tts_base_url = els.voiceoverBaseUrl.value.trim();
        payload.persona = personaOrVoice || "小潮院长";
        payload.control_instruction = els.voiceoverControlInstruction.value.trim();
      } else {
        payload.voice = personaOrVoice || "zh-CN-XiaoxiaoNeural";
      }
      return payload;
    }

    async function generateVoiceover(dryRun = false) {
      if (!state.currentProject) throw new Error("请先选择项目");
      const button = dryRun ? els.dryRunVoiceoverButton : els.generateVoiceoverButton;
      const originalText = button.textContent;
      const previousSelection = state.selectedNodeId;
      state.voiceoverBusy = true;
      renderVoiceoverPanel();
      button.textContent = dryRun ? "打包中" : "生成中";
      els.serverState.textContent = dryRun ? "正在打包口播文本" : "正在生成口播音频";
      try {
        const result = await writeJson("/api/voiceover/generate", voiceoverPayload(dryRun));
        state.project = result.state;
        state.graph = buildGraph(state.project);
        state.selectedNodeId = previousSelection || state.graph.nodes[0]?.id || "";
        els.serverState.textContent = dryRun ? "口播文本已打包" : "口播音频已生成";
        renderProjectList();
        renderProject();
      } finally {
        state.voiceoverBusy = false;
        button.textContent = originalText;
        renderVoiceoverPanel();
      }
    }

    function jsonSnapshot(value, fallback) {
      if (value === undefined || value === null) return fallback;
      try {
        return JSON.parse(JSON.stringify(value));
      } catch {
        return fallback;
      }
    }

    function collectCanvasSyncState() {
      const project = state.project || {};
      const shots = (project.shots || []).map((shot) => ({
        shot_id: shot.shot_id || "",
        beat: shot.beat || "",
        duration_seconds: shot.duration_seconds ?? "",
        start: shot.start || "",
        end: shot.end || "",
        visual_action: shot.visual_action || "",
        image_prompt_seed: shot.image_prompt_seed || "",
        video_prompt_seed: shot.video_prompt_seed || "",
        video_prompt: shot.video_prompt || "",
        frame: jsonSnapshot(shot.frame, {}),
      }));
      const nodes = (state.graph.nodes || []).map((node) => ({
        id: node.id,
        type: node.type,
        title: node.title,
        x: Math.round(node.x || 0),
        y: Math.round(node.y || 0),
        width: node.width || 0,
        height: node.height || 0,
      }));
      return {
        project_name: project.project?.name || "",
        project_path: state.currentProject,
        selected_node_id: state.selectedNodeId || "",
        filter: state.filter,
        card_density: state.cardDensity,
        framework_only: state.frameworkOnly,
        manual_edges: jsonSnapshot(state.manualEdges, []),
        deleted_edges: jsonSnapshot(state.deletedEdges, []),
        edge_controls: jsonSnapshot(state.manualEdgeControls, {}),
        canvas_edges: jsonSnapshot(canvasEdges(), []),
        draft_idea: jsonSnapshot(state.draftIdea, null),
        editing_shot: jsonSnapshot(state.editingShot, null),
        nodes,
        shots,
      };
    }

    function normalizeEdgesForDiff(edges) {
      return (edges || [])
        .map((edge) => edge.map((item) => String(item || "")))
        .sort((a, b) => a.join(">").localeCompare(b.join(">")));
    }

    function normalizeControlsForDiff(controls) {
      return Object.fromEntries(Object.entries(controls || {})
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([key, point]) => [key, {
          x: Math.round(Number(point?.x) || 0),
          y: Math.round(Number(point?.y) || 0),
        }]));
    }

    function normalizeCanvasStateForDiff(snapshot) {
      return {
        filter: snapshot.filter,
        card_density: snapshot.card_density,
        framework_only: Boolean(snapshot.framework_only),
        manual_edges: normalizeEdgesForDiff(snapshot.manual_edges),
        deleted_edges: (snapshot.deleted_edges || []).map(String).sort(),
        edge_controls: normalizeControlsForDiff(snapshot.edge_controls),
        draft_idea: snapshot.draft_idea || null,
        editing_shot: snapshot.editing_shot || null,
        nodes: (snapshot.nodes || []).map((node) => ({
          id: node.id,
          x: Math.round(Number(node.x) || 0),
          y: Math.round(Number(node.y) || 0),
        })).sort((a, b) => String(a.id).localeCompare(String(b.id))),
        shots: (snapshot.shots || []).map((shot) => ({
          shot_id: shot.shot_id,
          duration_seconds: shot.duration_seconds,
          visual_action: shot.visual_action,
          image_prompt_seed: shot.image_prompt_seed,
          video_prompt_seed: shot.video_prompt_seed,
          video_prompt: shot.video_prompt,
        })),
      };
    }

    function canvasStateFingerprint(snapshot = collectCanvasSyncState()) {
      return JSON.stringify(normalizeCanvasStateForDiff(snapshot));
    }

    function captureCanvasBaseline() {
      const normalized = normalizeCanvasStateForDiff(collectCanvasSyncState());
      state.canvasBaseline = JSON.stringify(normalized);
      state.canvasBaselineState = normalized;
      state.pendingCanvasSyncReport = null;
    }

    function baselineCanvasState() {
      if (state.canvasBaselineState) return state.canvasBaselineState;
      if (!state.canvasBaseline) return null;
      try {
        state.canvasBaselineState = JSON.parse(state.canvasBaseline);
        return state.canvasBaselineState;
      } catch {
        return null;
      }
    }

    function stableCanvasPart(value) {
      return JSON.stringify(value ?? null);
    }

    function canvasPartChanged(current, baseline, key) {
      return stableCanvasPart(current?.[key]) !== stableCanvasPart(baseline?.[key]);
    }

    function countNodeLayoutChanges(currentNodes = [], baselineNodes = []) {
      const baselineMap = new Map((baselineNodes || []).map((node) => [String(node.id), node]));
      const currentMap = new Map((currentNodes || []).map((node) => [String(node.id), node]));
      let count = 0;
      currentMap.forEach((node, id) => {
        const previous = baselineMap.get(id);
        if (!previous || previous.x !== node.x || previous.y !== node.y) count += 1;
      });
      baselineMap.forEach((_, id) => {
        if (!currentMap.has(id)) count += 1;
      });
      return count;
    }

    function countShotContentChanges(currentShots = [], baselineShots = []) {
      const keyFor = (shot, index) => String(shot?.shot_id || `shot-${index}`);
      const baselineMap = new Map((baselineShots || []).map((shot, index) => [keyFor(shot, index), shot]));
      const currentMap = new Map((currentShots || []).map((shot, index) => [keyFor(shot, index), shot]));
      let count = 0;
      currentMap.forEach((shot, key) => {
        if (stableCanvasPart(shot) !== stableCanvasPart(baselineMap.get(key))) count += 1;
      });
      baselineMap.forEach((_, key) => {
        if (!currentMap.has(key)) count += 1;
      });
      return count;
    }

    function countEdgeControlChanges(currentControls = {}, baselineControls = {}) {
      const keys = new Set([...Object.keys(currentControls || {}), ...Object.keys(baselineControls || {})]);
      return Array.from(keys).filter((key) => stableCanvasPart(currentControls?.[key]) !== stableCanvasPart(baselineControls?.[key])).length;
    }

    function collectCanvasChangeReport() {
      const project = state.project || {};
      const nodes = state.graph.nodes || [];
      const shots = project.shots || [];
      const baseline = baselineCanvasState();
      const current = normalizeCanvasStateForDiff(collectCanvasSyncState());
      const report = {
        items: [],
        hasChanges: false,
        hasActionable: false,
        canConfirm: false,
        confirmLabel: "交给 Codex 处理",
        hint: "提交前确认",
        note: "同步画布当前修改",
      };

      if (!baseline) {
        report.items.push(`当前画布包含 ${shots.length} 个分镜、${nodes.length} 个节点。`);
        report.items.push("还没有建立对照版本，这次只会把当前画布记为初始状态。");
        report.hasChanges = true;
        report.canConfirm = true;
        report.confirmLabel = "记为当前状态";
        report.hint = "建立画布基线";
        report.note = "记录画布初始状态";
        return report;
      }

      report.hasChanges = stableCanvasPart(current) !== stableCanvasPart(baseline);
      if (!report.hasChanges) {
        report.items.push("未检测到新的画布修改。");
        report.items.push("不需要提交 Codex；可以继续调整分镜、连线或卡片内容。");
        report.confirmLabel = "无改动可提交";
        report.hint = "没有变化";
        return report;
      }

      const layoutChanges = countNodeLayoutChanges(current.nodes, baseline.nodes);
      const shotContentChanges = countShotContentChanges(current.shots, baseline.shots);
      const flowChanged = canvasPartChanged(current, baseline, "manual_edges") || canvasPartChanged(current, baseline, "deleted_edges");
      const edgeControlChanges = countEdgeControlChanges(current.edge_controls, baseline.edge_controls);
      const viewChanged = ["filter", "card_density", "framework_only"].some((key) => canvasPartChanged(current, baseline, key));
      const draftChanged = canvasPartChanged(current, baseline, "draft_idea");
      const editingChanged = canvasPartChanged(current, baseline, "editing_shot");

      report.hasActionable = Boolean(shotContentChanges || flowChanged || draftChanged || editingChanged);

      if (shotContentChanges) {
        report.items.push(`修改了 ${shotContentChanges} 个分镜的内容、提示词种子或视频提示词。`);
      }
      if (flowChanged) {
        report.items.push("分镜流程线发生变化，包含新增、删除或重连关系。");
      }
      if (draftChanged && current.draft_idea) {
        report.items.push("包含 1 个待 Codex 生成的新分镜想法。");
      }
      if (editingChanged && current.editing_shot) {
        report.items.push("包含当前画布内正在编辑的分镜信息。");
      }
      if (layoutChanges) {
        report.items.push(`${report.hasActionable ? "同时" : "仅"}调整了 ${layoutChanges} 个节点的位置/排版。`);
      }
      if (edgeControlChanges) {
        report.items.push(`${report.hasActionable ? "同时" : "仅"}调整了 ${edgeControlChanges} 条连线的弯曲位置。`);
      }
      if (viewChanged) {
        report.items.push(`${report.hasActionable ? "同时" : "仅"}切换了画布视图或卡片显示密度。`);
      }

      if (!report.hasActionable) {
        report.items.push("没有检测到分镜文案、提示词、图片或流程关系变化。");
        report.items.push("这类变化只影响本机画布排版/查看方式，无需交给 Codex 改写项目内容。");
        report.canConfirm = true;
        report.confirmLabel = "记为当前状态";
        report.hint = "仅本地画布变化";
        report.note = "记录本地画布状态";
        return report;
      }

      report.items.push("提交后 Codex 只会按上面列出的内容处理，不会自动改写未列出的分镜。");
      report.canConfirm = true;
      report.confirmLabel = "交给 Codex 处理";
      report.hint = "需要 Codex 处理";
      return report;
    }

    function canvasHasMeaningfulChanges() {
      return collectCanvasChangeReport().hasChanges;
    }

    function collectCanvasChangeSummary() {
      return collectCanvasChangeReport().items;
    }

    function openCanvasSyncReview() {
      if (!state.currentProject) return;
      const report = collectCanvasChangeReport();
      state.pendingCanvasSyncReport = report;
      els.syncReviewHint.textContent = report.hint;
      els.syncReviewList.innerHTML = report.items.map((item) => `<li>${escapeHtml(item)}</li>`).join("");
      els.confirmCanvasSyncButton.textContent = report.confirmLabel;
      els.confirmCanvasSyncButton.disabled = !report.canConfirm;
      els.syncReviewPanel.classList.remove("hidden");
    }

    function closeCanvasSyncReview() {
      els.syncReviewPanel.classList.add("hidden");
      state.pendingCanvasSyncReport = null;
    }

    async function syncCanvasToBackend() {
      if (!state.currentProject) return;
      const report = state.pendingCanvasSyncReport || collectCanvasChangeReport();
      const originalText = els.syncCanvasButton.textContent;
      const originalConfirmText = els.confirmCanvasSyncButton.textContent;
      els.syncCanvasButton.disabled = true;
      els.confirmCanvasSyncButton.disabled = true;
      const progressText = report.hasActionable ? "同步中" : "记录中";
      els.syncCanvasButton.textContent = progressText;
      els.confirmCanvasSyncButton.textContent = progressText;
      els.serverState.textContent = report.hasActionable ? "同步画布修改中" : "记录画布状态中";
      try {
        if (!report.canConfirm || !report.hasChanges) {
          els.serverState.textContent = "没有需要提交的画布改动";
          closeCanvasSyncReview();
          return;
        }
        if (!report.hasActionable) {
          captureCanvasBaseline();
          els.serverState.textContent = "已记为当前画布状态";
          els.syncCanvasButton.textContent = "已记录";
          els.confirmCanvasSyncButton.textContent = "已记录";
          closeCanvasSyncReview();
          setTimeout(() => {
            if (els.syncCanvasButton.textContent === "已记录") {
              els.syncCanvasButton.textContent = originalText;
            }
          }, 1200);
          return;
        }
        await writeJson("/api/canvas-sync", {
          project: state.currentProject,
          note: report.note,
          canvas_state: collectCanvasSyncState(),
        });
        els.serverState.textContent = "画布修改已同步";
        els.syncCanvasButton.textContent = "已同步";
        els.confirmCanvasSyncButton.textContent = "已同步";
        captureCanvasBaseline();
        closeCanvasSyncReview();
        setTimeout(() => {
          if (els.syncCanvasButton.textContent === "已同步") {
            els.syncCanvasButton.textContent = originalText;
          }
          if (els.confirmCanvasSyncButton.textContent === "已同步") {
            els.confirmCanvasSyncButton.textContent = originalConfirmText;
          }
        }, 1400);
      } catch (error) {
        els.syncCanvasButton.textContent = originalText;
        els.confirmCanvasSyncButton.textContent = originalConfirmText;
        throw error;
      } finally {
        els.syncCanvasButton.disabled = false;
        els.confirmCanvasSyncButton.disabled = !((state.pendingCanvasSyncReport || report).canConfirm);
        if (els.confirmCanvasSyncButton.textContent === "同步中" || els.confirmCanvasSyncButton.textContent === "记录中") {
          els.confirmCanvasSyncButton.textContent = originalConfirmText;
        }
      }
    }

    async function loadHeroMedia() {
      if (INTRO_BACKGROUND_VIDEO) {
        const media = {
          kind: "video",
          source: "hardcoded",
          project_name: "intro-background-20260427-v2",
          path: INTRO_BACKGROUND_VIDEO,
          url: INTRO_BACKGROUND_VIDEO,
        };
        state.heroMedia = media;
        applyHeroMedia(media);
        return;
      }
      const params = new URLSearchParams();
      const root = els.rootInput.value.trim();
      if (root) params.set("root", root);
      const media = await readJson(`/api/hero-media?${params.toString()}`);
      state.heroMedia = media;
      applyHeroMedia(media);
    }

    function applyHeroMedia(media) {
      if (!media || media.kind === "none") {
        showIntroFallback();
        return;
      }
      if (media.kind === "video") {
        els.introVideo.hidden = false;
        els.introImage.hidden = true;
        els.introVideo.src = media.url;
        els.introVideo.play().catch(showIntroFallback);
        els.introFallback.classList.remove("visible");
        return;
      }
      if (media.kind === "image") {
        els.introVideo.removeAttribute("src");
        els.introVideo.hidden = true;
        els.introImage.hidden = false;
        els.introImage.style.setProperty("--intro-image", `url("${media.url}")`);
        els.introFallback.classList.remove("visible");
        return;
      }
      showIntroFallback();
    }

    function showIntroFallback() {
      els.introVideo.hidden = true;
      els.introImage.hidden = true;
      els.introFallback.classList.add("visible");
    }

      els.intro.classList.add("hidden");
      sessionStorage.setItem("video-master-intro-seen", "1");
    }

    function showIntro() {
      els.intro.classList.remove("hidden");

    const SHOT_GRID_COLUMNS = 4;
    const SHOT_CARD_WIDTH = 392;
    const SHOT_CARD_HEIGHT = 390;
    const SHOT_GRID_START_X = 330;
    const SHOT_GRID_START_Y = 72;
    const SHOT_GRID_GAP_X = 40;
    const SHOT_GRID_GAP_Y = 120;
    const SOURCE_COLUMN_X = 70;
    const SOURCE_NODE_WIDTH = 250;
    const DRAG_INERTIA_FRICTION = 0.84;
    const DRAG_INERTIA_MIN_VELOCITY = 0.045;
    const DRAG_INERTIA_MAX_DURATION = 420;
    const DRAG_MAX_VELOCITY = 1.45;

    function nodeDisplayHeight(node) {
      if (node?.type !== "shot" || state.frameworkOnly) return node?.height || 0;
      if (state.editingShot?.anchorId === node.id) return SHOT_CARD_HEIGHT + 360;
      if (state.cardDensity === "thumbnail") return 254;
      if (state.cardDensity === "standard") return 332;
      return node?.height || SHOT_CARD_HEIGHT;
    }

    function shotGridPosition(index) {
      const row = Math.floor(index / SHOT_GRID_COLUMNS);
      const col = index % SHOT_GRID_COLUMNS;
      return {
        x: SHOT_GRID_START_X + col * (SHOT_CARD_WIDTH + SHOT_GRID_GAP_X),
        y: SHOT_GRID_START_Y + row * (SHOT_CARD_HEIGHT + SHOT_GRID_GAP_Y),
      };
    }

    function buildGraph(project) {
      if (!project) return { nodes: [], edges: [] };
      const nodes = [];
      const edges = [];
      const shots = project.shots || [];
      const workflow = project.workflow || {};
      const production = project.production_mode || {};
      const style = project.visual_style || {};
      const characters = project.character_design || {};
      const shotRequests = project.shot_requests || [];

      nodes.push({
        id: "project_input",
        type: "source",
        title: "项目入口",
        subtitle: tWorkflow(workflow.workflow_mode),

        y: 72,
        width: SOURCE_NODE_WIDTH,

        meta: {
          "入口模式": tWorkflow(workflow.workflow_mode),

        text: "从 brief、spec lock、最终交付目录读取项目状态，并转成可视化节点图。",

      nodes.push({
        id: "style_lock",
        type: "style",
        title: "视觉风格锁定",
        subtitle: style.visual_style_preset_id ? tStyle(style.visual_style_preset_id) : "待定",
        x: SOURCE_COLUMN_X,

      if (shots.length) {

        shots.forEach((shot, index) => {

            id: `shot_${shot.shot_id}`,

          y,
