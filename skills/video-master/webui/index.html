    function setZoom(value) {
      state.zoom = Math.max(0.35, Math.min(2.2, value));
      renderBoard();
    }

    function setZoomAt(value, clientX, clientY) {
      const oldZoom = state.zoom;
      const nextZoom = Math.max(0.35, Math.min(2.2, value));
      if (Math.abs(nextZoom - oldZoom) < 0.001) return;
      const rect = els.viewport.getBoundingClientRect();
      const localX = clientX - rect.left;
      const localY = clientY - rect.top;
      const worldX = (els.viewport.scrollLeft + localX) / oldZoom;
      const worldY = (els.viewport.scrollTop + localY) / oldZoom;
      state.zoom = nextZoom;
      renderBoard();
      els.viewport.scrollLeft = worldX * nextZoom - localX;
      els.viewport.scrollTop = worldY * nextZoom - localY;
    }

    function fitCanvas() {
      state.zoom = 0.82;
      renderBoard();
      els.viewport.scrollTo({ left: 0, top: 0, behavior: "smooth" });
    }

    function isInteractiveTarget(target) {
      return Boolean(target.closest("button, input, textarea, select, a"));
    }

    function canvasPointFromEvent(event) {
      const worldRect = els.world.getBoundingClientRect();
      return {
        x: Math.max(0, Math.round((event.clientX - worldRect.left) / state.zoom)),
        y: Math.max(0, Math.round((event.clientY - worldRect.top) / state.zoom)),
        clientX: event.clientX,
        clientY: event.clientY,
      };
    }

    function openCanvasContextMenu(event) {
      if (event.target.closest(".graph-node") || isInteractiveTarget(event.target)) return;
      event.preventDefault();
      event.stopPropagation();
      state.contextMenu = canvasPointFromEvent(event);
      renderCanvasContextMenu();
    }

    function renderCanvasContextMenu() {
      if (!state.contextMenu) {
        closeCanvasContextMenu();
        return;
      }
      const menu = els.canvasContextMenu;
      menu.classList.remove("hidden");
      const width = menu.offsetWidth || 180;
      const height = menu.offsetHeight || 44;
      const left = Math.min(state.contextMenu.clientX, window.innerWidth - width - 10);
      const top = Math.min(state.contextMenu.clientY, window.innerHeight - height - 10);
      menu.style.left = `${Math.max(8, left)}px`;
      menu.style.top = `${Math.max(8, top)}px`;
    }

    function closeCanvasContextMenu() {
      state.contextMenu = null;
      if (!els.canvasContextMenu) return;
      els.canvasContextMenu.classList.add("hidden");
      els.canvasContextMenu.style.left = "";
      els.canvasContextMenu.style.top = "";
    }

    function openIdeaNodeAt(point) {
      if (!point) return;
      const id = `idea_draft_${Date.now()}`;
      const insertAfterShotId = nearestShotIdForPoint(point, state.graph.nodes || []);
      state.frameworkOnly = false;
      state.filter = "all";
      state.editingShot = null;
      state.draftIdea = {
        id,
        type: "idea",
        title: "新增分镜想法",
        subtitle: "未提交",
        x: point.x,
        y: point.y,
        width: 320,
        height: 212,
        idea: "",
        insert_after_shot_id: insertAfterShotId,
        meta: {
          "状态": "未提交",
          "插入位置": insertAfterShotId ? `接在 ${insertAfterShotId} 后` : "由 Codex 判断",
          "回传": "交给 Codex 生成分镜及视频提示词",
        },
        text: "写下想法后交给 Codex 生成正式分镜、分镜图提示词和 Seedance 2.0 视频提示词。",
      };
      state.selectedNodeId = id;
      closeCanvasContextMenu();
      renderBoard();
      renderInspector();
    }

    function startCanvasPan(event) {
      if (event.button !== 0 || event.target.closest(".graph-node") || isInteractiveTarget(event.target)) return;
      closeCanvasContextMenu();
      event.preventDefault();
      state.pan = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        scrollLeft: els.viewport.scrollLeft,
        scrollTop: els.viewport.scrollTop,
      };
      els.viewport.classList.add("panning");
      els.viewport.setPointerCapture(event.pointerId);
    }

    function moveCanvasPan(event) {
      if (!state.pan || event.pointerId !== state.pan.pointerId) return;
      event.preventDefault();
      els.viewport.scrollLeft = state.pan.scrollLeft - (event.clientX - state.pan.startX);
      els.viewport.scrollTop = state.pan.scrollTop - (event.clientY - state.pan.startY);
    }

    function endCanvasPan(event) {
      if (!state.pan || event.pointerId !== state.pan.pointerId) return;
      state.pan = null;
      els.viewport.classList.remove("panning");
      if (els.viewport.hasPointerCapture(event.pointerId)) {
        els.viewport.releasePointerCapture(event.pointerId);
      }
    }

    function startNodeDrag(event, nodeId) {
      if (event.button !== 0 || isInteractiveTarget(event.target)) return;
      const node = findCanvasNode(nodeId);
      if (!node) return;
      cancelNodeInertia();
      closeCanvasContextMenu();
      event.preventDefault();
      event.stopPropagation();
      const now = performance.now();
      state.selectedNodeId = nodeId;
      state.nodeDrag = {
        pointerId: event.pointerId,
        nodeId,
        startX: event.clientX,
        startY: event.clientY,
        originalX: node.x,
        originalY: node.y,
        lastX: node.x,
        lastY: node.y,
        lastTime: now,
        vx: 0,
        vy: 0,
        frameId: 0,
        moved: false,
      };
      event.currentTarget.classList.add("dragging");
      event.currentTarget.style.transform = "translate3d(0px, 0px, 0px)";
      event.currentTarget.setPointerCapture(event.pointerId);
      renderInspector();
    }

    function moveNodeDrag(event) {
      if (!state.nodeDrag || event.pointerId !== state.nodeDrag.pointerId) return;
      event.preventDefault();
      const node = findCanvasNode(state.nodeDrag.nodeId);
      if (!node) return;
      const now = performance.now();
      const dx = (event.clientX - state.nodeDrag.startX) / state.zoom;
      const dy = (event.clientY - state.nodeDrag.startY) / state.zoom;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) state.nodeDrag.moved = true;
      const nextX = Math.max(0, state.nodeDrag.originalX + dx);
      const nextY = Math.max(0, state.nodeDrag.originalY + dy);
      const elapsed = Math.max(8, now - state.nodeDrag.lastTime);
      state.nodeDrag.vx = clamp((nextX - state.nodeDrag.lastX) / elapsed, -DRAG_MAX_VELOCITY, DRAG_MAX_VELOCITY);
      state.nodeDrag.vy = clamp((nextY - state.nodeDrag.lastY) / elapsed, -DRAG_MAX_VELOCITY, DRAG_MAX_VELOCITY);
      state.nodeDrag.lastX = nextX;
      state.nodeDrag.lastY = nextY;
      state.nodeDrag.lastTime = now;
      node.x = nextX;
      node.y = nextY;
      requestNodeDragFrame();
    }

    function endNodeDrag(event) {
      if (!state.nodeDrag || event.pointerId !== state.nodeDrag.pointerId) return;
      const drag = state.nodeDrag;
      const node = findCanvasNode(state.nodeDrag.nodeId);
      const moved = state.nodeDrag.moved;
      const nodeEl = findNodeElement(state.nodeDrag.nodeId);
      if (drag.frameId) {
        cancelAnimationFrame(drag.frameId);
        drag.frameId = 0;
        applyNodeDragFrame();
      }
      if (nodeEl) {
        nodeEl.classList.remove("dragging");
        if (nodeEl.hasPointerCapture(event.pointerId)) {
          nodeEl.releasePointerCapture(event.pointerId);
        }
      }
      state.nodeDrag = null;
      if (moved) state.suppressClickUntil = Date.now() + 250;
      if (moved && node && nodeEl && startNodeInertia(node, nodeEl, drag)) {
        renderInspector();
        return;
      }
      commitNodePosition(node, nodeEl);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function requestNodeDragFrame() {
      if (!state.nodeDrag || state.nodeDrag.frameId) return;
      state.nodeDrag.frameId = requestAnimationFrame(applyNodeDragFrame);
    }

    function applyNodeDragFrame() {
      const drag = state.nodeDrag;
      if (!drag) return;
      drag.frameId = 0;
      const node = findCanvasNode(drag.nodeId);
      const nodeEl = findNodeElement(drag.nodeId);
      if (!node || !nodeEl) return;
      applyNodeTransform(nodeEl, node, drag.originalX, drag.originalY);
      updateConnectedEdgesDuringDrag(drag.nodeId);
    }

    function applyNodeTransform(nodeEl, node, originX, originY) {
      const offsetX = node.x - originX;
      const offsetY = node.y - originY;
      nodeEl.style.transform = `translate3d(${offsetX.toFixed(2)}px, ${offsetY.toFixed(2)}px, 0px)`;
    }

    function startNodeInertia(node, nodeEl, drag) {
      const speed = Math.hypot(drag.vx, drag.vy);
      if (speed < DRAG_INERTIA_MIN_VELOCITY) return false;
      const now = performance.now();
      nodeEl.classList.add("inertia");
      state.nodeInertia = {
        nodeId: node.id,
        originalX: drag.originalX,
        originalY: drag.originalY,
        vx: drag.vx,
        vy: drag.vy,
        lastTime: now,
        startedAt: now,
        frameId: requestAnimationFrame(stepNodeInertia),
      };
      return true;
    }

    function stepNodeInertia(now) {
      const inertia = state.nodeInertia;
      if (!inertia) return;
      const node = findCanvasNode(inertia.nodeId);
      const nodeEl = findNodeElement(inertia.nodeId);
      if (!node || !nodeEl) {
        state.nodeInertia = null;
        return;
      }
      const elapsed = Math.min(32, Math.max(8, now - inertia.lastTime));
      inertia.lastTime = now;
      node.x = Math.max(0, node.x + inertia.vx * elapsed);
      node.y = Math.max(0, node.y + inertia.vy * elapsed);
      if (node.x === 0 && inertia.vx < 0) inertia.vx = 0;
      if (node.y === 0 && inertia.vy < 0) inertia.vy = 0;
      const friction = Math.pow(DRAG_INERTIA_FRICTION, elapsed / 16.67);
      inertia.vx *= friction;
      inertia.vy *= friction;
      applyNodeTransform(nodeEl, node, inertia.originalX, inertia.originalY);
      updateConnectedEdgesDuringDrag(inertia.nodeId);
      const speed = Math.hypot(inertia.vx, inertia.vy);
      if (speed > DRAG_INERTIA_MIN_VELOCITY && now - inertia.startedAt < DRAG_INERTIA_MAX_DURATION) {
        inertia.frameId = requestAnimationFrame(stepNodeInertia);
        return;
      }
      state.nodeInertia = null;
      commitNodePosition(node, nodeEl);
    }

    function cancelNodeInertia() {
      const inertia = state.nodeInertia;
      if (!inertia) return;
      cancelAnimationFrame(inertia.frameId);
      const node = findCanvasNode(inertia.nodeId);
      const nodeEl = findNodeElement(inertia.nodeId);
      state.nodeInertia = null;
      commitNodePosition(node, nodeEl, { rerender: false });
    }

    function commitNodePosition(node, nodeEl, options = {}) {
      if (!node) return;
      const { save = true, rerender = true } = options;
      if (nodeEl) {
        nodeEl.style.left = `${node.x}px`;
        nodeEl.style.top = `${node.y}px`;
        nodeEl.style.transform = "";
        nodeEl.classList.remove("dragging", "inertia");
      }
      if (save) saveNodeLayout(node);
      if (rerender) renderBoard();
      renderInspector();
    }

    function findNodeElement(nodeId) {
      return Array.from(els.nodeLayer.querySelectorAll("[data-node]")).find((item) => item.dataset.node === nodeId);
    }

    function updatePanelVisibility() {
      const app = document.querySelector(".app");
      app.classList.toggle("side-hidden", state.sideHidden);
      app.classList.toggle("inspector-hidden", state.inspectorHidden);
      setTimeout(renderBoard, 0);
    }

    function showError(error) {
      els.serverState.textContent = "服务异常";
      els.inspectorType.textContent = "错误";
      els.inspector.innerHTML = `<div class="empty error">${escapeHtml(error.message || error)}</div>`;
    }

    els.refreshButton.addEventListener("click", () => loadProjects(false).catch(showError));
    els.enterWorkbenchButton.addEventListener("click", hideIntro);
    els.pickProjectButton.addEventListener("click", () => {
      state.sideHidden = false;
      updatePanelVisibility();
      hideIntro();
    });
    els.showIntroButton.addEventListener("click", showIntro);
    els.introVideo.addEventListener("error", () => {
      showIntroFallback();
    });
    els.fitButton.addEventListener("click", fitCanvas);
    els.zoomInButton.addEventListener("click", () => setZoom(state.zoom + 0.1));
    els.zoomOutButton.addEventListener("click", () => setZoom(state.zoom - 0.1));
    els.resetZoomButton.addEventListener("click", () => setZoom(1));
    els.toggleFrameworkButton.addEventListener("click", toggleFrameworkOnly);
    els.canvasModeSelect.addEventListener("change", () => setFilter(els.canvasModeSelect.value));
    els.rootInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") loadProjects(true).catch(showError);
    });
    els.writeStateButton.addEventListener("click", () => {
      if (!state.currentProject) return;
      loadProject(state.currentProject, true).catch(showError);
    });
    els.canvasContextMenu.addEventListener("click", (event) => {
      event.stopPropagation();
      const addButton = event.target.closest("[data-context-add-idea]");
      if (addButton) openIdeaNodeAt(state.contextMenu);
    });
    els.canvasContextMenu.addEventListener("pointerdown", (event) => event.stopPropagation());
    els.viewport.addEventListener("contextmenu", openCanvasContextMenu);
    els.viewport.addEventListener("pointerdown", startCanvasPan);
    els.viewport.addEventListener("pointermove", moveCanvasPan);
    els.viewport.addEventListener("pointerup", endCanvasPan);
    els.viewport.addEventListener("pointercancel", endCanvasPan);
    els.viewport.addEventListener("wheel", (event) => {
      if (isInteractiveTarget(event.target)) return;
      event.preventDefault();
      const delta = event.deltaY > 0 ? -0.08 : 0.08;
      setZoomAt(state.zoom + delta, event.clientX, event.clientY);
    }, { passive: false });
    window.addEventListener("pointermove", moveNodeDrag);
    window.addEventListener("pointerup", endNodeDrag);
    window.addEventListener("pointercancel", endNodeDrag);
    window.addEventListener("pointermove", moveConnectionDrag);
    window.addEventListener("pointerup", finishConnectionDrag);
    window.addEventListener("pointercancel", finishConnectionDrag);
    window.addEventListener("click", closeCanvasContextMenu);
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        clearConnectionDrag();
        closeCanvasContextMenu();
        renderEdgesOnly();
      }
    });
    if (sessionStorage.getItem("video-master-intro-seen") === "1") {
      els.intro.classList.add("hidden");
    }
    updatePanelVisibility();

    loadProjects(true).catch(showError);
  </script>
</body>
</html>
