          height: 212,
          ideaRequest: request,
          meta: {
            "状态": ideaStatusLabel(request.status),
            "插入位置": insertAfterShotId ? `接在 ${insertAfterShotId} 后` : "由 Codex 判断",
          },
          text: request.idea || "等待 Codex 生成正式分镜。",
        };
        nodes.push(requestNode);
        if (insertAfterShotId) {
          edges.push([`shot_${insertAfterShotId}`, requestNode.id, "idea-link"]);
        }
      });

      const lastShotId = shots.length ? `shot_${shots[shots.length - 1].shot_id}` : "shot_placeholder";
      const usedColumns = shots.length ? Math.min(shots.length, SHOT_GRID_COLUMNS) : 1;
      const gridRows = Math.max(1, Math.ceil(Math.max(shots.length, 1) / SHOT_GRID_COLUMNS));
      const gridRight = SHOT_GRID_START_X + usedColumns * SHOT_CARD_WIDTH + Math.max(0, usedColumns - 1) * SHOT_GRID_GAP_X;
      const gridHeight = gridRows * SHOT_CARD_HEIGHT + Math.max(0, gridRows - 1) * SHOT_GRID_GAP_Y;
      const finalX = gridRight + 40;
      const finalY = SHOT_GRID_START_Y + Math.max(0, (gridHeight - 178) / 2);

      nodes.push({
        id: "final_delivery",
        type: "deliverable",
        title: "最终交付包",
        subtitle: "最终交付目录",
        x: finalX,
        y: finalY,
        width: 300,
        height: 178,
        meta: {
          "分镜总览": project.deliverables?.storyboard_overview?.exists ? "已生成" : "缺失",
          "制作总表": project.deliverables?.workbook?.exists ? "已生成" : "缺失",
          "预览视频": project.deliverables?.preview_video?.exists ? "已生成" : "缺失",
        },
        text: "最终交付目录汇总分镜图、提示词、字幕、预览视频、制作总表和包装素材。",
      });

      edges.push([lastShotId, "final_delivery", "main"]);

      applySavedLayout(project, nodes);
      return { nodes, edges };
    }

    function renderProject() {
      const project = state.project;
      if (!project) {
        els.projectTitle.textContent = "未选择项目";
        els.modeBadges.innerHTML = "";
        els.graphSummary.textContent = "未选择";
        els.miniMap.innerHTML = `<div class="empty">暂无项目</div>`;
        renderBoard();
        renderInspector();
        renderVoiceoverPanel();
        return;
      }

      const workflow = project.workflow || {};
      const style = project.visual_style || {};
      const shots = project.shots || [];
      const nodes = state.graph.nodes || [];
      const edges = canvasEdges();
      els.projectTitle.textContent = "分镜工作台";
      els.modeBadges.innerHTML = [
        badge(project.project?.name || "未命名项目", "project-context"),
        badge(tWorkflow(workflow.workflow_mode), statusClass(workflow.workflow_mode || "guided")),
        badge(`${shots.length} 个分镜`),
        badge(style.visual_style_preset_id ? tStyle(style.visual_style_preset_id) : "视觉风格待定", "style"),
        badge(packagingStatus(project), "skipped"),
      ].join("");
      els.graphSummary.textContent = state.frameworkOnly ? `${shots.length} 分镜框架` : `${nodes.length} 节点 / ${edges.length} 连线`;
      renderMiniMap(project);
      renderBoard();
      renderInspector();
      renderVoiceoverPanel();
    }

    function renderMiniMap(project) {
      const nodes = state.graph.nodes || [];
      const shots = project.shots || [];
      const promptFiles = Object.values(project.prompts || {});
      const promptReady = promptFiles.filter((item) => item && item.exists).length;
      const deliverables = Object.values(project.deliverables || {}).filter((item) => item && item.exists !== undefined);
      const deliverableReady = deliverables.filter((item) => item.exists).length;
      const rows = [
        ["节点", nodes.length, Math.min(nodes.length / 18, 1)],
        ["分镜", shots.length, Math.min(shots.length / 12, 1)],
        ["提示词", `${promptReady}/${promptFiles.length}`, promptFiles.length ? promptReady / promptFiles.length : 0],
        ["交付物", `${deliverableReady}/${deliverables.length}`, deliverables.length ? deliverableReady / deliverables.length : 0],
      ];
      els.miniMap.innerHTML = rows.map(([label, value, ratio]) => `
        <div class="mini-row">
          <span>${escapeHtml(label)} ${escapeHtml(value)}</span>
          <span class="mini-bar"><i style="width:${Math.round(Number(ratio) * 100)}%"></i></span>
        </div>
      `).join("");
    }

    function measureCanvasBounds(nodes = filteredNodes()) {
      const maxX = Math.max(1500, ...nodes.map((node) => node.x + node.width + 100));
      const maxY = Math.max(820, ...nodes.map((node) => node.y + nodeDisplayHeight(node) + 100));
      return { maxX, maxY };
    }

    function applyCanvasZoom() {
      const bounds = state.canvasBounds || measureCanvasBounds();
      const scaledWidth = Math.max(bounds.maxX * state.zoom, els.viewport.clientWidth + 120);
      const scaledHeight = Math.max(bounds.maxY * state.zoom, els.viewport.clientHeight + 120);
      els.world.style.width = `${scaledWidth}px`;
      els.world.style.height = `${scaledHeight}px`;
      els.connectionLayer.setAttribute("width", bounds.maxX);
      els.connectionLayer.setAttribute("height", bounds.maxY);
      els.world.style.transform = `translate3d(0, 0, 0) scale(${state.zoom})`;
    }

    function renderBoard() {
      cancelNodeInertia();
      const visibleNodes = filteredNodes();
      const visibleIds = new Set(visibleNodes.map((node) => node.id));
      const visibleEdges = canvasEdges().filter(([from, to]) => visibleIds.has(from) && visibleIds.has(to));
      state.canvasBounds = measureCanvasBounds(visibleNodes);
      applyCanvasZoom();
      state.frameworkOnly = state.filter === "framework";
      els.world.classList.toggle("framework-only", state.frameworkOnly);
      els.canvasModeSelect.value = state.filter;
      els.cardDensitySelect.value = state.cardDensity;

      renderEdgesOnly(visibleNodes, visibleEdges);
      els.nodeLayer.innerHTML = visibleNodes.map(renderNode).join("");

      els.nodeLayer.querySelectorAll("[data-node]").forEach((nodeEl) => {
        nodeEl.addEventListener("click", () => {
          if (Date.now() < state.suppressClickUntil) return;
          state.selectedEdgeKey = "";
          state.selectedNodeId = nodeEl.dataset.node;
          renderBoard();
          renderInspector();
        });
        nodeEl.addEventListener("pointerdown", (event) => startNodeDrag(event, nodeEl.dataset.node));
      });
      els.nodeLayer.querySelectorAll("[data-pin-node]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          toggleNodePin(button.dataset.pinNode);
        });
      });
      bindShotCanvasActions();
      bindConnectionPorts();
    }

    function renderEdgesOnly(nodes = filteredNodes(), edges = null) {
      const visibleIds = new Set(nodes.map((node) => node.id));
      const visibleEdges = edges || canvasEdges().filter(([from, to]) => visibleIds.has(from) && visibleIds.has(to));
      els.connectionLayer.innerHTML = [
        renderEdgeDefs(),
        visibleEdges.map((edge) => renderEdge(edge, nodes)).join(""),
        renderConnectionPreview(nodes),
      ].join("");
    }

    function edgeElementKey(edge) {
      return edge.map((value) => String(value || "main").replaceAll("|", "%7C")).join("|");
    }

    function findEdgeGroup(edge) {
      const key = edgeElementKey(edge);
      return Array.from(els.connectionLayer.querySelectorAll("[data-edge-key]")).find((group) => group.dataset.edgeKey === key);
    }

    function manualEdgeControlId(fromId, toId) {
      return `${fromId}->${toId}`;
    }

    function visibleEdgesForNodes(nodes) {
      const visibleIds = new Set(nodes.map((node) => node.id));
      return canvasEdges().filter(([from, to]) => visibleIds.has(from) && visibleIds.has(to));
    }

    function updateConnectedEdgesDuringDrag(nodeId) {
      const nodes = filteredNodes();
      const connectedEdges = visibleEdgesForNodes(nodes).filter(([from, to]) => from === nodeId || to === nodeId);
      if (!connectedEdges.length) return;
      for (const edge of connectedEdges) {
        const group = findEdgeGroup(edge);
        const nextMarkup = renderEdge(edge, nodes).trim();
        if (!group || !nextMarkup) {
          renderEdgesOnly(nodes);
          return;
        }
        group.outerHTML = nextMarkup;
      }
    }

    function requestConnectionPreviewFrame() {
      if (!state.connectionDrag || state.connectionDrag.frameId) return;
      state.connectionDrag.frameId = requestAnimationFrame(updateConnectionPreviewFrame);
    }

    function updateConnectionPreviewFrame() {
      const drag = state.connectionDrag;
      if (!drag) return;
      drag.frameId = 0;
      updateConnectionPreviewOnly();
    }

    function updateConnectionPreviewOnly(nodes = filteredNodes()) {
      const current = els.connectionLayer.querySelector('[data-edge-type="connection-preview"]');
      const nextMarkup = renderConnectionPreview(nodes).trim();
      if (current && nextMarkup) {
        current.outerHTML = nextMarkup;
      } else if (current) {
        current.remove();
      } else if (nextMarkup) {
        els.connectionLayer.insertAdjacentHTML("beforeend", nextMarkup);
      }
    }

    function filteredNodes() {
      const nodes = canvasNodes();
      if (state.filter === "framework" || state.frameworkOnly) {
        return nodes.filter((node) => node.type === "shot");
      }
      if (state.filter === "shots") {
        return nodes.filter((node) => ["source", "style", "character", "shot", "deliverable"].includes(node.type));
      }
      if (state.filter === "packaging") {
        return nodes.filter((node) => ["shot", "copywriting", "packaging", "deliverable"].includes(node.type));
      }
      return nodes;
    }

    function canvasNodes() {
      const nodes = [...(state.graph.nodes || [])];
      if (state.draftIdea) nodes.push(state.draftIdea);
      return nodes;
    }

    function canvasEdges() {
      const deleted = new Set(state.deletedEdges || []);
      const edges = (state.graph.edges || []).filter(([from, to]) => !deleted.has(manualEdgeControlId(from, to)));
      (state.manualEdges || []).forEach(([from, to]) => {
        if (!from || !to || from === to) return;
        if (deleted.has(manualEdgeControlId(from, to))) return;
        const manualEdge = [from, to, "manual"];
        const existingIndex = edges.findIndex(([edgeFrom, edgeTo]) => edgeFrom === from && edgeTo === to);
        if (existingIndex >= 0) {
          edges[existingIndex] = manualEdge;
        } else {
          edges.push(manualEdge);
        }
      });
      if (state.draftIdea) {
        const insertAfterShotId = state.draftIdea.insert_after_shot_id || nearestShotIdForPoint(state.draftIdea, state.graph.nodes || []);
        if (insertAfterShotId) {
          edges.push([`shot_${insertAfterShotId}`, state.draftIdea.id, "idea-link"]);
        }
      }
      return edges;
    }

    function renderEdgeDefs() {
      return `
        <defs>
          <marker id="edge-arrow-main" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
            <path d="M 1 1 L 9 5.5 L 1 10 Z" fill="rgba(125, 165, 255, 0.86)"></path>
          </marker>
          <marker id="edge-arrow-alt" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
            <path d="M 1 1 L 9 5.5 L 1 10 Z" fill="rgba(61, 214, 208, 0.76)"></path>
          </marker>
          <marker id="edge-arrow-idea" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
            <path d="M 1 1 L 9 5.5 L 1 10 Z" fill="rgba(248, 184, 78, 0.86)"></path>
          </marker>
          <marker id="edge-arrow-manual" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
            <path d="M 1 1 L 9 5.5 L 1 10 Z" fill="rgba(61, 214, 208, 0.92)"></path>
          </marker>
          <marker id="edge-arrow-preview" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
            <path d="M 1 1 L 9 5.5 L 1 10 Z" fill="rgba(226, 232, 240, 0.82)"></path>
          </marker>
        </defs>
      `;
    }

    function findCanvasNode(nodeId) {
      return canvasNodes().find((item) => item.id === nodeId);
    }

    function nearestShotIdForPoint(point, nodes = canvasNodes()) {
      const shotNodes = nodes.filter((node) => node.type === "shot" && node.shot?.shot_id);
      let nearest = null;
      let nearestDistance = Number.POSITIVE_INFINITY;
      shotNodes.forEach((node) => {
        const centerX = node.x + node.width / 2;
        const centerY = node.y + nodeDisplayHeight(node) / 2;
        const distance = Math.hypot((point?.x || 0) - centerX, (point?.y || 0) - centerY);
        if (distance < nearestDistance) {
          nearest = node;
          nearestDistance = distance;
        }
      });
      return nearest?.shot?.shot_id || "";
    }

    function edgeOrientation(from, to) {
      if (from.type === "shot" && to.type === "shot") {
        return Math.abs(from.y - to.y) < SHOT_CARD_HEIGHT * 0.45 ? "horizontal" : "vertical";
      }
      if (from.type === "shot" && to.type === "deliverable") {
        return "horizontal";
      }
      return "horizontal";
    }

    function edgeEndpoint(node, side) {
      if (node.type === "point") {
        return { x: node.x, y: node.y };
      }
      if (side === "out") {
        return { x: node.x + node.width, y: node.y + nodeDisplayHeight(node) / 2 };
      }
      return { x: node.x, y: node.y + nodeDisplayHeight(node) / 2 };
    }

    function edgePath(x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      if (dx >= 72) {
        const bend = Math.min(220, Math.max(78, dx * 0.42));
        return `M ${x1} ${y1} C ${x1 + bend} ${y1}, ${x2 - bend} ${y2}, ${x2} ${y2}`;
      }
      const loop = Math.min(260, Math.max(112, Math.abs(dy) * 0.42 + 92));
      const gutter = Math.max(x1, x2) + loop;
      const midY = y1 + dy * 0.5;
      return `M ${x1} ${y1} C ${gutter} ${y1}, ${gutter} ${midY}, ${gutter} ${midY} C ${gutter} ${y2}, ${x2 - 82} ${y2}, ${x2} ${y2}`;
    }

    function edgePathWithControl(x1, y1, cx, cy, x2, y2) {
      return `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`;
    }

    function defaultManualEdgeControl(start, end) {
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      if (dx >= 72) {
        return {
          x: Math.round(start.x + dx * 0.5),
          y: Math.round(start.y + dy * 0.5),
        };
      }
      const loop = Math.min(260, Math.max(112, Math.abs(dy) * 0.42 + 92));
      return {
        x: Math.round(Math.max(start.x, end.x) + loop),
        y: Math.round(start.y + dy * 0.5),
      };
    }

    function manualEdgeControlPoint(edge, start, end) {
      const [fromId, toId] = edge;
      const controlId = manualEdgeControlId(fromId, toId);
      const saved = state.manualEdgeControls?.[controlId];
      if (saved && Number.isFinite(saved.x) && Number.isFinite(saved.y)) {
        return { x: saved.x, y: saved.y };
      }
      return defaultManualEdgeControl(start, end);
    }

    function isAdjustableEdge(edge, from, to) {
      const edgeType = edge?.[2] || "main";
      return from?.type === "shot" && to?.type === "shot" && !["connection-preview", "idea-link"].includes(edgeType);
    }

    function currentEdgeForControl(fromNodeId, toNodeId, nodes = filteredNodes()) {
      return visibleEdgesForNodes(nodes).find(([from, to], index, edges) => {
        const edge = edges[index];
        const fromNode = nodes.find((node) => node.id === from);
        const toNode = nodes.find((node) => node.id === to);
        return from === fromNodeId && to === toNodeId && isAdjustableEdge(edge, fromNode, toNode);
      }) || [fromNodeId, toNodeId, "manual"];
    }

    function edgeMarkerId(edgeType) {
      if (edgeType === "manual") return "edge-arrow-manual";
      if (edgeType === "idea-link") return "edge-arrow-idea";
      if (edgeType === "connection-preview") return "edge-arrow-preview";
      if (edgeType === "alt") return "edge-arrow-alt";
      return "edge-arrow-main";
    }

    function renderEdge(edge, nodes) {
      const [fromId, toId, edgeType] = edge;
      const from = nodes.find((node) => node.id === fromId);
      const to = nodes.find((node) => node.id === toId);
      if (!from || !to) return "";
      const start = edgeEndpoint(from, "out");
      const end = edgeEndpoint(to, "in");
      const adjustable = isAdjustableEdge(edge, from, to);
      const control = adjustable ? manualEdgeControlPoint(edge, start, end) : null;
      const d = control
        ? edgePathWithControl(start.x, start.y, control.x, control.y, end.x, end.y)
        : edgePath(start.x, start.y, end.x, end.y);
      const edgeClass = ["alt", "idea-link", "manual", "connection-preview"].includes(edgeType) ? ` ${edgeType}` : "";
      const controlId = manualEdgeControlId(fromId, toId);
      const selectedClass = state.selectedEdgeKey === controlId ? " selected" : "";
      const selectMarkup = adjustable ? `
          <path class="edge-select-hit" data-edge-select="${escapeHtml(controlId)}" data-edge-select-from="${escapeHtml(fromId)}" data-edge-select-to="${escapeHtml(toId)}" d="${d}"></path>
        ` : "";
      const controlMarkup = adjustable && control ? `
          <circle class="edge-control-halo" data-edge-control="${escapeHtml(controlId)}" data-edge-control-from="${escapeHtml(fromId)}" data-edge-control-to="${escapeHtml(toId)}" data-edge-control-type="${escapeHtml(edgeType || "main")}" cx="${control.x}" cy="${control.y}" r="18"></circle>
          <circle class="edge-control-handle" data-edge-control="${escapeHtml(controlId)}" data-edge-control-from="${escapeHtml(fromId)}" data-edge-control-to="${escapeHtml(toId)}" data-edge-control-type="${escapeHtml(edgeType || "main")}" cx="${control.x}" cy="${control.y}" r="7"></circle>
        ` : "";
      const deleteMarkup = adjustable && control ? `
          <g class="edge-delete-button" data-edge-delete="${escapeHtml(controlId)}" data-edge-delete-from="${escapeHtml(fromId)}" data-edge-delete-to="${escapeHtml(toId)}" data-edge-delete-type="${escapeHtml(edgeType || "main")}" transform="translate(${control.x + 28} ${control.y - 24})" role="button" tabindex="0" aria-label="删除连线">
            <title>删除连线</title>
            <circle class="edge-delete-hit" cx="0" cy="0" r="18"></circle>
            <circle class="edge-delete-icon" cx="0" cy="0" r="10"></circle>
            <text x="0" y="0">×</text>
          </g>
        ` : "";
      const labelX = control?.x ?? (start.x + end.x) / 2;
      const labelY = control?.y ?? (start.y + end.y) / 2;
      const selectionLabelMarkup = selectedClass ? `
          <text class="edge-selection-label" x="${labelX}" y="${labelY - 30}">拖动黄点调整 / Delete 删除</text>
        ` : "";
      return `
        <g data-edge-key="${escapeHtml(edgeElementKey(edge))}" data-edge-from="${escapeHtml(fromId)}" data-edge-to="${escapeHtml(toId)}" data-edge-type="${escapeHtml(edgeType || "main")}">
          ${selectMarkup}
          <path class="edge-path${edgeClass}${selectedClass}" d="${d}" marker-end="url(#${edgeMarkerId(edgeType)})"></path>
          <circle class="edge-dot${edgeClass}${selectedClass}" cx="${start.x}" cy="${start.y}" r="7"></circle>
          <circle class="edge-dot${edgeClass}${selectedClass}" cx="${end.x}" cy="${end.y}" r="7"></circle>
          ${selectionLabelMarkup}
          ${controlMarkup}
          ${deleteMarkup}
        </g>
      `;
    }

    function renderConnectionPreview(nodes) {
      if (!state.connectionDrag) return "";
      const from = nodes.find((node) => node.id === state.connectionDrag.fromNodeId);
      if (!from) return "";
      const pointer = {
        id: "__connection_pointer",
        type: "point",
        x: state.connectionDrag.x,
        y: state.connectionDrag.y,
        width: 0,
        height: 0,
      };
      return renderEdge([from.id, pointer.id, "connection-preview"], [...nodes, pointer]);
    }

    function renderNode(node) {
      const selected = node.id === state.selectedNodeId ? " selected" : "";
      const pinned = isNodeLayoutPinned(node.id);
      const pinnedClass = pinned ? " pinned" : "";
      const body = node.type === "shot" ? renderShotBody(node) : node.type === "idea" ? renderIdeaNodeBody(node) : renderTextBody(node);
      const headerPort = node.type === "shot" ? "" : `<span class="node-port"></span>`;
      const flowPorts = renderNodePorts(node);
      const displayHeight = nodeDisplayHeight(node);
      const densityClass = node.type === "shot" ? ` density-${escapeHtml(state.cardDensity)}` : "";
      const nodeId = escapeHtml(node.id);
      const pinLabel = pinned ? "取消固定节点" : "固定节点";
      return `
        <article class="graph-node ${escapeHtml(node.type)}${densityClass}${selected}${pinnedClass}" data-node="${nodeId}" style="left:${node.x}px;top:${node.y}px;width:${node.width}px;min-height:${displayHeight}px">
          <div class="node-head">
            <span class="node-title">${escapeHtml(node.title)}</span>
            <span class="node-head-actions">
              <span class="node-drag-hint">拖动</span>
              <button class="node-pin${pinned ? " active" : ""}" type="button" data-pin-node="${nodeId}" aria-pressed="${String(pinned)}" title="${pinLabel}">${pinned ? "已固定" : "固定"}</button>
              ${headerPort}
            </span>
          </div>
          ${body}
          ${flowPorts}
        </article>
      `;
    }

    function renderNodePorts(node) {
      if (node.type !== "shot" || !node.shot?.shot_id) return "";
      const nodeId = escapeHtml(node.id);
      const shotId = escapeHtml(node.shot.shot_id || "");
      return `
        <div class="node-flow-ports">
          <button class="flow-port flow-port-in" type="button" data-connect-port="in" data-connect-node="${nodeId}" title="${shotId} 连接首端">
            <span class="port-dot">首</span>
            <span class="port-label">连接首端</span>
          </button>
          <button class="flow-port flow-port-out" type="button" data-connect-port="out" data-connect-node="${nodeId}" title="${shotId} 连接尾端">
            <span class="port-dot">尾</span>
            <span class="port-label">连接尾端</span>
          </button>
        </div>
      `;
    }

    function renderShotBindings(shot) {
      const copywriting = shot.copywriting || {};
      const packaging = shot.packaging || {};
      const blocks = [];
      if (copywriting.voiceover || copywriting.sfx) {
        const lines = [
          copywriting.voiceover ? `口播：${copywriting.voiceover}` : "",
          copywriting.sfx ? `音效：${copywriting.sfx}` : "",
        ].filter(Boolean).join(" / ");
        blocks.push(`
          <div class="shot-binding">
            <div class="shot-binding-head"><span class="binding-chip">文案绑定</span><span>${escapeHtml(shot.shot_id || "")}</span></div>
            <div class="shot-binding-text">${escapeHtml(lines)}</div>
          </div>
        `);
      }
      if (packaging.role || packaging.summary) {
        blocks.push(`
          <div class="shot-binding">
            <div class="shot-binding-head"><span class="binding-chip packaging-chip">包装绑定</span><span>${escapeHtml(packaging.role || packaging.status || "包装")}</span></div>
            <div class="shot-binding-text">${escapeHtml(packaging.summary || packaging.status || "包装资产绑定到当前分镜。")}</div>
          </div>
        `);
      }
      if (!blocks.length) return "";
      return `<div class="shot-bindings">${blocks.join("")}</div>`;
    }

    function renderShotInsertOptions(selected = "") {
      const shots = state.project?.shots || [];
      const options = [`<option value="">由 Codex 判断</option>`];
      shots.forEach((shot) => {
        const value = shot.shot_id || "";
        const label = `${shot.shot_id || "分镜"} ${shot.beat || ""}`.trim();

    function bindConnectionPorts() {
      els.nodeLayer.querySelectorAll("[data-connect-port]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
        });
      });
      els.nodeLayer.querySelectorAll('[data-connect-port="out"]').forEach((button) => {
        button.addEventListener("pointerdown", startConnectionDrag);
      });
    }

    function startConnectionDrag(event) {
      if (event.button !== 0) return;
      const fromNodeId = event.currentTarget.dataset.connectNode || "";
      const fromNode = findCanvasNode(fromNodeId);
      if (!fromNode || fromNode.type !== "shot") return;
      event.preventDefault();
      event.stopPropagation();
      cancelNodeInertia();
      closeCanvasContextMenu();
      const point = canvasPointFromEvent(event);
      state.connectionDrag = {
        pointerId: event.pointerId,
        fromNodeId,
        x: point.x,
        y: point.y,
        frameId: 0,
      };
      event.currentTarget.classList.add("active");
      event.currentTarget.setPointerCapture(event.pointerId);
      els.viewport.classList.add("connecting");
      renderEdgesOnly();
    }

    function moveConnectionDrag(event) {
      if (!state.connectionDrag || event.pointerId !== state.connectionDrag.pointerId) return;
      event.preventDefault();
      const point = canvasPointFromEvent(event);
      state.connectionDrag.x = point.x;
      state.connectionDrag.y = point.y;
      requestConnectionPreviewFrame();
    }

    function finishConnectionDrag(event) {
      if (!state.connectionDrag || event.pointerId !== state.connectionDrag.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      const drag = state.connectionDrag;
      const targetPort = document.elementFromPoint(event.clientX, event.clientY)?.closest?.('[data-connect-port="in"]');
      const targetNodeId = targetPort?.dataset.connectNode || "";
      clearConnectionDrag(drag);
      if (targetNodeId && targetNodeId !== drag.fromNodeId) {
        saveManualEdge(drag.fromNodeId, targetNodeId);
        return;
      }
      renderEdgesOnly();
    }

    function clearConnectionDrag(drag = state.connectionDrag) {
      if (!drag) return;
      if (drag.frameId) {
        cancelAnimationFrame(drag.frameId);
      }
      const sourcePort = findNodeElement(drag.fromNodeId)?.querySelector('[data-connect-port="out"]');
      if (sourcePort) {
        sourcePort.classList.remove("active");
        if (sourcePort.hasPointerCapture?.(drag.pointerId)) {
          sourcePort.releasePointerCapture(drag.pointerId);
        }
      }
      state.connectionDrag = null;
      els.viewport.classList.remove("connecting");
    }

    function saveManualEdge(fromNodeId, toNodeId) {
      const fromNode = findCanvasNode(fromNodeId);
      const toNode = findCanvasNode(toNodeId);
      if (!fromNode || !toNode || fromNode.type !== "shot" || toNode.type !== "shot") return;
      const existing = new Set((state.manualEdges || []).map(([from, to]) => `${from}->${to}`));
      if (!existing.has(`${fromNodeId}->${toNodeId}`)) {
        state.manualEdges = [...(state.manualEdges || []), [fromNodeId, toNodeId, "manual"]];
        saveManualEdges();
      }
      const controlId = manualEdgeControlId(fromNodeId, toNodeId);
      if ((state.deletedEdges || []).includes(controlId)) {
        state.deletedEdges = (state.deletedEdges || []).filter((edgeId) => edgeId !== controlId);
        saveDeletedEdges();
      }
      if (!state.manualEdgeControls?.[controlId]) {
        const start = edgeEndpoint(fromNode, "out");
        const end = edgeEndpoint(toNode, "in");
        state.manualEdgeControls = {
          ...(state.manualEdgeControls || {}),
          [controlId]: defaultManualEdgeControl(start, end),
        };
        saveManualEdgeControls();
      }
      renderBoard();
      renderInspector();
    }

    function setManualEdgeControlActive(controlId, active) {
      els.connectionLayer.querySelectorAll("[data-edge-control]").forEach((item) => {
        if (item.dataset.edgeControl === controlId) item.classList.toggle("active", active);
      });
    }

    function updateManualEdgeControlShape(fromNodeId, toNodeId) {
      const nodes = filteredNodes();
      const from = nodes.find((node) => node.id === fromNodeId);
      const to = nodes.find((node) => node.id === toNodeId);
      const edge = currentEdgeForControl(fromNodeId, toNodeId, nodes);
      const group = findEdgeGroup(edge);
      if (!from || !to || !group) {
        renderEdgesOnly(nodes);
        return;
      }
      const start = edgeEndpoint(from, "out");
      const end = edgeEndpoint(to, "in");
      const control = manualEdgeControlPoint(edge, start, end);
      const path = group.querySelector(".edge-path");
      if (!path) {
        renderEdgesOnly(nodes);
        return;
      }
      path.setAttribute("d", edgePathWithControl(start.x, start.y, control.x, control.y, end.x, end.y));
      const dots = group.querySelectorAll(".edge-dot");
      if (dots[0]) {
        dots[0].setAttribute("cx", start.x);
        dots[0].setAttribute("cy", start.y);
      }
      if (dots[1]) {
        dots[1].setAttribute("cx", end.x);
        dots[1].setAttribute("cy", end.y);
      }
      group.querySelectorAll("[data-edge-control]").forEach((handle) => {
        handle.setAttribute("cx", control.x);
        handle.setAttribute("cy", control.y);
      });
      group.querySelectorAll("[data-edge-delete]").forEach((button) => {
        button.setAttribute("transform", `translate(${control.x + 28} ${control.y - 24})`);
      });
    }

    function startEdgeControlDrag(event) {
      const handle = event.target.closest?.("[data-edge-control]");
      if (!handle || event.button !== 0) return;
      const fromNodeId = handle.dataset.edgeControlFrom || "";
      const toNodeId = handle.dataset.edgeControlTo || "";
      if (!fromNodeId || !toNodeId) return;
      event.preventDefault();
      event.stopPropagation();
      cancelNodeInertia();
      closeCanvasContextMenu();
      const point = canvasPointFromEvent(event);
      const controlId = manualEdgeControlId(fromNodeId, toNodeId);
      state.manualEdgeControls = {
        ...(state.manualEdgeControls || {}),
        [controlId]: { x: point.x, y: point.y },
      };
      state.edgeControlDrag = {
        pointerId: event.pointerId,
        controlId,
        fromNodeId,
        toNodeId,
        handle,
        frameId: 0,
      };
      setManualEdgeControlActive(controlId, true);
      handle.setPointerCapture?.(event.pointerId);
      updateManualEdgeControlShape(fromNodeId, toNodeId);
    }

    function requestEdgeControlFrame() {
      const drag = state.edgeControlDrag;
      if (!drag || drag.frameId) return;
      drag.frameId = requestAnimationFrame(applyEdgeControlFrame);
    }

    function applyEdgeControlFrame() {
      const drag = state.edgeControlDrag;
      if (!drag) return;
      drag.frameId = 0;
      updateManualEdgeControlShape(drag.fromNodeId, drag.toNodeId);
    }

    function moveEdgeControlDrag(event) {
      const drag = state.edgeControlDrag;
      if (!drag || event.pointerId !== drag.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      const point = canvasPointFromEvent(event);
      state.manualEdgeControls = {
        ...(state.manualEdgeControls || {}),
        [drag.controlId]: { x: point.x, y: point.y },
      };
      requestEdgeControlFrame();
    }

    function finishEdgeControlDrag(event) {
      const drag = state.edgeControlDrag;
      if (!drag || event.pointerId !== drag.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      clearEdgeControlDrag({ save: true });
    }

    function clearEdgeControlDrag(options = {}) {
      const drag = state.edgeControlDrag;
      if (!drag) return;
      const { save = false } = options;
      if (drag.frameId) {
        cancelAnimationFrame(drag.frameId);
        drag.frameId = 0;
        updateManualEdgeControlShape(drag.fromNodeId, drag.toNodeId);
      }
      setManualEdgeControlActive(drag.controlId, false);
      if (drag.handle?.hasPointerCapture?.(drag.pointerId)) {
        drag.handle.releasePointerCapture(drag.pointerId);
      }
      state.edgeControlDrag = null;
      if (save) saveManualEdgeControls();
      renderInspector();
    }

    function deleteCanvasEdge(fromNodeId, toNodeId) {
      const controlId = manualEdgeControlId(fromNodeId, toNodeId);
      state.manualEdges = (state.manualEdges || []).filter(([from, to]) => from !== fromNodeId || to !== toNodeId);
      if (!(state.deletedEdges || []).includes(controlId)) {
        state.deletedEdges = [...(state.deletedEdges || []), controlId];
        saveDeletedEdges();
      }
      if (state.manualEdgeControls?.[controlId]) {
        const nextControls = { ...(state.manualEdgeControls || {}) };
        delete nextControls[controlId];
        state.manualEdgeControls = nextControls;
        saveManualEdgeControls();
      }
      if (state.selectedEdgeKey === controlId) {
        state.selectedEdgeKey = "";
      }
      saveManualEdges();
      renderBoard();
      renderInspector();
    }

    function deleteManualEdge(fromNodeId, toNodeId) {
      deleteCanvasEdge(fromNodeId, toNodeId);
    }

    function selectCanvasEdge(fromNodeId, toNodeId) {
      if (!fromNodeId || !toNodeId) return;
      state.selectedEdgeKey = manualEdgeControlId(fromNodeId, toNodeId);

    async function copyShotImage(imageUrl, button) {
      if (!imageUrl) throw new Error("当前分镜还没有分镜图");
      try {
        if (!navigator.clipboard?.write || typeof ClipboardItem === "undefined") {
          throw new Error("浏览器暂不支持图片复制");
        }
        const response = await fetch(imageUrl);
        if (!response.ok) throw new Error(`图片读取失败：${response.status}`);
        let blob = await response.blob();
        const type = blob.type || imageMimeFromUrl(imageUrl);
        if (!type.startsWith("image/")) throw new Error("当前文件不是可复制图片");
        if (blob.type !== type) {
          blob = blob.slice(0, blob.size, type);
        }
        await navigator.clipboard.write([new ClipboardItem({ [type]: blob })]);
        flashShotAction(button, "已复制");
      } catch (error) {
        const absoluteUrl = new URL(imageUrl, window.location.href).href;
        await copyText(absoluteUrl);
        flashShotAction(button, "已复制地址");
      }
    }

    async function copyText(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }

    function imageMimeFromUrl(imageUrl) {
      const pathname = new URL(imageUrl, window.location.href).pathname.toLowerCase();
      if (pathname.endsWith(".jpg") || pathname.endsWith(".jpeg")) return "image/jpeg";
      if (pathname.endsWith(".webp")) return "image/webp";
      if (pathname.endsWith(".gif")) return "image/gif";
      return "image/png";
    }

    function loadManualEdges() {

          .map((edge) => [String(edge?.[0] || ""), String(edge?.[1] || ""), "manual"])
          .filter(([from, to]) => from && to && from !== to);
      } catch {

      }
    }

    function loadDeletedEdges() {

        const raw = JSON.parse(localStorage.getItem(deletedEdgesKey()) || "[]");
        if (!Array.isArray(raw)) return [];
        return Array.from(new Set(raw.map((edgeId) => String(edgeId || "")).filter(Boolean)));

    function loadManualEdgeControls() {
      if (!state.currentProject) return {};

        const raw = JSON.parse(localStorage.getItem(manualEdgeControlKey()) || "{}");
        if (!raw || Array.isArray(raw) || typeof raw !== "object") return {};
        return Object.fromEntries(Object.entries(raw)
          .map(([key, point]) => [key, { x: Number(point?.x), y: Number(point?.y) }])
          .filter(([, point]) => Number.isFinite(point.x) && Number.isFinite(point.y)));
      } catch {

    }

    function toggleNodePin(nodeId) {
      if (!nodeId) return;
      const pins = new Set(loadLayoutPins());
      const node = findCanvasNode(nodeId);
      if (pins.has(nodeId)) {
        pins.delete(nodeId);
        els.serverState.textContent = "已取消固定节点";
      } else {
        pins.add(nodeId);
        if (node) saveNodeLayout(node, { pin: false });
        els.serverState.textContent = "已固定节点";
      }
      saveLayoutPins([...pins]);
      renderProject();
    }

    function isNodeLayoutPinned(nodeId) {

    function saveNodeLayout(node, options = {}) {
      if (!state.currentProject || !node) return;
      const { pin = false } = options;
      const layout = loadSavedLayout();
      layout[node.id] = { x: Math.round(node.x), y: Math.round(node.y) };
      localStorage.setItem(layoutKey(), JSON.stringify(layout));
      if (pin) pinNodeLayout(node.id);
    }

    function applySavedLayout(project, nodes) {
      if (!project?.project?.path) return;
      const previousProject = state.currentProject;
      state.currentProject = project.project.path;
      const layout = loadSavedLayout();
      state.currentProject = previousProject;
      nodes.forEach((node) => {
        const saved = layout[node.id];
        if (saved && Number.isFinite(saved.x) && Number.isFinite(saved.y)) {
          node.x = saved.x;
          node.y = saved.y;
        }
      });
    }

    function nodeLayoutRect(node, x = node?.x || 0, y = node?.y || 0) {
      return {
        id: node?.id || "",
        x,
        y,
        width: Number(node?.width) || 0,
        height: nodeDisplayHeight(node) || Number(node?.height) || 0,
      };
    }

    function layoutRectsOverlap(a, b, padding = 22) {
      return (
        a.x < b.x + b.width + padding &&
        a.x + a.width + padding > b.x &&
        a.y < b.y + b.height + padding &&
        a.y + a.height + padding > b.y
      );
    }

    function avoidPinnedLayoutCollision(node, x, y, placedRects, stepY) {
      let nextY = Math.max(0, Math.round(y));
      const nextX = Math.max(0, Math.round(x));
      const spacingY = Math.max(120, Math.round(stepY || nodeDisplayHeight(node) + 72));
      let attempts = 0;
      while (
        attempts < 80 &&
        placedRects.some((rect) => layoutRectsOverlap(nodeLayoutRect(node, nextX, nextY), rect))
      ) {
        nextY += spacingY;
        attempts += 1;
      }
      return { x: nextX, y: nextY };
    }

    function organizeCanvasLayout() {
      if (!state.project) return;
      const pins = new Set(loadLayoutPins());
      const nodes = state.graph.nodes || [];
      const shots = nodes.filter((node) => node.type === "shot");
      const leftNodes = nodes.filter((node) => ["source", "style", "character"].includes(node.type));
      const rightNodes = nodes.filter((node) => ["copywriting", "packaging", "deliverable"].includes(node.type));
      const shotGapX = 44;
      const shotGapY = state.cardDensity === "thumbnail" ? 72 : 96;
      const shotHeight = Math.max(260, nodeDisplayHeight({ type: "shot", height: SHOT_CARD_HEIGHT }));
      const placedRects = nodes
        .filter((node) => pins.has(node.id))
        .map((node) => nodeLayoutRect(node));
      const moveNode = (node, x, y, stepY) => {
        if (!node || pins.has(node.id)) return;
        const next = avoidPinnedLayoutCollision(node, x, y, placedRects, stepY);
        node.x = next.x;
        node.y = next.y;
        saveNodeLayout(node, { pin: false });
        placedRects.push(nodeLayoutRect(node));
      };
      leftNodes.forEach((node, index) => {
        moveNode(node, SOURCE_COLUMN_X, SHOT_GRID_START_Y + index * 132, 132);
      });
      shots.forEach((node, index) => {
        const row = Math.floor(index / SHOT_GRID_COLUMNS);
        const col = index % SHOT_GRID_COLUMNS;
        const visualCol = row % 2 === 0 ? col : SHOT_GRID_COLUMNS - 1 - col;
        moveNode(
          node,
          SHOT_GRID_START_X + visualCol * (SHOT_CARD_WIDTH + shotGapX),
          SHOT_GRID_START_Y + row * (shotHeight + shotGapY),
          shotHeight + shotGapY,
        );
      });
      const usedColumns = Math.min(Math.max(shots.length, 1), SHOT_GRID_COLUMNS);
      const rightX = SHOT_GRID_START_X + usedColumns * (SHOT_CARD_WIDTH + shotGapX) + 24;
      rightNodes.forEach((node, index) => {
        moveNode(node, rightX, SHOT_GRID_START_Y + index * 190, 190);
      });
      state.selectedEdgeKey = "";
      els.serverState.textContent = pins.size ? "已整理画布，已避开固定节点" : "已整理画布";
      renderProject();
    }

    function syncZoomAnchorScroll() {
      if (!state.zoomAnchor) return;
      els.viewport.scrollLeft = state.zoomAnchor.worldX * state.zoom - state.zoomAnchor.localX;
      els.viewport.scrollTop = state.zoomAnchor.worldY * state.zoom - state.zoomAnchor.localY;
    }

    function flushCanvasZoom() {
      state.zoomFrame = 0;
      const diff = state.targetZoom - state.zoom;
      if (Math.abs(diff) < 0.001) {
        state.zoom = state.targetZoom;
        applyCanvasZoom();
        syncZoomAnchorScroll();
        state.zoomAnchor = null;
        state.zoomAnimationActive = false;
        return;
      }
      state.zoom += diff * ZOOM_EASING;
      applyCanvasZoom();
      syncZoomAnchorScroll();
      state.zoomFrame = requestAnimationFrame(flushCanvasZoom);
    }

    function setCanvasZoom(value, options = {}) {
      const oldZoom = state.zoom;
      const baseZoom = Number.isFinite(state.targetZoom) ? state.targetZoom : oldZoom;
      const nextZoom = clamp(value, MIN_CANVAS_ZOOM, MAX_CANVAS_ZOOM);
      if (Math.abs(nextZoom - baseZoom) < 0.001) return;
      if (Number.isFinite(options.clientX) && Number.isFinite(options.clientY)) {
        const rect = els.viewport.getBoundingClientRect();
        const localX = options.clientX - rect.left;
        const localY = options.clientY - rect.top;
        state.zoomAnchor = {
          localX,
          localY,
          worldX: (els.viewport.scrollLeft + localX) / oldZoom,
          worldY: (els.viewport.scrollTop + localY) / oldZoom,
        };
      } else {
        state.zoomAnchor = null;
      }
      state.targetZoom = nextZoom;
      state.hasZoomPreference = true;
      scheduleUiPreferenceSave();
      if (options.smooth === false) {
        state.zoom = state.targetZoom;
        applyCanvasZoom();
        syncZoomAnchorScroll();
        state.zoomAnchor = null;
        state.zoomAnimationActive = false;
        return;
      }
      requestCanvasZoomFrame();
    }

    function setZoom(value) {
      setCanvasZoom(value, { smooth: true });
    }

    function setZoomAt(value, clientX, clientY) {
      setCanvasZoom(value, { clientX, clientY, smooth: true });
    }

    function fitCanvas(options = {}) {
      const { persist = true } = options;
      state.zoom = 0.82;
      state.targetZoom = state.zoom;
      state.hasZoomPreference = true;
      if (persist) saveUiPreferences();
      applyCanvasZoom();
      els.viewport.scrollTo({ left: 0, top: 0, behavior: "smooth" });
    }

    function isInteractiveTarget(target) {
      return Boolean(target?.closest?.("button, input, textarea, select, a, [data-edge-delete], [data-edge-control], [data-edge-select]"));
    }

    function isTypingTarget(target) {
      return Boolean(target?.closest?.("input, textarea, select, [contenteditable='true']"));
    }

    function canvasPointFromEvent(event) {
      const worldRect = els.world.getBoundingClientRect();
      return {
        x: Math.max(0, Math.round((event.clientX - worldRect.left) / state.zoom)),
        y: Math.max(0, Math.round((event.clientY - worldRect.top) / state.zoom)),
        clientX: event.clientX,
        clientY: event.clientY,
      };
    }

    function openCanvasContextMenu(event) {
      if (event.target.closest(".graph-node") || isInteractiveTarget(event.target)) return;
      event.preventDefault();
      event.stopPropagation();
      state.contextMenu = canvasPointFromEvent(event);
      renderCanvasContextMenu();
    }

    function renderCanvasContextMenu() {
      if (!state.contextMenu) {
        closeCanvasContextMenu();
        return;
      }
      const menu = els.canvasContextMenu;
      menu.classList.remove("hidden");
      const width = menu.offsetWidth || 180;
      const height = menu.offsetHeight || 44;
      const left = Math.min(state.contextMenu.clientX, window.innerWidth - width - 10);
      const top = Math.min(state.contextMenu.clientY, window.innerHeight - height - 10);
      menu.style.left = `${Math.max(8, left)}px`;
      menu.style.top = `${Math.max(8, top)}px`;
    }

    function closeCanvasContextMenu() {
      state.contextMenu = null;
      if (!els.canvasContextMenu) return;
      els.canvasContextMenu.classList.add("hidden");
      els.canvasContextMenu.style.left = "";
      els.canvasContextMenu.style.top = "";
    }

    function openIdeaNodeAt(point) {
      if (!point) return;
      const id = `idea_draft_${Date.now()}`;
      const insertAfterShotId = nearestShotIdForPoint(point, state.graph.nodes || []);
      state.frameworkOnly = false;
      state.filter = "all";
      saveUiPreferences();
      state.editingShot = null;
      state.draftIdea = {
        id,
        type: "idea",
        title: "新增分镜想法",
        subtitle: "未提交",
        x: point.x,
        y: point.y,
        width: 320,
        height: 212,
        idea: "",
        insert_after_shot_id: insertAfterShotId,
        meta: {
          "状态": "未提交",
          "插入位置": insertAfterShotId ? `接在 ${insertAfterShotId} 后` : "由 Codex 判断",
          "回传": "交给 Codex 生成分镜及视频提示词",
        },
        text: "写下想法后交给 Codex 生成正式分镜、分镜图提示词和 Seedance 2.0 视频提示词。",
      };
      state.selectedNodeId = id;
      closeCanvasContextMenu();
      renderBoard();
      renderInspector();
    }

    function startCanvasPan(event) {
      const wantsPan = event.button === 1 || (event.button === 0 && (state.spacePanning || !event.target.closest(".graph-node")));
      if (!wantsPan || isInteractiveTarget(event.target)) return;
      closeCanvasContextMenu();
      state.selectedEdgeKey = "";
      renderInspector();
      event.preventDefault();
      state.pan = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        scrollLeft: els.viewport.scrollLeft,
        scrollTop: els.viewport.scrollTop,
      };
      els.viewport.classList.add("panning");
      els.viewport.setPointerCapture(event.pointerId);
    }

    function moveCanvasPan(event) {
      if (!state.pan || event.pointerId !== state.pan.pointerId) return;
      event.preventDefault();
      els.viewport.scrollLeft = state.pan.scrollLeft - (event.clientX - state.pan.startX);
      els.viewport.scrollTop = state.pan.scrollTop - (event.clientY - state.pan.startY);
    }

    function endCanvasPan(event) {
      if (!state.pan || event.pointerId !== state.pan.pointerId) return;
      state.pan = null;
      els.viewport.classList.remove("panning");
      if (els.viewport.hasPointerCapture(event.pointerId)) {
        els.viewport.releasePointerCapture(event.pointerId);
      }
    }

    function setSpacePanning(enabled) {
      state.spacePanning = enabled;
      document.body.classList.toggle("canvas-space-panning", enabled);
    }

    function startNodeDrag(event, nodeId) {
      if (event.button !== 0 || isInteractiveTarget(event.target)) return;
      const node = findCanvasNode(nodeId);
      if (!node) return;
      cancelNodeInertia();
      closeCanvasContextMenu();
      event.preventDefault();
      event.stopPropagation();
      const now = performance.now();
      state.selectedEdgeKey = "";
      state.selectedNodeId = nodeId;
      state.nodeDrag = {
        pointerId: event.pointerId,
        nodeId,
        startX: event.clientX,
        startY: event.clientY,
        originalX: node.x,
        originalY: node.y,
        lastX: node.x,
        lastY: node.y,
        lastTime: now,
        vx: 0,
        vy: 0,
        frameId: 0,
        moved: false,
      };
      event.currentTarget.classList.add("dragging");
      event.currentTarget.style.transform = "translate3d(0px, 0px, 0px)";
      event.currentTarget.setPointerCapture(event.pointerId);
      renderInspector();
    }

    function moveNodeDrag(event) {
      if (!state.nodeDrag || event.pointerId !== state.nodeDrag.pointerId) return;
      event.preventDefault();
      const node = findCanvasNode(state.nodeDrag.nodeId);
      if (!node) return;
      const now = performance.now();
      const dx = (event.clientX - state.nodeDrag.startX) / state.zoom;
      const dy = (event.clientY - state.nodeDrag.startY) / state.zoom;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) state.nodeDrag.moved = true;
      const nextX = Math.max(0, state.nodeDrag.originalX + dx);
      const nextY = Math.max(0, state.nodeDrag.originalY + dy);
      const elapsed = Math.max(8, now - state.nodeDrag.lastTime);
      state.nodeDrag.vx = clamp((nextX - state.nodeDrag.lastX) / elapsed, -DRAG_MAX_VELOCITY, DRAG_MAX_VELOCITY);
      state.nodeDrag.vy = clamp((nextY - state.nodeDrag.lastY) / elapsed, -DRAG_MAX_VELOCITY, DRAG_MAX_VELOCITY);
      state.nodeDrag.lastX = nextX;
      state.nodeDrag.lastY = nextY;
      state.nodeDrag.lastTime = now;
      node.x = nextX;
      node.y = nextY;
      requestNodeDragFrame();
    }

    function endNodeDrag(event) {
      if (!state.nodeDrag || event.pointerId !== state.nodeDrag.pointerId) return;
      const drag = state.nodeDrag;
      const node = findCanvasNode(state.nodeDrag.nodeId);
      const moved = state.nodeDrag.moved;
      const nodeEl = findNodeElement(state.nodeDrag.nodeId);
      if (drag.frameId) {
        cancelAnimationFrame(drag.frameId);
        drag.frameId = 0;
        applyNodeDragFrame();
      }
      if (nodeEl) {
        nodeEl.classList.remove("dragging");
        if (nodeEl.hasPointerCapture(event.pointerId)) {
          nodeEl.releasePointerCapture(event.pointerId);
        }
      }
      state.nodeDrag = null;
      if (moved) state.suppressClickUntil = Date.now() + 250;
      if (moved && node && nodeEl && startNodeInertia(node, nodeEl, drag)) {
        renderInspector();
        return;
      }
      commitNodePosition(node, nodeEl);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function requestNodeDragFrame() {
      if (!state.nodeDrag || state.nodeDrag.frameId) return;
      state.nodeDrag.frameId = requestAnimationFrame(applyNodeDragFrame);
    }

    function applyNodeDragFrame() {
      const drag = state.nodeDrag;
      if (!drag) return;
      drag.frameId = 0;
      const node = findCanvasNode(drag.nodeId);
      const nodeEl = findNodeElement(drag.nodeId);
      if (!node || !nodeEl) return;
      applyNodeTransform(nodeEl, node, drag.originalX, drag.originalY);
      updateConnectedEdgesDuringDrag(drag.nodeId);
    }

    function applyNodeTransform(nodeEl, node, originX, originY) {
      const offsetX = node.x - originX;
      const offsetY = node.y - originY;
      nodeEl.style.transform = `translate3d(${offsetX.toFixed(2)}px, ${offsetY.toFixed(2)}px, 0px)`;
    }

    function startNodeInertia(node, nodeEl, drag) {
      const speed = Math.hypot(drag.vx, drag.vy);
      if (speed < DRAG_INERTIA_MIN_VELOCITY) return false;
      const now = performance.now();
      nodeEl.classList.add("inertia");
      state.nodeInertia = {
        nodeId: node.id,
        originalX: drag.originalX,
        originalY: drag.originalY,
        vx: drag.vx,
        vy: drag.vy,
        lastTime: now,
        startedAt: now,
        frameId: requestAnimationFrame(stepNodeInertia),
      };
      return true;
    }

    function stepNodeInertia(now) {
      const inertia = state.nodeInertia;
      if (!inertia) return;
      const node = findCanvasNode(inertia.nodeId);
      const nodeEl = findNodeElement(inertia.nodeId);
      if (!node || !nodeEl) {
        state.nodeInertia = null;
        return;
      }
      const elapsed = Math.min(32, Math.max(8, now - inertia.lastTime));
      inertia.lastTime = now;
      node.x = Math.max(0, node.x + inertia.vx * elapsed);
      node.y = Math.max(0, node.y + inertia.vy * elapsed);
      if (node.x === 0 && inertia.vx < 0) inertia.vx = 0;
      if (node.y === 0 && inertia.vy < 0) inertia.vy = 0;
      const friction = Math.pow(DRAG_INERTIA_FRICTION, elapsed / 16.67);
      inertia.vx *= friction;
      inertia.vy *= friction;
      applyNodeTransform(nodeEl, node, inertia.originalX, inertia.originalY);
      updateConnectedEdgesDuringDrag(inertia.nodeId);
      const speed = Math.hypot(inertia.vx, inertia.vy);
      if (speed > DRAG_INERTIA_MIN_VELOCITY && now - inertia.startedAt < DRAG_INERTIA_MAX_DURATION) {
        inertia.frameId = requestAnimationFrame(stepNodeInertia);
        return;
      }
      state.nodeInertia = null;
      commitNodePosition(node, nodeEl);
    }

    function cancelNodeInertia() {
      const inertia = state.nodeInertia;
      if (!inertia) return;
      cancelAnimationFrame(inertia.frameId);
      const node = findCanvasNode(inertia.nodeId);
      const nodeEl = findNodeElement(inertia.nodeId);
      state.nodeInertia = null;
      commitNodePosition(node, nodeEl, { rerender: false });
    }

    function commitNodePosition(node, nodeEl, options = {}) {
      if (!node) return;
      const { save = true, rerender = true } = options;
      if (nodeEl) {
        nodeEl.style.left = `${node.x}px`;
        nodeEl.style.top = `${node.y}px`;
        nodeEl.style.transform = "";
        nodeEl.classList.remove("dragging", "inertia");
      }
      if (save) saveNodeLayout(node);
      if (rerender) renderBoard();
      renderInspector();
    }

    function findNodeElement(nodeId) {
      return Array.from(els.nodeLayer.querySelectorAll("[data-node]")).find((item) => item.dataset.node === nodeId);
    }

    function updatePanelVisibility(options = {}) {
      const { persist = true } = options;
      const app = document.querySelector(".app");
      app.classList.toggle("side-hidden", state.sideHidden);
      app.classList.toggle("inspector-hidden", state.inspectorHidden);
      const sideVisible = !state.sideHidden;
      els.toggleProjectPanelButton.classList.toggle("active", sideVisible);
      els.toggleProjectPanelButton.title = sideVisible ? "隐藏项目栏" : "显示项目栏";
      els.toggleProjectPanelButton.setAttribute("aria-label", sideVisible ? "隐藏项目栏" : "显示项目栏");
      els.toggleProjectPanelButton.setAttribute("aria-pressed", String(sideVisible));
      if (persist) saveUiPreferences();
      setTimeout(renderBoard, 0);
    }

    function toggleProjectPanel() {
      state.sideHidden = !state.sideHidden;
      updatePanelVisibility();
    }

    function openProjectLibrary() {
      state.sideHidden = false;
      updatePanelVisibility();
    }

    function showError(error) {
      els.serverState.textContent = "服务异常";
      els.inspectorType.textContent = "错误";
      els.inspector.innerHTML = `<div class="empty error">${escapeHtml(error.message || error)}</div>`;
    }

    els.refreshButton.addEventListener("click", () => loadProjects(false).catch(showError));
    els.projectLibraryButton.addEventListener("click", openProjectLibrary);
    els.enterWorkbenchButton.addEventListener("click", hideIntro);
    els.pickProjectButton.addEventListener("click", () => {
      state.sideHidden = false;
      updatePanelVisibility();
      hideIntro();
    });
    els.showIntroButton.addEventListener("click", showIntro);
    els.introVideo.addEventListener("error", () => {
      showIntroFallback();
    });
    els.fitButton.addEventListener("click", fitCanvas);
    els.codexLoginButton.addEventListener("click", () => {
      if (state.authStatus?.codex?.available || state.codexDevice?.userCode) {
        openCodexLoginPanel();
        return;
      }
      startCodexLogin().catch(showError);
    });
    els.closeCodexLoginPanelButton.addEventListener("click", closeCodexLoginPanel);
    els.restartCodexLoginButton.addEventListener("click", () => startCodexLogin().catch(showError));
    els.openCodexVerifyButton.addEventListener("click", openCodexVerificationPage);
    els.copyCodexCodeButton.addEventListener("click", () => copyCodexLoginCode().catch(showError));
    els.toggleProjectPanelButton.addEventListener("click", toggleProjectPanel);
    els.zoomInButton.addEventListener("click", () => setZoom(state.zoom + 0.1));
    els.zoomOutButton.addEventListener("click", () => setZoom(state.zoom - 0.1));
    els.resetZoomButton.addEventListener("click", () => setZoom(1));
    els.projectQuickSelect.addEventListener("change", handleProjectQuickSelect);
    els.syncCanvasButton.addEventListener("click", openCanvasSyncReview);
    els.cancelCanvasSyncButton.addEventListener("click", closeCanvasSyncReview);
    els.confirmCanvasSyncButton.addEventListener("click", () => syncCanvasToBackend().catch(showError));
    els.canvasModeSelect.addEventListener("change", () => setFilter(els.canvasModeSelect.value));
    els.cardDensitySelect.addEventListener("change", () => setCardDensity(els.cardDensitySelect.value));
    els.organizeCanvasButton.addEventListener("click", organizeCanvasLayout);
    els.rootInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") loadProjects(true).catch(showError);
    });
    els.writeStateButton.addEventListener("click", () => {
      if (!state.currentProject) return;
      loadProject(state.currentProject, true).catch(showError);
    });
    els.generateVoiceoverButton.addEventListener("click", () => generateVoiceover(false).catch(showError));
    els.dryRunVoiceoverButton.addEventListener("click", () => generateVoiceover(true).catch(showError));
    els.canvasContextMenu.addEventListener("click", (event) => {
      event.stopPropagation();
      const addButton = event.target.closest("[data-context-add-idea]");
      if (addButton) openIdeaNodeAt(state.contextMenu);
    });
    els.canvasContextMenu.addEventListener("pointerdown", (event) => event.stopPropagation());
    els.connectionLayer.addEventListener("pointerdown", stopEdgeDeletePointerDown);
    els.connectionLayer.addEventListener("pointerdown", startEdgeControlDrag);
    els.connectionLayer.addEventListener("click", handleEdgeSelectClick);
    els.connectionLayer.addEventListener("click", handleEdgeDeleteClick);
    els.connectionLayer.addEventListener("keydown", handleEdgeDeleteKeydown);
    els.viewport.addEventListener("contextmenu", openCanvasContextMenu);
    els.viewport.addEventListener("pointerdown", startCanvasPan);
    els.viewport.addEventListener("pointermove", moveCanvasPan);
    els.viewport.addEventListener("pointerup", endCanvasPan);
    els.viewport.addEventListener("pointercancel", endCanvasPan);
    els.viewport.addEventListener("wheel", (event) => {
      if (isInteractiveTarget(event.target)) return;
      event.preventDefault();
      const wheelDelta = clamp(event.deltaY, -180, 180);
      const zoomBase = Number.isFinite(state.targetZoom) ? state.targetZoom : state.zoom;
      const nextZoom = zoomBase * Math.exp(-wheelDelta * WHEEL_ZOOM_SENSITIVITY);
      setCanvasZoom(nextZoom, { clientX: event.clientX, clientY: event.clientY, smooth: true });
    }, { passive: false });
    window.addEventListener("pointermove", moveNodeDrag);
    window.addEventListener("pointerup", endNodeDrag);
    window.addEventListener("pointercancel", endNodeDrag);
    window.addEventListener("pointermove", moveConnectionDrag);
    window.addEventListener("pointerup", finishConnectionDrag);
    window.addEventListener("pointercancel", finishConnectionDrag);
    window.addEventListener("pointermove", moveEdgeControlDrag);
    window.addEventListener("pointerup", finishEdgeControlDrag);
    window.addEventListener("pointercancel", finishEdgeControlDrag);
    window.addEventListener("click", closeCanvasContextMenu);
    function handleCanvasKeydown(event) {
      if ((event.key === "Delete" || event.key === "Backspace") && state.selectedEdgeKey && !isTypingTarget(event.target)) {
        event.preventDefault();
        deleteSelectedEdge();
        return;
      }
      if (event.key === "Escape") {
        clearConnectionDrag();
        clearEdgeControlDrag();
        state.selectedEdgeKey = "";
        closeCanvasSyncReview();
        closeCodexLoginPanel();
        closeCanvasContextMenu();
        renderEdgesOnly();
        renderInspector();
      }
      if (event.code === "Space" && !isTypingTarget(event.target)) {
        event.preventDefault();
        setSpacePanning(true);
      }
    }

    window.addEventListener("keydown", handleCanvasKeydown);
    window.addEventListener("keyup", (event) => {
      if (event.code === "Space") setSpacePanning(false);
    });
    window.addEventListener("blur", () => setSpacePanning(false));
    if (sessionStorage.getItem("video-master-intro-seen") === "1") {
      els.intro.classList.add("hidden");
    }
    applyUiPreferences();
    updatePanelVisibility({ persist: false });

    loadCodexAuthStatus().catch(() => updateCodexLoginButton());
    loadProjects(true).catch(showError);
  </script>
</body>
</html>
