<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Master 节点式分镜预览编辑器</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #070a0f;
      --panel: #101722;
      --panel-2: #141d2a;
      --panel-3: #1a2535;
      --ink: #f4f7fb;
      --muted: #9aa6b8;
      --faint: #647184;
      --line: #263247;
      --line-bright: #4d5f79;
      --blue: #5b8cff;
      --cyan: #3dd6d0;
      --green: #4ade80;
      --amber: #f8b84e;
      --rose: #fb7185;
      --violet: #a78bfa;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      --glow-blue: 0 0 0 1px rgba(91, 140, 255, 0.55), 0 0 34px rgba(91, 140, 255, 0.28);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at 20% 15%, rgba(91, 140, 255, 0.12), transparent 28%),
        radial-gradient(circle at 78% 10%, rgba(61, 214, 208, 0.09), transparent 26%),
        var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(16, 23, 34, 0.92);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover,
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      border-color: var(--blue);
      outline: 3px solid rgba(91, 140, 255, 0.16);
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #03060b;
      transition: opacity 360ms ease, visibility 360ms ease;
    }

    .intro.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-video,
    .intro-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.72;
      transform: scale(1.02);
    }

    .intro-image {
      background:
        linear-gradient(110deg, rgba(6, 10, 18, 0.28), rgba(6, 10, 18, 0.78)),
        var(--intro-image, linear-gradient(135deg, rgba(91, 140, 255, 0.28), rgba(61, 214, 208, 0.18)));
      background-size: cover;
      background-position: center;
    }

    .intro-fallback {
      position: absolute;
      inset: 0;
      opacity: 0;
      background:
        linear-gradient(120deg, rgba(91, 140, 255, 0.20), transparent 35%),
        linear-gradient(310deg, rgba(61, 214, 208, 0.16), transparent 42%),
        radial-gradient(circle at 30% 52%, rgba(255, 255, 255, 0.12), transparent 18%),
        #060a12;
      transition: opacity 260ms ease;
    }

    .intro-fallback.visible {
      opacity: 1;
    }

    .intro-fallback::before,
    .intro-fallback::after {
      content: "";
      position: absolute;
      width: 42vw;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(125, 165, 255, 0.35);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(91, 140, 255, 0.22), rgba(61, 214, 208, 0.12)),
        rgba(12, 18, 27, 0.78);
      box-shadow: 0 30px 110px rgba(0, 0, 0, 0.35);
      animation: introDrift 12s ease-in-out infinite alternate;
    }

    .intro-fallback::before {
      left: 8vw;
      top: 18vh;
    }

    .intro-fallback::after {
      right: 7vw;
      bottom: 14vh;
      animation-delay: -4s;
    }

    @keyframes introDrift {
      from {
        transform: translate3d(-1.4vw, 0, 0) scale(1);
      }
      to {
        transform: translate3d(1.6vw, -1.1vh, 0) scale(1.035);
      }
    }

    .intro-scrim {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(3, 6, 11, 0.78) 0%, rgba(3, 6, 11, 0.38) 52%, rgba(3, 6, 11, 0.72) 100%),
        linear-gradient(0deg, rgba(3, 6, 11, 0.92) 0%, transparent 38%, rgba(3, 6, 11, 0.38) 100%);
    }

    .intro-copy {
      position: relative;
      width: min(1080px, calc(100vw - 56px));
      display: grid;
      gap: 18px;
      justify-items: start;
      padding-top: 8vh;
      transform: translate(-7vw, 8vh);
    }

    .intro-kicker {
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .intro-title {
      margin: 0;
      max-width: 780px;
      color: #fff;
      font-size: clamp(38px, 6.4vw, 92px);
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 18px 70px rgba(0, 0, 0, 0.58);
    }

    .intro-subtitle {
      max-width: 560px;
      margin: 0;
      color: rgba(244, 247, 251, 0.78);
      font-size: clamp(15px, 1.35vw, 20px);
      line-height: 1.62;
    }

    .intro-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .intro-button {
      min-width: 134px;
      height: 44px;
      padding: 0 16px;
      border-color: rgba(125, 165, 255, 0.58);
      background: rgba(11, 16, 24, 0.58);
      backdrop-filter: blur(16px);
      font-weight: 800;
    }

    .intro-button.primary {
      color: #071018;
      background: linear-gradient(135deg, #e8f6ff, #74f7ee 44%, #6a91ff);
      border-color: transparent;
    }

    .app {
      display: grid;
      grid-template-columns: 72px 300px minmax(520px, 1fr) 380px;
      grid-template-rows: 68px minmax(0, 1fr);
      width: 100vw;
      height: 100vh;
    }

    .app.side-hidden {
      grid-template-columns: 72px 0 minmax(520px, 1fr) 380px;
    }

    .app.inspector-hidden {
      grid-template-columns: 72px 300px minmax(520px, 1fr) 0;
    }

    .app.side-hidden.inspector-hidden {
      grid-template-columns: 72px 0 minmax(520px, 1fr) 0;
    }

    .app.side-hidden .side,
    .app.inspector-hidden .inspector {
      display: none;
    }

    .topbar {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 350px minmax(260px, 1fr) auto auto auto;
      gap: 10px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(77, 95, 121, 0.46);
      background: rgba(8, 12, 18, 0.92);
      backdrop-filter: blur(16px);
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #071018;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      font-weight: 900;
      box-shadow: 0 0 28px rgba(91, 140, 255, 0.28);
      flex: 0 0 auto;
    }

    .brand-text {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .brand strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 17px;
      line-height: 1.1;
    }

    .brand span,
    .small,
    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .root-control {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      min-width: 0;
    }

    .root-control input {
      height: 40px;
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(20, 29, 42, 0.9);
      color: var(--ink);
      padding: 0 12px;
    }

    .top-button,
    .tool-button {
      height: 40px;
      padding: 0 12px;
      white-space: nowrap;
      font-weight: 700;
    }

    .primary-button {
      background: linear-gradient(135deg, #1d4ed8, #0f766e);
      border-color: rgba(125, 165, 255, 0.56);
    }

    .rail {
      grid-row: 2;
      border-right: 1px solid rgba(77, 95, 121, 0.38);
      background: rgba(8, 12, 18, 0.86);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 10px;
      z-index: 4;
    }

    .rail-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: var(--muted);
    }

    .rail-button.active {
      color: var(--ink);
      border-color: var(--blue);
      box-shadow: var(--glow-blue);
    }

    .side,
    .inspector {
      min-height: 0;
      overflow: auto;
      background: rgba(11, 16, 24, 0.82);
      backdrop-filter: blur(12px);
    }

    .side {
      grid-column: 2;
      grid-row: 2;
      border-right: 1px solid rgba(77, 95, 121, 0.38);
      padding: 16px;
    }

    .inspector {
      grid-column: 4;
      grid-row: 2;
      border-left: 1px solid rgba(77, 95, 121, 0.38);
      padding: 16px;
    }

    .canvas {
      grid-column: 3;
      grid-row: 2;
      min-width: 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle, rgba(92, 108, 132, 0.34) 1px, transparent 1px),
        linear-gradient(135deg, rgba(13, 19, 29, 0.42), rgba(7, 10, 15, 0.18));
      background-size: 24px 24px, auto;
    }

    .canvas-head {
      position: absolute;
      left: 18px;
      top: 16px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      z-index: 3;
      pointer-events: none;
    }

    .canvas-title {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h1 {
      font-size: 21px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    h2 {
      font-size: 15px;
      font-weight: 780;
    }

    h3 {
      font-size: 13px;
      font-weight: 760;
    }

    .canvas-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .canvas-tools button {
      min-width: 42px;
      height: 36px;
      padding: 0 10px;
      color: var(--muted);
      background: rgba(12, 18, 27, 0.78);
    }

    .canvas-tools button.active {
      color: #ecfdf5;
      border-color: rgba(74, 222, 128, 0.54);
      background: rgba(21, 128, 61, 0.22);
    }

    .canvas-tools select {
      height: 36px;
      min-width: 112px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 10px;
      color: var(--muted);
      background: rgba(12, 18, 27, 0.84);
    }

    .canvas-tools option {
      color: var(--ink);
      background: #101722;
    }

    .canvas-context-menu {
      position: fixed;
      z-index: 12;
      min-width: 180px;
      padding: 6px;
      border: 1px solid rgba(77, 95, 121, 0.8);
      border-radius: var(--radius);
      background: rgba(11, 16, 24, 0.96);
      box-shadow: var(--shadow);
    }

    .canvas-context-menu.hidden {
      display: none;
    }

    .canvas-context-menu button {
      width: 100%;
      height: 32px;
      padding: 0 10px;
      text-align: left;
      color: #dce7fb;
      background: transparent;
      border-color: transparent;
    }

    .canvas-context-menu button:hover {
      background: rgba(91, 140, 255, 0.16);
      border-color: rgba(91, 140, 255, 0.32);
    }

    .viewport {
      position: absolute;
      inset: 0;
      overflow: auto;
      padding: 94px 34px 34px 34px;
      cursor: grab;
      overscroll-behavior: contain;
      touch-action: none;
    }

    .viewport.panning {
      cursor: grabbing;
    }

    .viewport.connecting {
      cursor: crosshair;
    }

    .world {
      position: relative;
      min-width: 100%;
      min-height: 100%;
      transform-origin: 0 0;
      transition: transform 120ms ease;
    }

    .connection-layer {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
      z-index: 0;
    }

    .edge-path {
      fill: none;
      stroke: rgba(91, 140, 255, 0.46);
      stroke-width: 2;
      filter: drop-shadow(0 0 10px rgba(91, 140, 255, 0.3));
    }

    .edge-path.alt {
      stroke: rgba(61, 214, 208, 0.44);
    }

    .edge-path.idea-link {
      stroke: rgba(248, 184, 78, 0.72);
      stroke-dasharray: 7 8;
      filter: drop-shadow(0 0 10px rgba(248, 184, 78, 0.22));
    }

    .edge-path.manual {
      stroke: rgba(61, 214, 208, 0.82);
      stroke-width: 2.6;
      filter: drop-shadow(0 0 12px rgba(61, 214, 208, 0.22));
    }

    .edge-path.connection-preview {
      stroke: rgba(226, 232, 240, 0.72);
      stroke-width: 2.4;
      stroke-dasharray: 5 7;
      filter: drop-shadow(0 0 12px rgba(148, 163, 184, 0.2));
    }

    .edge-dot {
      fill: rgba(15, 23, 42, 0.95);
      stroke: rgba(125, 165, 255, 0.76);
      stroke-width: 2;
    }

    .edge-dot.idea-link {
      stroke: rgba(248, 184, 78, 0.82);
    }

    .edge-dot.manual {
      stroke: rgba(61, 214, 208, 0.88);
    }

    .edge-dot.connection-preview {
      stroke: rgba(226, 232, 240, 0.72);
    }

    .node-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .graph-node {
      position: absolute;
      width: 286px;
      min-height: 154px;
      border: 1px solid rgba(77, 95, 121, 0.8);
      border-radius: var(--radius);
      background: rgba(20, 29, 42, 0.94);
      box-shadow: var(--shadow);
      cursor: grab;
      overflow: hidden;
      user-select: none;
      touch-action: none;
      transition: border-color 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
    }

    .graph-node.dragging {
      cursor: grabbing;
      opacity: 0.92;
      z-index: 6;
      will-change: transform;
    }

    .graph-node.inertia {
      cursor: grabbing;
      z-index: 5;
      will-change: transform;
    }

    .graph-node.selected {
      border-color: rgba(125, 165, 255, 0.95);
      box-shadow: var(--glow-blue), var(--shadow);
    }

    .graph-node.shot {
      width: 392px;
      min-height: 470px;
      border-color: rgba(125, 165, 255, 0.72);
    }

    .graph-node.frame {
      width: 340px;
      min-height: 256px;
    }

    .graph-node.packaging {
      width: 294px;
      min-height: 154px;
      border-color: rgba(248, 184, 78, 0.58);
    }

    .graph-node.copywriting {
      width: 286px;
      min-height: 154px;
      border-color: rgba(167, 139, 250, 0.58);
    }

    .graph-node.character {
      width: 286px;
      min-height: 154px;
      border-color: rgba(61, 214, 208, 0.58);
    }

    .graph-node.idea {
      width: 320px;
      min-height: 212px;
      border-color: rgba(248, 184, 78, 0.68);
    }

    .node-head {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 12px;
      border-bottom: 1px solid rgba(77, 95, 121, 0.55);
      background: rgba(11, 16, 24, 0.72);
    }

    .node-head span:first-child {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 760;
    }

    .node-port {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(125, 165, 255, 0.55);
      color: var(--blue);
      background: rgba(7, 10, 15, 0.82);
      flex: 0 0 auto;
      font-size: 17px;
      line-height: 1;
      padding: 0;
    }

    .node-flow-ports {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .flow-port {
      position: absolute;
      top: 50%;
      width: 28px;
      height: 28px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border-color: rgba(125, 165, 255, 0.62);
      color: #dbeafe;
      background: rgba(7, 10, 15, 0.9);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 8px 24px rgba(0, 0, 0, 0.28);
      font-size: 11px;
      font-weight: 820;
      line-height: 1;
      pointer-events: auto;
      transform: translateY(-50%);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
      z-index: 2;
    }

    .flow-port:hover,
    .flow-port.active {
      border-color: rgba(61, 214, 208, 0.86);
      background: rgba(15, 118, 110, 0.34);
      transform: translateY(-50%) scale(1.08);
    }

    .flow-port-in {
      left: -14px;
    }

    .flow-port-out {
      right: -14px;
    }

    .node-drag-hint {
      color: var(--faint);
      font-size: 11px;
      white-space: nowrap;
    }

    .node-body {
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .node-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(77, 95, 121, 0.64);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(91, 140, 255, 0.14), rgba(61, 214, 208, 0.12)),
        rgba(8, 12, 18, 0.88);
      display: grid;
      place-items: center;
      color: var(--muted);
      overflow: hidden;
    }

    .node-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .node-text {
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .node-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .shot-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
      align-items: start;
    }

    .adaptive-shot-media {
      min-height: 188px;
      aspect-ratio: 16 / 9;
      align-self: start;
    }

    .shot-media-top {
      width: 100%;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .adaptive-shot-media img {
      object-fit: contain;
      background: rgba(4, 7, 12, 0.72);
    }

    .shot-content {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .shot-details {
      align-content: start;
    }

    .shot-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
    }

    .shot-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .shot-action {
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      color: #dce7fb;
      background: rgba(91, 140, 255, 0.14);
      border-color: rgba(91, 140, 255, 0.38);
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .shot-action:disabled {
      opacity: 0.46;
      cursor: not-allowed;
    }

    .shot-section-label {
      color: #dce7fb;
      font-size: 11px;
      font-weight: 800;
    }

    .shot-bindings {
      display: grid;
      gap: 6px;
    }

    .shot-binding {
      display: grid;
      gap: 4px;
      padding: 7px 8px;
      border: 1px solid rgba(77, 95, 121, 0.44);
      border-radius: var(--radius);
      background: rgba(9, 14, 22, 0.58);
    }

    .shot-binding-head {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #e8f0ff;
      font-size: 11px;
      font-weight: 820;
    }

    .binding-chip {
      height: 20px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0 7px;
      color: #dbeafe;
      background: rgba(91, 140, 255, 0.16);
      font-size: 11px;
      font-weight: 780;
    }

    .binding-chip.packaging-chip {
      color: #dcfce7;
      background: rgba(22, 163, 74, 0.18);
    }

    .shot-binding-text {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .storyboard-frame-only {
      gap: 10px;
    }

    .storyboard-frame-only .node-text {
      -webkit-line-clamp: 3;
    }

    .shot-prompt {
      max-height: 62px;
      overflow: auto;
      border: 1px solid rgba(77, 95, 121, 0.52);
      border-radius: var(--radius);
      background: rgba(7, 10, 15, 0.7);
      color: #d7e3f6;
      padding: 7px 8px;
      font-size: 11px;
      line-height: 1.42;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .shot-editor {
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(77, 95, 121, 0.45);
      display: grid;
      gap: 9px;
    }

    .shot-editor-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #eef5ff;
      font-size: 12px;
      font-weight: 820;
    }

    .shot-form-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 86px;
      gap: 8px;
    }

    .shot-editor label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 720;
    }

    .shot-editor input,
    .shot-editor textarea {
      width: 100%;
      border: 1px solid rgba(77, 95, 121, 0.62);
      border-radius: var(--radius);
      background: rgba(7, 10, 15, 0.78);
      color: var(--ink);
      padding: 7px 8px;
      font-size: 12px;
      line-height: 1.35;
    }

    .shot-editor textarea {
      min-height: 70px;
      resize: vertical;
    }

    .shot-editor-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .idea-form,
    .idea-status {
      display: grid;
      gap: 9px;
    }

    .idea-form label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 740;
    }

    .idea-form textarea,
    .idea-form select {
      width: 100%;
      border: 1px solid rgba(77, 95, 121, 0.62);
      border-radius: var(--radius);
      background: rgba(7, 10, 15, 0.78);
      color: var(--ink);
      padding: 8px;
      font-size: 12px;
      line-height: 1.4;
    }

    .idea-form textarea {
      min-height: 82px;
      resize: vertical;
    }

    .idea-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      border-radius: 999px;
      padding: 3px 8px;
      background: rgba(100, 113, 132, 0.18);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
    }

    .badge.complete,
    .badge.autopilot {
      color: var(--green);
      background: rgba(74, 222, 128, 0.12);
    }

    .badge.guided,
    .badge.partial {
      color: var(--blue);
      background: rgba(91, 140, 255, 0.13);
    }

    .badge.missing {
      color: var(--rose);
      background: rgba(251, 113, 133, 0.12);
    }

    .badge.skipped {
      color: var(--amber);
      background: rgba(248, 184, 78, 0.13);
    }

    .badge.style {
      color: var(--violet);
      background: rgba(167, 139, 250, 0.14);
    }

    .side-section,
    .detail-block {
      border: 1px solid rgba(77, 95, 121, 0.55);
      border-radius: var(--radius);
      background: rgba(16, 23, 34, 0.82);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.24);
    }

    .side-section {
      padding: 12px;
      margin-bottom: 12px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .project-list {
      display: grid;
      gap: 9px;
    }

    .project-item {
      width: 100%;
      text-align: left;
      padding: 11px;
      display: grid;
      gap: 9px;
      background: rgba(20, 29, 42, 0.88);
    }

    .project-item.active {
      border-color: var(--blue);
      box-shadow: var(--glow-blue);
    }

    .project-name,
    .shot-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .project-name span:first-child,
    .shot-title span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-map {
      display: grid;
      gap: 8px;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      align-items: center;
    }

    .mini-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(100, 113, 132, 0.2);
      overflow: hidden;
    }

    .mini-bar i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--blue));
    }

    .detail-block {
      padding: 13px;
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 10px;
      align-items: baseline;
    }

    .kv-row span:first-child {
      color: var(--muted);
      font-size: 12px;
    }

    .kv-row span:last-child,
    .path {
      overflow-wrap: anywhere;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid rgba(77, 95, 121, 0.56);
      background: rgba(7, 10, 15, 0.76);
      color: #e8eef8;
      border-radius: var(--radius);
      padding: 11px;
      max-height: 260px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.55;
    }

    textarea {
      width: 100%;
      min-height: 98px;
      resize: vertical;
      border: 1px solid rgba(77, 95, 121, 0.7);
      border-radius: var(--radius);
      background: rgba(7, 10, 15, 0.78);
      color: var(--ink);
      padding: 10px;
    }

    .empty {
      min-height: 148px;
      display: grid;
      place-items: center;
      border: 1px dashed rgba(77, 95, 121, 0.72);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(16, 23, 34, 0.48);
      text-align: center;
      padding: 18px;
    }

    .error {
      color: var(--rose);
    }

    @media (max-width: 1220px) {
      .app {
        grid-template-columns: 60px 260px minmax(420px, 1fr);
      }

      .topbar {
        grid-template-columns: 310px minmax(220px, 1fr) auto auto auto;
      }

      .inspector {
        display: none;
      }

      .canvas {
        grid-column: 3;
      }
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .app {
        display: block;
        min-height: 100vh;
        height: auto;
      }

      .topbar,
      .root-control {
        grid-template-columns: 1fr;
      }

      .rail {
        display: none;
      }

      .side,
      .inspector {
        max-height: none;
      }

      .canvas {
        min-height: 720px;
      }
    }
  </style>
</head>
<body>
  <section id="intro" class="intro" aria-label="Video Master 开场页">
    <video id="introVideo" class="intro-video" src="/assets/intro-background-20260427-v2.mp4" autoplay muted loop playsinline></video>
    <div id="introImage" class="intro-image" hidden></div>
    <div id="introFallback" class="intro-fallback visible"></div>
    <div class="intro-scrim"></div>
    <div class="intro-copy">
      <div class="intro-kicker">videomaster</div>
      <h1 class="intro-title">把想法变成可编辑的影像工作流</h1>
      <p class="intro-subtitle">从分镜图、视频提示词、文字包装到最终交付，所有素材都在节点画布里重新组织、预览和完善。</p>
      <div class="intro-actions">
        <button id="enterWorkbenchButton" class="intro-button primary" type="button">进入节点编辑器</button>
        <button id="pickProjectButton" class="intro-button" type="button">选择项目</button>
      </div>
    </div>
  </section>

  <div class="app side-hidden inspector-hidden">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">VM</div>
        <div class="brand-text">
          <strong>节点式分镜预览编辑器</strong>
          <span id="serverState">正在连接本地工作流</span>
        </div>
      </div>
      <div class="root-control">
        <input id="rootInput" type="text" spellcheck="false" aria-label="项目根目录">
        <button id="refreshButton" class="top-button" type="button">刷新项目</button>
      </div>
      <button id="showIntroButton" class="top-button" type="button">开场</button>
      <button id="fitButton" class="top-button" type="button">适配画布</button>
      <button id="writeStateButton" class="top-button primary-button" type="button">写入状态</button>
    </header>

    <nav class="rail" aria-label="画布工具">
      <button id="zoomInButton" class="rail-button" type="button" title="放大">+</button>
      <button id="zoomOutButton" class="rail-button" type="button" title="缩小">-</button>
      <button id="resetZoomButton" class="rail-button active" type="button" title="重置">1</button>
    </nav>

    <aside class="side">
      <section class="side-section">
        <div class="section-head">
          <h2>项目库</h2>
          <span id="projectCount" class="small">0 个项目</span>
        </div>
        <div id="projectList" class="project-list"></div>
      </section>

      <section class="side-section">
        <div class="section-head">
          <h2>交付结构</h2>
          <span id="graphSummary" class="small">未选择</span>
        </div>
        <div id="miniMap" class="mini-map"></div>
      </section>
    </aside>

    <main class="canvas">
      <div class="canvas-head">
        <div class="canvas-title">
          <h1 id="projectTitle">未选择项目</h1>
          <div id="modeBadges" class="badge-row"></div>
        </div>
        <div class="canvas-tools">
          <button id="toggleFrameworkButton" type="button" aria-pressed="false">只看框架</button>
          <select id="canvasModeSelect" aria-label="画布视图">
            <option value="all">全部节点</option>
            <option value="shots">分镜流程</option>
            <option value="packaging">包装旁路</option>
          </select>
        </div>
      </div>
      <div id="viewport" class="viewport">
        <div id="world" class="world">
          <svg id="connectionLayer" class="connection-layer"></svg>
          <div id="nodeLayer" class="node-layer"></div>
        </div>
      </div>
      <div id="canvasContextMenu" class="canvas-context-menu hidden">
        <button type="button" data-context-add-idea>新增分镜想法</button>
      </div>
    </main>

    <aside class="inspector">
      <div class="section-head">
        <h2>节点检查器</h2>
        <span id="inspectorType" class="small"></span>
      </div>
      <div id="inspector" class="inspector-panel"></div>
    </aside>
  </div>

  <script>
    const state = {
      root: "",
      projects: [],
      currentProject: "",
      project: null,
      heroMedia: null,
      graph: { nodes: [], edges: [] },
      selectedNodeId: "",
      zoom: 1,
      filter: "all",
      frameworkOnly: false,
      contextMenu: null,
      draftIdea: null,
      manualEdges: [],
      sideHidden: true,
      inspectorHidden: true,
      pan: null,
      nodeDrag: null,
      nodeInertia: null,
      connectionDrag: null,
      editingShot: null,
      suppressClickUntil: 0,
    };

    const INTRO_BACKGROUND_VIDEO = "/assets/intro-background-20260427-v2.mp4";

    const els = {
      intro: document.querySelector("#intro"),
      introVideo: document.querySelector("#introVideo"),
      introImage: document.querySelector("#introImage"),
      introFallback: document.querySelector("#introFallback"),
      enterWorkbenchButton: document.querySelector("#enterWorkbenchButton"),
      pickProjectButton: document.querySelector("#pickProjectButton"),
      serverState: document.querySelector("#serverState"),
      rootInput: document.querySelector("#rootInput"),
      refreshButton: document.querySelector("#refreshButton"),
      showIntroButton: document.querySelector("#showIntroButton"),
      fitButton: document.querySelector("#fitButton"),
      writeStateButton: document.querySelector("#writeStateButton"),
      zoomInButton: document.querySelector("#zoomInButton"),
      zoomOutButton: document.querySelector("#zoomOutButton"),
      resetZoomButton: document.querySelector("#resetZoomButton"),
      toggleFrameworkButton: document.querySelector("#toggleFrameworkButton"),
      canvasModeSelect: document.querySelector("#canvasModeSelect"),
      projectList: document.querySelector("#projectList"),
      projectCount: document.querySelector("#projectCount"),
      projectTitle: document.querySelector("#projectTitle"),
      modeBadges: document.querySelector("#modeBadges"),
      graphSummary: document.querySelector("#graphSummary"),
      miniMap: document.querySelector("#miniMap"),
      viewport: document.querySelector("#viewport"),
      world: document.querySelector("#world"),
      canvasContextMenu: document.querySelector("#canvasContextMenu"),
      connectionLayer: document.querySelector("#connectionLayer"),
      nodeLayer: document.querySelector("#nodeLayer"),
      inspector: document.querySelector("#inspector"),
      inspectorType: document.querySelector("#inspectorType"),
    };

    const statusNames = {
      complete: "完成",
      partial: "进行中",
      missing: "缺失",
      skipped: "跳过",
      ready: "就绪",
      unknown: "未知",
    };

    const workflowNames = {
      autopilot: "全委托",
      guided: "协作导演",
      unknown: "未识别",
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function badge(text, className = "") {
      return `<span class="badge ${className}">${escapeHtml(text)}</span>`;
    }

    function statusClass(value) {
      return String(value || "unknown").toLowerCase().replace(/[^a-z0-9_-]/g, "");
    }

    function tStatus(value) {
      return statusNames[value] || value || "未知";
    }

    function tWorkflow(value) {
      return workflowNames[value] || value || "未设置";
    }

    function fileUrl(projectPath, filePath) {
      const params = new URLSearchParams({ project: projectPath, path: filePath });
      return `/api/file?${params.toString()}`;
    }

    async function readJson(url) {
      const response = await fetch(url);
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || response.statusText);
      }
      return payload;
    }

    async function writeJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const result = await response.json();
      if (!response.ok) {
        throw new Error(result.error || response.statusText);
      }
      return result;
    }

    async function loadProjects(selectFirst = true) {
      els.serverState.textContent = "读取项目中";
      const params = new URLSearchParams();
      const root = els.rootInput.value.trim();
      if (root) params.set("root", root);
      const payload = await readJson(`/api/projects?${params.toString()}`);
      state.root = payload.root || root;
      state.projects = payload.projects || [];
      els.rootInput.value = state.root;
      els.serverState.textContent = "本地工作流已连接";
      renderProjectList();
      loadHeroMedia().catch(showIntroFallback);

      const stillExists = state.projects.some((project) => project.path === state.currentProject);
      if (selectFirst && state.projects.length) {
        await loadProject(state.projects[0].path, false);
      } else if (stillExists && state.currentProject) {
        await loadProject(state.currentProject, false);
      } else if (state.projects.length) {
        await loadProject(state.projects[0].path, false);
      } else {
        state.currentProject = "";
        state.project = null;
        state.graph = { nodes: [], edges: [] };
        state.manualEdges = [];
        renderProject();
      }
    }

    async function loadProject(projectPath, writeState) {
      state.currentProject = projectPath;
      state.selectedNodeId = "";
      state.editingShot = null;
      state.contextMenu = null;
      state.draftIdea = null;
      closeCanvasContextMenu();
      const params = new URLSearchParams({ path: projectPath });
      if (writeState) params.set("write", "true");
      state.project = await readJson(`/api/project?${params.toString()}`);
      state.graph = buildGraph(state.project);
      state.manualEdges = loadManualEdges();
      state.selectedNodeId = state.graph.nodes[0]?.id || "";
      renderProjectList();
      renderProject();
      setTimeout(fitCanvas, 20);
    }

    async function loadHeroMedia() {
      if (INTRO_BACKGROUND_VIDEO) {
        const media = {
          kind: "video",
          source: "hardcoded",
          project_name: "intro-background-20260427-v2",
          path: INTRO_BACKGROUND_VIDEO,
          url: INTRO_BACKGROUND_VIDEO,
        };
        state.heroMedia = media;
        applyHeroMedia(media);
        return;
      }
      const params = new URLSearchParams();
      const root = els.rootInput.value.trim();
      if (root) params.set("root", root);
      const media = await readJson(`/api/hero-media?${params.toString()}`);
      state.heroMedia = media;
      applyHeroMedia(media);
    }

    function applyHeroMedia(media) {
      if (!media || media.kind === "none") {
        showIntroFallback();
        return;
      }
      if (media.kind === "video") {
        els.introVideo.hidden = false;
        els.introImage.hidden = true;
        els.introVideo.src = media.url;
        els.introVideo.play().catch(showIntroFallback);
        els.introFallback.classList.remove("visible");
        return;
      }
      if (media.kind === "image") {
        els.introVideo.removeAttribute("src");
        els.introVideo.hidden = true;
        els.introImage.hidden = false;
        els.introImage.style.setProperty("--intro-image", `url("${media.url}")`);
        els.introFallback.classList.remove("visible");
        return;
      }
      showIntroFallback();
    }

    function showIntroFallback() {
      els.introVideo.hidden = true;
      els.introImage.hidden = true;
      els.introFallback.classList.add("visible");
    }

    function hideIntro() {
      els.intro.classList.add("hidden");
      sessionStorage.setItem("video-master-intro-seen", "1");
    }

    function showIntro() {
      els.intro.classList.remove("hidden");
      sessionStorage.removeItem("video-master-intro-seen");
      if (state.heroMedia) applyHeroMedia(state.heroMedia);
    }

    function renderProjectList() {
      els.projectCount.textContent = `${state.projects.length} 个项目`;
      if (!state.projects.length) {
        els.projectList.innerHTML = `<div class="empty">没有找到项目</div>`;
        return;
      }

      els.projectList.innerHTML = state.projects.map((project) => {
        const active = project.path === state.currentProject ? " active" : "";
        return `
          <button class="project-item${active}" type="button" data-project="${escapeHtml(project.path)}">
            <span class="project-name">
              <span>${escapeHtml(project.name)}</span>
              ${badge(tWorkflow(project.workflow_mode), statusClass(project.workflow_mode))}
            </span>
            <span class="badge-row">
              ${badge(`${project.shot_count || 0} 镜`)}
              ${badge(`${project.completed_nodes || 0}/${project.total_nodes || 0} 节点`)}
            </span>
          </button>
        `;
      }).join("");

      els.projectList.querySelectorAll("[data-project]").forEach((button) => {
        button.addEventListener("click", () => {
          loadProject(button.dataset.project, false).catch(showError);
        });
      });
    }

    const SHOT_GRID_COLUMNS = 4;
    const SHOT_CARD_WIDTH = 392;
    const SHOT_CARD_HEIGHT = 470;
    const SHOT_GRID_START_X = 330;
    const SHOT_GRID_START_Y = 72;
    const SHOT_GRID_GAP_X = 40;
    const SHOT_GRID_GAP_Y = 120;
    const SOURCE_COLUMN_X = 70;
    const SOURCE_NODE_WIDTH = 250;
    const DRAG_INERTIA_FRICTION = 0.84;
    const DRAG_INERTIA_MIN_VELOCITY = 0.045;
    const DRAG_INERTIA_MAX_DURATION = 420;
    const DRAG_MAX_VELOCITY = 1.45;

    function shotGridPosition(index) {
      const row = Math.floor(index / SHOT_GRID_COLUMNS);
      const col = index % SHOT_GRID_COLUMNS;
      return {
        x: SHOT_GRID_START_X + col * (SHOT_CARD_WIDTH + SHOT_GRID_GAP_X),
        y: SHOT_GRID_START_Y + row * (SHOT_CARD_HEIGHT + SHOT_GRID_GAP_Y),
      };
    }

    function buildGraph(project) {
      if (!project) return { nodes: [], edges: [] };
      const nodes = [];
      const edges = [];
      const shots = project.shots || [];
      const workflow = project.workflow || {};
      const production = project.production_mode || {};
      const style = project.visual_style || {};
      const characters = project.character_design || {};
      const shotRequests = project.shot_requests || [];

      nodes.push({
        id: "project_input",
        type: "source",
        title: "项目入口",
        subtitle: tWorkflow(workflow.workflow_mode),
        x: SOURCE_COLUMN_X,
        y: 72,
        width: SOURCE_NODE_WIDTH,
        height: 112,
        meta: {
          "入口模式": tWorkflow(workflow.workflow_mode),
          "确认策略": tPolicy(workflow.confirmation_policy),
          "影片类型": tVideoMode(production.video_mode),
        },
        text: "从 brief、spec lock、最终交付目录读取项目状态，并转成可视化节点图。",
      });

      nodes.push({
        id: "style_lock",
        type: "style",
        title: "视觉风格锁定",
        subtitle: style.visual_style_preset_id ? tStyle(style.visual_style_preset_id) : "待定",
        x: SOURCE_COLUMN_X,
        y: 220,
        width: SOURCE_NODE_WIDTH,
        height: 118,
        meta: {
          "风格预设": style.visual_style_preset_id ? tStyle(style.visual_style_preset_id) : "待定",
          "锁定状态": style.visual_style_lock || "未记录",
        },
        text: style.art_direction || style.storyboard_prompt_rules || "视觉风格会影响每张分镜图和视频提示词。",
      });

      nodes.push({
        id: "character_lock",
        type: "character",
        title: "人物形象锁定",
        subtitle: characterStatus(project),
        x: SOURCE_COLUMN_X,
        y: 374,
        width: SOURCE_NODE_WIDTH,
        height: 118,
        meta: {
          "状态": characterStatus(project),
          "固定人物": characters.fixed_characters || "未启用",
          "参考目录": characters.character_reference_dir || "characters/",
        },
        text: characters.character_prompt_rules || "固定人物项目会先定稿人设图和角色描述，再进入分镜图与视频提示词生成。",
      });

      if (shots.length) {
        let previousShotId = "";
        shots.forEach((shot, index) => {
          const position = shotGridPosition(index);
          const shotNode = {
            id: `shot_${shot.shot_id}`,
            type: "shot",
            title: `${shot.shot_id} 分镜制作卡`,
            subtitle: shot.beat || `${shot.duration_seconds || "-"} 秒`,
            x: position.x,
            y: position.y,
            width: SHOT_CARD_WIDTH,
            height: SHOT_CARD_HEIGHT,
            shot,
            image: shot.frame?.exists ? fileUrl(project.project.path, shot.frame.path) : "",
            meta: {
              "镜头": shot.shot_id,
              "流程": `${index + 1}/${shots.length}`,
              "时间": `${shot.start || "-"} 至 ${shot.end || "-"}`,
              "时长": `${shot.duration_seconds ?? "-"} 秒`,
              "画面文件": shot.frame?.path || "未生成",
              "视频提示词": shot.video_prompt ? "已合并到卡片" : "暂无",
            },
            text: shot.visual_action || shot.purpose || "最终分镜图节点。",
          };
          nodes.push(shotNode);
          if (index === 0) {
            edges.push(["project_input", shotNode.id, "main"]);
            edges.push(["style_lock", shotNode.id, "alt"]);
            edges.push(["character_lock", shotNode.id, "alt"]);
          } else {
            edges.push([previousShotId, shotNode.id, "main"]);
          }
          previousShotId = shotNode.id;
        });
      } else {
        const shotPlaceholder = {
          id: "shot_placeholder",
          type: "shot",
          title: "分镜制作卡",
          subtitle: "等待生成 shot_list",
          x: SHOT_GRID_START_X,
          y: 72,
          width: SHOT_CARD_WIDTH,
          height: SHOT_CARD_HEIGHT,
          meta: {
            "状态": "暂无分镜",
            "来源": "最终交付/01_分镜图",
          },
          text: "生成项目分镜后，每一张分镜制作卡会同时展示最终分镜图和视频提示词。",
          shot: {
            duration_seconds: "",
            start: "",
            video_prompt: "生成视频提示词后，每个镜头的 copy-ready prompt 会合并展示在分镜制作卡中。",
          },
        };
        nodes.push(shotPlaceholder);
        edges.push(["project_input", "shot_placeholder", "main"]);
        edges.push(["style_lock", "shot_placeholder", "alt"]);
        edges.push(["character_lock", "shot_placeholder", "alt"]);
      }

      shotRequests.forEach((request, index) => {
        const x = Number.isFinite(Number(request.x)) ? Number(request.x) : SHOT_GRID_START_X + 28 * index;
        const y = Number.isFinite(Number(request.y)) ? Number(request.y) : SHOT_GRID_START_Y + 64 + 28 * index;
        const insertAfterShotId = request.insert_after_shot_id || nearestShotIdForPoint({ x, y }, nodes);
        const requestNode = {
          id: `idea_${request.request_id || index}`,
          type: "idea",
          title: "分镜想法",
          subtitle: ideaStatusLabel(request.status),
          x,
          y,
          width: 320,
          height: 212,
          ideaRequest: request,
          meta: {
            "状态": ideaStatusLabel(request.status),
            "插入位置": insertAfterShotId ? `接在 ${insertAfterShotId} 后` : "由 Codex 判断",
          },
          text: request.idea || "等待 Codex 生成正式分镜。",
        };
        nodes.push(requestNode);
        if (insertAfterShotId) {
          edges.push([`shot_${insertAfterShotId}`, requestNode.id, "idea-link"]);
        }
      });

      const lastShotId = shots.length ? `shot_${shots[shots.length - 1].shot_id}` : "shot_placeholder";
      const usedColumns = shots.length ? Math.min(shots.length, SHOT_GRID_COLUMNS) : 1;
      const gridRows = Math.max(1, Math.ceil(Math.max(shots.length, 1) / SHOT_GRID_COLUMNS));
      const gridRight = SHOT_GRID_START_X + usedColumns * SHOT_CARD_WIDTH + Math.max(0, usedColumns - 1) * SHOT_GRID_GAP_X;
      const gridHeight = gridRows * SHOT_CARD_HEIGHT + Math.max(0, gridRows - 1) * SHOT_GRID_GAP_Y;
      const finalX = gridRight + 40;
      const finalY = SHOT_GRID_START_Y + Math.max(0, (gridHeight - 178) / 2);

      nodes.push({
        id: "final_delivery",
        type: "deliverable",
        title: "最终交付包",
        subtitle: "最终交付目录",
        x: finalX,
        y: finalY,
        width: 300,
        height: 178,
        meta: {
          "分镜总览": project.deliverables?.storyboard_overview?.exists ? "已生成" : "缺失",
          "制作总表": project.deliverables?.workbook?.exists ? "已生成" : "缺失",
          "预览视频": project.deliverables?.preview_video?.exists ? "已生成" : "缺失",
        },
        text: "最终交付目录汇总分镜图、提示词、字幕、预览视频、制作总表和包装素材。",
      });

      edges.push([lastShotId, "final_delivery", "main"]);

      applySavedLayout(project, nodes);
      return { nodes, edges };
    }

    function renderProject() {
      const project = state.project;
      if (!project) {
        els.projectTitle.textContent = "未选择项目";
        els.modeBadges.innerHTML = "";
        els.graphSummary.textContent = "未选择";
        els.miniMap.innerHTML = `<div class="empty">暂无项目</div>`;
        renderBoard();
        renderInspector();
        return;
      }

      const workflow = project.workflow || {};
      const style = project.visual_style || {};
      const shots = project.shots || [];
      const nodes = state.graph.nodes || [];
      const edges = state.graph.edges || [];
      els.projectTitle.textContent = project.project?.name || "未命名项目";
      els.modeBadges.innerHTML = [
        badge(tWorkflow(workflow.workflow_mode), statusClass(workflow.workflow_mode || "guided")),
        badge(`${shots.length} 个分镜`),
        badge(style.visual_style_preset_id ? tStyle(style.visual_style_preset_id) : "视觉风格待定", "style"),
        badge(packagingStatus(project), "skipped"),
      ].join("");
      els.graphSummary.textContent = state.frameworkOnly ? `${shots.length} 分镜框架` : `${nodes.length} 节点 / ${edges.length} 连线`;
      renderMiniMap(project);
      renderBoard();
      renderInspector();
    }

    function renderMiniMap(project) {
      const nodes = state.graph.nodes || [];
      const shots = project.shots || [];
      const promptFiles = Object.values(project.prompts || {});
      const promptReady = promptFiles.filter((item) => item && item.exists).length;
      const deliverables = Object.values(project.deliverables || {}).filter((item) => item && item.exists !== undefined);
      const deliverableReady = deliverables.filter((item) => item.exists).length;
      const rows = [
        ["节点", nodes.length, Math.min(nodes.length / 18, 1)],
        ["分镜", shots.length, Math.min(shots.length / 12, 1)],
        ["提示词", `${promptReady}/${promptFiles.length}`, promptFiles.length ? promptReady / promptFiles.length : 0],
        ["交付物", `${deliverableReady}/${deliverables.length}`, deliverables.length ? deliverableReady / deliverables.length : 0],
      ];
      els.miniMap.innerHTML = rows.map(([label, value, ratio]) => `
        <div class="mini-row">
          <span>${escapeHtml(label)} ${escapeHtml(value)}</span>
          <span class="mini-bar"><i style="width:${Math.round(Number(ratio) * 100)}%"></i></span>
        </div>
      `).join("");
    }

    function renderBoard() {
      cancelNodeInertia();
      const visibleNodes = filteredNodes();
      const visibleIds = new Set(visibleNodes.map((node) => node.id));
      const visibleEdges = canvasEdges().filter(([from, to]) => visibleIds.has(from) && visibleIds.has(to));
      const maxX = Math.max(1500, ...visibleNodes.map((node) => node.x + node.width + 100));
      const maxY = Math.max(820, ...visibleNodes.map((node) => node.y + node.height + 100));
      const scaledWidth = Math.max(maxX * state.zoom, els.viewport.clientWidth + 120);
      const scaledHeight = Math.max(maxY * state.zoom, els.viewport.clientHeight + 120);
      els.world.style.width = `${scaledWidth}px`;
      els.world.style.height = `${scaledHeight}px`;
      els.connectionLayer.setAttribute("width", maxX);
      els.connectionLayer.setAttribute("height", maxY);
      els.world.style.transform = `scale(${state.zoom})`;
      els.world.classList.toggle("framework-only", state.frameworkOnly);
      updateFrameworkButton();
      els.canvasModeSelect.value = state.filter;

      renderEdgesOnly(visibleNodes, visibleEdges);
      els.nodeLayer.innerHTML = visibleNodes.map(renderNode).join("");

      els.nodeLayer.querySelectorAll("[data-node]").forEach((nodeEl) => {
        nodeEl.addEventListener("click", () => {
          if (Date.now() < state.suppressClickUntil) return;
          state.selectedNodeId = nodeEl.dataset.node;
          renderBoard();
          renderInspector();
        });
        nodeEl.addEventListener("pointerdown", (event) => startNodeDrag(event, nodeEl.dataset.node));
      });
      bindShotCanvasActions();
      bindConnectionPorts();
    }

    function renderEdgesOnly(nodes = filteredNodes(), edges = null) {
      const visibleIds = new Set(nodes.map((node) => node.id));
      const visibleEdges = edges || canvasEdges().filter(([from, to]) => visibleIds.has(from) && visibleIds.has(to));
      els.connectionLayer.innerHTML = [
        renderEdgeDefs(),
        visibleEdges.map((edge) => renderEdge(edge, nodes)).join(""),
        renderConnectionPreview(nodes),
      ].join("");
    }

    function edgeElementKey(edge) {
      return edge.map((value) => String(value || "main").replaceAll("|", "%7C")).join("|");
    }

    function findEdgeGroup(edge) {
      const key = edgeElementKey(edge);
      return Array.from(els.connectionLayer.querySelectorAll("[data-edge-key]")).find((group) => group.dataset.edgeKey === key);
    }

    function visibleEdgesForNodes(nodes) {
      const visibleIds = new Set(nodes.map((node) => node.id));
      return canvasEdges().filter(([from, to]) => visibleIds.has(from) && visibleIds.has(to));
    }

    function updateConnectedEdgesDuringDrag(nodeId) {
      const nodes = filteredNodes();
      const connectedEdges = visibleEdgesForNodes(nodes).filter(([from, to]) => from === nodeId || to === nodeId);
      if (!connectedEdges.length) return;
      for (const edge of connectedEdges) {
        const group = findEdgeGroup(edge);
        const nextMarkup = renderEdge(edge, nodes).trim();
        if (!group || !nextMarkup) {
          renderEdgesOnly(nodes);
          return;
        }
        group.outerHTML = nextMarkup;
      }
    }

    function requestConnectionPreviewFrame() {
      if (!state.connectionDrag || state.connectionDrag.frameId) return;
      state.connectionDrag.frameId = requestAnimationFrame(updateConnectionPreviewFrame);
    }

    function updateConnectionPreviewFrame() {
      const drag = state.connectionDrag;
      if (!drag) return;
      drag.frameId = 0;
      updateConnectionPreviewOnly();
    }

    function updateConnectionPreviewOnly(nodes = filteredNodes()) {
      const current = els.connectionLayer.querySelector('[data-edge-type="connection-preview"]');
      const nextMarkup = renderConnectionPreview(nodes).trim();
      if (current && nextMarkup) {
        current.outerHTML = nextMarkup;
      } else if (current) {
        current.remove();
      } else if (nextMarkup) {
        els.connectionLayer.insertAdjacentHTML("beforeend", nextMarkup);
      }
    }

    function filteredNodes() {
      const nodes = canvasNodes();
      if (state.frameworkOnly) {
        return nodes.filter((node) => node.type === "shot");
      }
      if (state.filter === "shots") {
        return nodes.filter((node) => ["source", "style", "character", "shot", "deliverable"].includes(node.type));
      }
      if (state.filter === "packaging") {
        return nodes.filter((node) => ["source", "style", "character", "shot", "deliverable"].includes(node.type));
      }
      return nodes;
    }

    function canvasNodes() {
      const nodes = [...(state.graph.nodes || [])];
      if (state.draftIdea) nodes.push(state.draftIdea);
      return nodes;
    }

    function canvasEdges() {
      const edges = [...(state.graph.edges || [])];
      (state.manualEdges || []).forEach(([from, to]) => {
        if (!from || !to || from === to) return;
        const manualEdge = [from, to, "manual"];
        const existingIndex = edges.findIndex(([edgeFrom, edgeTo]) => edgeFrom === from && edgeTo === to);
        if (existingIndex >= 0) {
          edges[existingIndex] = manualEdge;
        } else {
          edges.push(manualEdge);
        }
      });
      if (state.draftIdea) {
        const insertAfterShotId = state.draftIdea.insert_after_shot_id || nearestShotIdForPoint(state.draftIdea, state.graph.nodes || []);
        if (insertAfterShotId) {
          edges.push([`shot_${insertAfterShotId}`, state.draftIdea.id, "idea-link"]);
        }
      }
      return edges;
    }

    function renderEdgeDefs() {
      return `
        <defs>
          <marker id="edge-arrow-main" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
            <path d="M 1 1 L 9 5.5 L 1 10 Z" fill="rgba(125, 165, 255, 0.86)"></path>
          </marker>
          <marker id="edge-arrow-alt" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
            <path d="M 1 1 L 9 5.5 L 1 10 Z" fill="rgba(61, 214, 208, 0.76)"></path>
          </marker>
          <marker id="edge-arrow-idea" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
            <path d="M 1 1 L 9 5.5 L 1 10 Z" fill="rgba(248, 184, 78, 0.86)"></path>
          </marker>
          <marker id="edge-arrow-manual" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
            <path d="M 1 1 L 9 5.5 L 1 10 Z" fill="rgba(61, 214, 208, 0.92)"></path>
          </marker>
          <marker id="edge-arrow-preview" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
            <path d="M 1 1 L 9 5.5 L 1 10 Z" fill="rgba(226, 232, 240, 0.82)"></path>
          </marker>
        </defs>
      `;
    }

    function findCanvasNode(nodeId) {
      return canvasNodes().find((item) => item.id === nodeId);
    }

    function nearestShotIdForPoint(point, nodes = canvasNodes()) {
      const shotNodes = nodes.filter((node) => node.type === "shot" && node.shot?.shot_id);
      let nearest = null;
      let nearestDistance = Number.POSITIVE_INFINITY;
      shotNodes.forEach((node) => {
        const centerX = node.x + node.width / 2;
        const centerY = node.y + node.height / 2;
        const distance = Math.hypot((point?.x || 0) - centerX, (point?.y || 0) - centerY);
        if (distance < nearestDistance) {
          nearest = node;
          nearestDistance = distance;
        }
      });
      return nearest?.shot?.shot_id || "";
    }

    function edgeOrientation(from, to) {
      if (from.type === "shot" && to.type === "shot") {
        return Math.abs(from.y - to.y) < SHOT_CARD_HEIGHT * 0.45 ? "horizontal" : "vertical";
      }
      if (from.type === "shot" && to.type === "deliverable") {
        return "horizontal";
      }
      return "horizontal";
    }

    function edgeEndpoint(node, side) {
      if (node.type === "point") {
        return { x: node.x, y: node.y };
      }
      if (side === "out") {
        return { x: node.x + node.width, y: node.y + node.height / 2 };
      }
      return { x: node.x, y: node.y + node.height / 2 };
    }

    function edgePath(x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      if (dx >= 72) {
        const bend = Math.min(220, Math.max(78, dx * 0.42));
        return `M ${x1} ${y1} C ${x1 + bend} ${y1}, ${x2 - bend} ${y2}, ${x2} ${y2}`;
      }
      const loop = Math.min(260, Math.max(112, Math.abs(dy) * 0.42 + 92));
      const gutter = Math.max(x1, x2) + loop;
      const midY = y1 + dy * 0.5;
      return `M ${x1} ${y1} C ${gutter} ${y1}, ${gutter} ${midY}, ${gutter} ${midY} C ${gutter} ${y2}, ${x2 - 82} ${y2}, ${x2} ${y2}`;
    }

    function edgeMarkerId(edgeType) {
      if (edgeType === "manual") return "edge-arrow-manual";
      if (edgeType === "idea-link") return "edge-arrow-idea";
      if (edgeType === "connection-preview") return "edge-arrow-preview";
      if (edgeType === "alt") return "edge-arrow-alt";
      return "edge-arrow-main";
    }

    function renderEdge(edge, nodes) {
      const [fromId, toId, edgeType] = edge;
      const from = nodes.find((node) => node.id === fromId);
      const to = nodes.find((node) => node.id === toId);
      if (!from || !to) return "";
      const start = edgeEndpoint(from, "out");
      const end = edgeEndpoint(to, "in");
      const d = edgePath(start.x, start.y, end.x, end.y);
      const edgeClass = ["alt", "idea-link", "manual", "connection-preview"].includes(edgeType) ? ` ${edgeType}` : "";
      return `
        <g data-edge-key="${escapeHtml(edgeElementKey(edge))}" data-edge-from="${escapeHtml(fromId)}" data-edge-to="${escapeHtml(toId)}" data-edge-type="${escapeHtml(edgeType || "main")}">
          <path class="edge-path${edgeClass}" d="${d}" marker-end="url(#${edgeMarkerId(edgeType)})"></path>
          <circle class="edge-dot${edgeClass}" cx="${start.x}" cy="${start.y}" r="7"></circle>
          <circle class="edge-dot${edgeClass}" cx="${end.x}" cy="${end.y}" r="7"></circle>
        </g>
      `;
    }

    function renderConnectionPreview(nodes) {
      if (!state.connectionDrag) return "";
      const from = nodes.find((node) => node.id === state.connectionDrag.fromNodeId);
      if (!from) return "";
      const pointer = {
        id: "__connection_pointer",
        type: "point",
        x: state.connectionDrag.x,
        y: state.connectionDrag.y,
        width: 0,
        height: 0,
      };
      return renderEdge([from.id, pointer.id, "connection-preview"], [...nodes, pointer]);
    }

    function renderNode(node) {
      const selected = node.id === state.selectedNodeId ? " selected" : "";
      const body = node.type === "shot" ? renderShotBody(node) : node.type === "idea" ? renderIdeaNodeBody(node) : renderTextBody(node);
      const headerPort = node.type === "shot" ? "" : `<span class="node-port"></span>`;
      const flowPorts = renderNodePorts(node);
      return `
        <article class="graph-node ${escapeHtml(node.type)}${selected}" data-node="${escapeHtml(node.id)}" style="left:${node.x}px;top:${node.y}px;width:${node.width}px;min-height:${node.height}px">
          <div class="node-head">
            <span>${escapeHtml(node.title)}</span>
            <span class="node-drag-hint">拖动</span>
            ${headerPort}
          </div>
          ${body}
          ${flowPorts}
        </article>
      `;
    }

    function renderNodePorts(node) {
      if (node.type !== "shot" || !node.shot?.shot_id) return "";
      const nodeId = escapeHtml(node.id);
      const shotId = escapeHtml(node.shot.shot_id || "");
      return `
        <div class="node-flow-ports">
          <button class="flow-port flow-port-in" type="button" data-connect-port="in" data-connect-node="${nodeId}" title="${shotId} 首端">首</button>
          <button class="flow-port flow-port-out" type="button" data-connect-port="out" data-connect-node="${nodeId}" title="${shotId} 尾端">尾</button>
        </div>
      `;
    }

    function renderShotBindings(shot) {
      const copywriting = shot.copywriting || {};
      const packaging = shot.packaging || {};
      const blocks = [];
      if (copywriting.voiceover || copywriting.sfx) {
        const lines = [
          copywriting.voiceover ? `口播：${copywriting.voiceover}` : "",
          copywriting.sfx ? `音效：${copywriting.sfx}` : "",
        ].filter(Boolean).join(" / ");
        blocks.push(`
          <div class="shot-binding">
            <div class="shot-binding-head"><span class="binding-chip">文案绑定</span><span>${escapeHtml(shot.shot_id || "")}</span></div>
            <div class="shot-binding-text">${escapeHtml(lines)}</div>
          </div>
        `);
      }
      if (packaging.role || packaging.summary) {
        blocks.push(`
          <div class="shot-binding">
            <div class="shot-binding-head"><span class="binding-chip packaging-chip">包装绑定</span><span>${escapeHtml(packaging.role || packaging.status || "包装")}</span></div>
            <div class="shot-binding-text">${escapeHtml(packaging.summary || packaging.status || "包装资产绑定到当前分镜。")}</div>
          </div>
        `);
      }
      if (!blocks.length) return "";
      return `<div class="shot-bindings">${blocks.join("")}</div>`;
    }

    function renderShotInsertOptions(selected = "") {
      const shots = state.project?.shots || [];
      const options = [`<option value="">由 Codex 判断</option>`];
      shots.forEach((shot) => {
        const value = shot.shot_id || "";
        const label = `${shot.shot_id || "分镜"} ${shot.beat || ""}`.trim();
        options.push(`<option value="${escapeHtml(value)}"${value === selected ? " selected" : ""}>${escapeHtml(label)}</option>`);
      });
      return options.join("");
    }

    function renderIdeaNodeBody(node) {
      const request = node.ideaRequest || null;
      if (request) {
        return `
          <div class="node-body idea-status">
            <div class="node-meta">
              ${badge("待生成分支", "skipped")}
              ${badge(ideaStatusLabel(request.status), request.status === "pending" ? "skipped" : "complete")}
              ${badge((request.insert_after_shot_id || node.meta?.["插入位置"]) ? (request.insert_after_shot_id ? `接在 ${request.insert_after_shot_id} 后` : node.meta["插入位置"]) : "位置待判断")}
            </div>
            <div>
              <div class="shot-section-label">用户想法</div>
              <div class="node-text">${escapeHtml(request.idea || "")}</div>
            </div>
            <div class="shot-binding">
              <div class="shot-binding-head"><span class="binding-chip packaging-chip">已回传</span><span>等待 Codex 生成</span></div>
              <div class="shot-binding-text">这条想法已写入项目队列，Codex 可以据此生成正式分镜、分镜图提示词和 Seedance 2.0 视频提示词。</div>
            </div>
          </div>
        `;
      }
      return `
        <div class="node-body">
          <form class="idea-form" data-idea-submit data-node-id="${escapeHtml(node.id)}">
            <label>分镜想法
              <textarea name="idea" placeholder="例如：补一个粉底液滴落到皮肤上的微距镜头。">${escapeHtml(node.idea || "")}</textarea>
            </label>
            <label>插入位置
              <select name="insert_after_shot_id" data-idea-insert-after="${escapeHtml(node.id)}">${renderShotInsertOptions(node.insert_after_shot_id || "")}</select>
            </label>
            <div class="idea-actions">
              <button class="shot-action" type="button" data-idea-cancel="${escapeHtml(node.id)}">取消</button>
              <button class="shot-action" type="submit">交给 Codex 生成</button>
            </div>
          </form>
        </div>
      `;
    }

    function renderShotBody(node) {
      const shot = node.shot || {};
      const image = node.image ? `<img src="${node.image}" alt="${escapeHtml(node.title)}">` : `<span>暂无分镜图</span>`;
      const prompt = shot.video_prompt || "暂无视频提示词。";
      const editor = state.editingShot?.anchorId === node.id ? renderShotEditor(node) : "";
      const copyImageDisabled = node.image ? "" : " disabled";
      if (state.frameworkOnly) {
        return `
          <div class="node-body storyboard-frame-only">
            <div class="node-meta">
              ${badge(shot.duration_seconds !== undefined ? `${shot.duration_seconds} 秒` : "时长待定")}
              ${badge(shot.start || "起点待定")}

    function bindConnectionPorts() {
      els.nodeLayer.querySelectorAll("[data-connect-port]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
        });

        button.addEventListener("pointerdown", startConnectionDrag);
      });

    function startConnectionDrag(event) {
      if (event.button !== 0) return;
      const fromNodeId = event.currentTarget.dataset.connectNode || "";
      const fromNode = findCanvasNode(fromNodeId);
      if (!fromNode || fromNode.type !== "shot") return;
      event.preventDefault();
      event.stopPropagation();
      cancelNodeInertia();
      closeCanvasContextMenu();
      const point = canvasPointFromEvent(event);
      state.connectionDrag = {
        pointerId: event.pointerId,
        fromNodeId,
        x: point.x,
        y: point.y,
        frameId: 0,
      };
      event.currentTarget.classList.add("active");
      event.currentTarget.setPointerCapture(event.pointerId);
      els.viewport.classList.add("connecting");
      renderEdgesOnly();
    }

    function moveConnectionDrag(event) {
      if (!state.connectionDrag || event.pointerId !== state.connectionDrag.pointerId) return;
      event.preventDefault();
      const point = canvasPointFromEvent(event);
      state.connectionDrag.x = point.x;
      state.connectionDrag.y = point.y;
      requestConnectionPreviewFrame();
    }

    function finishConnectionDrag(event) {
      if (!state.connectionDrag || event.pointerId !== state.connectionDrag.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      const drag = state.connectionDrag;
      const targetPort = document.elementFromPoint(event.clientX, event.clientY)?.closest?.('[data-connect-port="in"]');
      const targetNodeId = targetPort?.dataset.connectNode || "";
      clearConnectionDrag(drag);
      if (targetNodeId && targetNodeId !== drag.fromNodeId) {
        saveManualEdge(drag.fromNodeId, targetNodeId);
        return;
      }
      renderEdgesOnly();
    }

    function clearConnectionDrag(drag = state.connectionDrag) {
      if (!drag) return;
      if (drag.frameId) {
        cancelAnimationFrame(drag.frameId);
      }
      const sourcePort = findNodeElement(drag.fromNodeId)?.querySelector('[data-connect-port="out"]');
      if (sourcePort) {
        sourcePort.classList.remove("active");
        if (sourcePort.hasPointerCapture?.(drag.pointerId)) {
          sourcePort.releasePointerCapture(drag.pointerId);
        }
      }
      state.connectionDrag = null;
      els.viewport.classList.remove("connecting");
    }

    function saveManualEdge(fromNodeId, toNodeId) {
      const fromNode = findCanvasNode(fromNodeId);
      const toNode = findCanvasNode(toNodeId);
      if (!fromNode || !toNode || fromNode.type !== "shot" || toNode.type !== "shot") return;
      const existing = new Set((state.manualEdges || []).map(([from, to]) => `${from}->${to}`));
      if (!existing.has(`${fromNodeId}->${toNodeId}`)) {
        state.manualEdges = [...(state.manualEdges || []), [fromNodeId, toNodeId, "manual"]];
        saveManualEdges();
      }
      renderBoard();
      renderInspector();
    }

    async function copyShotPrompt(nodeId, button) {
      const node = findCanvasNode(nodeId);
      const prompt = node?.shot?.video_prompt || "";
      if (!prompt) throw new Error("当前分镜还没有视频提示词");
      await copyText(prompt);
      flashShotAction(button, "已复制");
    }

    async function copyShotImage(imageUrl, button) {
      if (!imageUrl) throw new Error("当前分镜还没有分镜图");
      try {
        if (!navigator.clipboard?.write || typeof ClipboardItem === "undefined") {
          throw new Error("浏览器暂不支持图片复制");
        }
        const response = await fetch(imageUrl);
        if (!response.ok) throw new Error(`图片读取失败：${response.status}`);
        let blob = await response.blob();
        const type = blob.type || imageMimeFromUrl(imageUrl);
        if (!type.startsWith("image/")) throw new Error("当前文件不是可复制图片");
        if (blob.type !== type) {
          blob = blob.slice(0, blob.size, type);
        }
        await navigator.clipboard.write([new ClipboardItem({ [type]: blob })]);
        flashShotAction(button, "已复制");
      } catch (error) {
        const absoluteUrl = new URL(imageUrl, window.location.href).href;
        await copyText(absoluteUrl);
        flashShotAction(button, "已复制地址");
      }
    }

    async function copyText(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }

    function imageMimeFromUrl(imageUrl) {
      const pathname = new URL(imageUrl, window.location.href).pathname.toLowerCase();
      if (pathname.endsWith(".jpg") || pathname.endsWith(".jpeg")) return "image/jpeg";
      if (pathname.endsWith(".webp")) return "image/webp";
      if (pathname.endsWith(".gif")) return "image/gif";
      return "image/png";
    }

    function flashShotAction(button, label) {
      if (!button) return;
      const original = button.dataset.originalLabel || button.textContent;
      button.dataset.originalLabel = original;
      button.textContent = label;
      window.clearTimeout(button.copyTimer);
      button.copyTimer = window.setTimeout(() => {
        button.textContent = button.dataset.originalLabel || original;
      }, 1200);
    }

    async function saveShotFromCanvas(form) {
      if (!state.currentProject) return;
      const formData = new FormData(form);
      const mode = form.dataset.mode === "add" ? "add" : "update";
      const shot = {
        shot_id: form.dataset.shotId || "",
        beat: String(formData.get("beat") || ""),
        duration_seconds: Number(formData.get("duration_seconds") || 3),
        visual_action: String(formData.get("visual_action") || ""),

        camera: String(formData.get("camera") || ""),

        image_prompt_seed: String(formData.get("image_prompt_seed") || ""),
        video_prompt_seed: String(formData.get("video_prompt_seed") || ""),
      };
      const payload = {
        project: state.currentProject,
        mode,
        after_shot_id: form.dataset.afterShotId || "",

      els.serverState.textContent = "写入分镜中";

      if (!state.currentProject) return;
      const formData = new FormData(form);
      const node = findCanvasNode(form.dataset.nodeId);
      const idea = String(formData.get("idea") || "").trim();

        project: state.currentProject,
        idea,
        x: Math.round(node?.x || SHOT_GRID_START_X),
        y: Math.round(node?.y || SHOT_GRID_START_Y),
        insert_after_shot_id: String(formData.get("insert_after_shot_id") || ""),

      state.selectedNodeId = `idea_${result.request?.request_id || ""}`;

    function kv(label, value) {
      return `
        <div class="kv-row">
          <span>${escapeHtml(label)}</span>
          <span>${escapeHtml(value || "-")}</span>
        </div>
      `;
    }

    function draftKey(nodeId) {
      return `video-master-node-draft:${state.currentProject}:${nodeId}`;
    }

    function layoutKey() {
      return `video-master-node-layout-v3-media-top:${state.currentProject}`;
    }

    function manualEdgesKey() {
      return `video-master-manual-edges-v1:${state.currentProject}`;
    }

    function loadManualEdges() {
      if (!state.currentProject) return [];
      try {
        const raw = JSON.parse(localStorage.getItem(manualEdgesKey()) || "[]");
        if (!Array.isArray(raw)) return [];
        return raw
          .map((edge) => [String(edge?.[0] || ""), String(edge?.[1] || ""), "manual"])
          .filter(([from, to]) => from && to && from !== to);
      } catch {
        return [];
      }
    }

    function saveManualEdges() {
      if (!state.currentProject) return;
      localStorage.setItem(manualEdgesKey(), JSON.stringify(state.manualEdges || []));
    }

    function loadSavedLayout() {
      try {
        return JSON.parse(localStorage.getItem(layoutKey()) || "{}");
      } catch {
        return {};
      }
    }

    function saveNodeLayout(node) {
      if (!state.currentProject || !node) return;
      const layout = loadSavedLayout();
      layout[node.id] = { x: Math.round(node.x), y: Math.round(node.y) };
      localStorage.setItem(layoutKey(), JSON.stringify(layout));
    }

    function applySavedLayout(project, nodes) {
      if (!project?.project?.path) return;
      const previousProject = state.currentProject;
      state.currentProject = project.project.path;
      const layout = loadSavedLayout();
      state.currentProject = previousProject;
      nodes.forEach((node) => {
        const saved = layout[node.id];
        if (saved && Number.isFinite(saved.x) && Number.isFinite(saved.y)) {
          node.x = saved.x;
          node.y = saved.y;
        }
      });
    }

      const enabled = project.title_packaging?.title_packaging_enabled;
      if (enabled === "true" || enabled === true) return "待生成包装";
      return "未启用包装";

    function characterStatus(project) {
      const design = project.character_design || {};
