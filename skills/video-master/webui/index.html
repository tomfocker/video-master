<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Master 节点式分镜预览编辑器</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #070a0f;
      --panel: #101722;
      --panel-2: #141d2a;
      --panel-3: #1a2535;
      --ink: #f4f7fb;
      --muted: #9aa6b8;
      --faint: #647184;
      --line: #263247;
      --line-bright: #4d5f79;
      --blue: #5b8cff;
      --cyan: #3dd6d0;
      --green: #4ade80;
      --amber: #f8b84e;
      --rose: #fb7185;
      --violet: #a78bfa;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      --glow-blue: 0 0 0 1px rgba(91, 140, 255, 0.55), 0 0 34px rgba(91, 140, 255, 0.28);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at 20% 15%, rgba(91, 140, 255, 0.12), transparent 28%),
        radial-gradient(circle at 78% 10%, rgba(61, 214, 208, 0.09), transparent 26%),
        var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(16, 23, 34, 0.92);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover,
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      border-color: var(--blue);
      outline: 3px solid rgba(91, 140, 255, 0.16);
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #03060b;
      transition: opacity 360ms ease, visibility 360ms ease;
    }

    .intro.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-video,
    .intro-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.72;
      transform: scale(1.02);
    }

    .intro-image {
      background:
        linear-gradient(110deg, rgba(6, 10, 18, 0.28), rgba(6, 10, 18, 0.78)),
        var(--intro-image, linear-gradient(135deg, rgba(91, 140, 255, 0.28), rgba(61, 214, 208, 0.18)));
      background-size: cover;
      background-position: center;
    }

    .intro-fallback {
      position: absolute;
      inset: 0;
      opacity: 0;
      background:
        linear-gradient(120deg, rgba(91, 140, 255, 0.20), transparent 35%),
        linear-gradient(310deg, rgba(61, 214, 208, 0.16), transparent 42%),
        radial-gradient(circle at 30% 52%, rgba(255, 255, 255, 0.12), transparent 18%),
        #060a12;
      transition: opacity 260ms ease;
    }

    .intro-fallback.visible {
      opacity: 1;
    }

    .intro-fallback::before,
    .intro-fallback::after {
      content: "";
      position: absolute;
      width: 42vw;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(125, 165, 255, 0.35);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(91, 140, 255, 0.22), rgba(61, 214, 208, 0.12)),
        rgba(12, 18, 27, 0.78);
      box-shadow: 0 30px 110px rgba(0, 0, 0, 0.35);
      animation: introDrift 12s ease-in-out infinite alternate;
    }

    .intro-fallback::before {
      left: 8vw;
      top: 18vh;
    }

    .intro-fallback::after {
      right: 7vw;
      bottom: 14vh;
      animation-delay: -4s;
    }

    @keyframes introDrift {
      from {
        transform: translate3d(-1.4vw, 0, 0) scale(1);
      }
      to {
        transform: translate3d(1.6vw, -1.1vh, 0) scale(1.035);
      }
    }

    .intro-scrim {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(3, 6, 11, 0.78) 0%, rgba(3, 6, 11, 0.38) 52%, rgba(3, 6, 11, 0.72) 100%),
        linear-gradient(0deg, rgba(3, 6, 11, 0.92) 0%, transparent 38%, rgba(3, 6, 11, 0.38) 100%);
    }

    .intro-copy {
      position: relative;
      width: min(1080px, calc(100vw - 56px));
      display: grid;
      gap: 18px;
      justify-items: start;
      padding-top: 8vh;
      transform: translate(-7vw, 8vh);
    }

    .intro-kicker {
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .intro-title {
      margin: 0;
      max-width: 780px;
      color: #fff;
      font-size: clamp(38px, 6.4vw, 92px);
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 18px 70px rgba(0, 0, 0, 0.58);
    }

    .intro-subtitle {
      max-width: 560px;
      margin: 0;
      color: rgba(244, 247, 251, 0.78);
      font-size: clamp(15px, 1.35vw, 20px);
      line-height: 1.62;
    }

    .intro-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .intro-button {
      min-width: 134px;
      height: 44px;
      padding: 0 16px;
      border-color: rgba(125, 165, 255, 0.58);
      background: rgba(11, 16, 24, 0.58);
      backdrop-filter: blur(16px);
      font-weight: 800;
    }

    .intro-button.primary {
      color: #071018;
      background: linear-gradient(135deg, #e8f6ff, #74f7ee 44%, #6a91ff);
      border-color: transparent;
    }

    .app {
      display: grid;
      grid-template-columns: 72px 300px minmax(520px, 1fr) 380px;
      grid-template-rows: 68px minmax(0, 1fr);
      width: 100vw;
      height: 100vh;
    }

    .app.side-hidden {
      grid-template-columns: 72px 0 minmax(520px, 1fr) 380px;
    }

    .app.inspector-hidden {
      grid-template-columns: 72px 300px minmax(520px, 1fr) 0;
    }

    .app.side-hidden.inspector-hidden {
      grid-template-columns: 72px 0 minmax(520px, 1fr) 0;
    }

    .app.side-hidden .side,
    .app.inspector-hidden .inspector {
      display: none;
    }

    .topbar {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 350px minmax(260px, 1fr) auto auto auto auto auto;
      gap: 10px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(77, 95, 121, 0.46);
      background: rgba(8, 12, 18, 0.92);
      backdrop-filter: blur(16px);
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #071018;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      font-weight: 900;
      box-shadow: 0 0 28px rgba(91, 140, 255, 0.28);
      flex: 0 0 auto;
    }

    .brand-text {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .brand strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 17px;
      line-height: 1.1;
    }

    .brand span,
    .small,
    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .root-control {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      min-width: 0;
    }

    .root-control input {
      height: 40px;
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(20, 29, 42, 0.9);
      color: var(--ink);
      padding: 0 12px;
    }

    .top-button,
    .tool-button {
      height: 40px;
      padding: 0 12px;
      white-space: nowrap;
      font-weight: 700;
    }

    .primary-button {
      background: linear-gradient(135deg, #1d4ed8, #0f766e);
      border-color: rgba(125, 165, 255, 0.56);
    }

    .rail {
      grid-row: 2;
      border-right: 1px solid rgba(77, 95, 121, 0.38);
      background: rgba(8, 12, 18, 0.86);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 10px;
      z-index: 4;
    }

    .rail-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: var(--muted);
    }

    .rail-button.active {
      color: var(--ink);
      border-color: var(--blue);
      box-shadow: var(--glow-blue);
    }

    .side,
    .inspector {
      min-height: 0;
      overflow: auto;
      background: rgba(11, 16, 24, 0.82);
      backdrop-filter: blur(12px);
    }

    .side {
      grid-column: 2;
      grid-row: 2;
      border-right: 1px solid rgba(77, 95, 121, 0.38);
      padding: 16px;
    }

    .inspector {
      grid-column: 4;
      grid-row: 2;
      border-left: 1px solid rgba(77, 95, 121, 0.38);
      padding: 16px;
    }

    .canvas {
      grid-column: 3;
      grid-row: 2;
      min-width: 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle, rgba(92, 108, 132, 0.34) 1px, transparent 1px),
        linear-gradient(135deg, rgba(13, 19, 29, 0.42), rgba(7, 10, 15, 0.18));
      background-size: 24px 24px, auto;
    }

    .canvas-head {
      position: absolute;
      left: 18px;
      top: 16px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      z-index: 3;
      pointer-events: none;
    }

    .canvas-title {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h1 {
      font-size: 21px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    h2 {
      font-size: 15px;
      font-weight: 780;
    }

    h3 {
      font-size: 13px;
      font-weight: 760;
    }

    .canvas-tools {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .canvas-tools button {
      min-width: 42px;
      height: 36px;
      padding: 0 10px;
      color: var(--muted);
      background: rgba(12, 18, 27, 0.78);
    }

    .viewport {
      position: absolute;
      inset: 0;
      overflow: auto;
      padding: 94px 34px 34px 34px;
      cursor: grab;
      overscroll-behavior: contain;
      touch-action: none;
    }

    .viewport.panning {
      cursor: grabbing;
    }

    .world {
      position: relative;
      min-width: 100%;
      min-height: 100%;
      transform-origin: 0 0;
      transition: transform 120ms ease;
    }

    .connection-layer {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
      z-index: 0;
    }

    .edge-path {
      fill: none;
      stroke: rgba(91, 140, 255, 0.46);
      stroke-width: 2;
      filter: drop-shadow(0 0 10px rgba(91, 140, 255, 0.3));
    }

    .edge-path.alt {
      stroke: rgba(61, 214, 208, 0.44);
    }

    .edge-dot {
      fill: rgba(15, 23, 42, 0.95);
      stroke: rgba(125, 165, 255, 0.76);
      stroke-width: 2;
    }

    .node-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .graph-node {
      position: absolute;
      width: 286px;
      min-height: 154px;
      border: 1px solid rgba(77, 95, 121, 0.8);
      border-radius: var(--radius);
      background: rgba(20, 29, 42, 0.94);
      box-shadow: var(--shadow);
      cursor: grab;
      overflow: hidden;
      user-select: none;
    }

    .graph-node.dragging {
      cursor: grabbing;
      opacity: 0.92;
      z-index: 6;
    }

    .graph-node.selected {
      border-color: rgba(125, 165, 255, 0.95);
      box-shadow: var(--glow-blue), var(--shadow);
    }

    .graph-node.frame {
      width: 340px;
      min-height: 256px;
    }

    .graph-node.prompt {
      width: 300px;
      min-height: 208px;
    }

    .graph-node.output {
      width: 250px;
      min-height: 166px;
    }

    .graph-node.packaging {
      width: 294px;
      min-height: 154px;
      border-color: rgba(248, 184, 78, 0.58);
    }

    .graph-node.character {
      width: 286px;
      min-height: 154px;
      border-color: rgba(61, 214, 208, 0.58);
    }

    .node-head {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 12px;
      border-bottom: 1px solid rgba(77, 95, 121, 0.55);
      background: rgba(11, 16, 24, 0.72);
    }

    .node-head span:first-child {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 760;
    }

    .node-port {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(125, 165, 255, 0.55);
      color: var(--blue);
      background: rgba(7, 10, 15, 0.82);
      flex: 0 0 auto;
      font-size: 17px;
      line-height: 1;
    }

    .node-drag-hint {
      color: var(--faint);
      font-size: 11px;
      white-space: nowrap;
    }

    .node-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .node-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(77, 95, 121, 0.64);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(91, 140, 255, 0.14), rgba(61, 214, 208, 0.12)),
        rgba(8, 12, 18, 0.88);
      display: grid;
      place-items: center;
      color: var(--muted);
      overflow: hidden;
    }

    .node-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .node-text {
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .node-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      border-radius: 999px;
      padding: 3px 8px;
      background: rgba(100, 113, 132, 0.18);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
    }

    .badge.complete,
    .badge.autopilot {
      color: var(--green);
      background: rgba(74, 222, 128, 0.12);
    }

    .badge.guided,
    .badge.partial {
      color: var(--blue);
      background: rgba(91, 140, 255, 0.13);
    }

    .badge.missing {
      color: var(--rose);
      background: rgba(251, 113, 133, 0.12);
    }

    .badge.skipped {
      color: var(--amber);
      background: rgba(248, 184, 78, 0.13);
    }

    .badge.style {
      color: var(--violet);
      background: rgba(167, 139, 250, 0.14);
    }

    .side-section,
    .detail-block {
      border: 1px solid rgba(77, 95, 121, 0.55);
      border-radius: var(--radius);
      background: rgba(16, 23, 34, 0.82);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.24);
    }

    .side-section {
      padding: 12px;
      margin-bottom: 12px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .project-list {
      display: grid;
      gap: 9px;
    }

    .project-item {
      width: 100%;
      text-align: left;
      padding: 11px;
      display: grid;
      gap: 9px;
      background: rgba(20, 29, 42, 0.88);
    }

    .project-item.active {
      border-color: var(--blue);
      box-shadow: var(--glow-blue);
    }

    .project-name,
    .shot-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .project-name span:first-child,
    .shot-title span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-map {
      display: grid;
      gap: 8px;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      align-items: center;
    }

    .mini-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(100, 113, 132, 0.2);
      overflow: hidden;
    }

    .mini-bar i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--blue));
    }

    .detail-block {
      padding: 13px;
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 10px;
      align-items: baseline;
    }

    .kv-row span:first-child {
      color: var(--muted);
      font-size: 12px;
    }

    .kv-row span:last-child,
    .path {
      overflow-wrap: anywhere;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid rgba(77, 95, 121, 0.56);
      background: rgba(7, 10, 15, 0.76);
      color: #e8eef8;
      border-radius: var(--radius);
      padding: 11px;
      max-height: 260px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.55;
    }

    textarea {
      width: 100%;
      min-height: 98px;
      resize: vertical;
      border: 1px solid rgba(77, 95, 121, 0.7);
      border-radius: var(--radius);
      background: rgba(7, 10, 15, 0.78);
      color: var(--ink);
      padding: 10px;
    }

    .empty {
      min-height: 148px;
      display: grid;
      place-items: center;
      border: 1px dashed rgba(77, 95, 121, 0.72);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(16, 23, 34, 0.48);
      text-align: center;
      padding: 18px;
    }

    .error {
      color: var(--rose);
    }

    @media (max-width: 1220px) {
      .app {
        grid-template-columns: 60px 260px minmax(420px, 1fr);
      }

      .topbar {
        grid-template-columns: 310px minmax(220px, 1fr) auto auto auto;
      }

      .inspector {
        display: none;
      }

      .canvas {
        grid-column: 3;
      }
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .app {
        display: block;
        min-height: 100vh;
        height: auto;
      }

      .topbar,
      .root-control {
        grid-template-columns: 1fr;
      }

      .rail {
        display: none;
      }

      .side,
      .inspector {
        max-height: none;
      }

      .canvas {
        min-height: 720px;
      }
    }
  </style>
</head>
<body>
  <section id="intro" class="intro" aria-label="Video Master 开场页">
    <video id="introVideo" class="intro-video" autoplay muted loop playsinline></video>
    <div id="introImage" class="intro-image" hidden></div>
    <div id="introFallback" class="intro-fallback visible"></div>
    <div class="intro-scrim"></div>
    <div class="intro-copy">
      <div class="intro-kicker">videomaster</div>
      <h1 class="intro-title">把想法变成可编辑的影像工作流</h1>
      <p class="intro-subtitle">从分镜图、视频提示词、文字包装到最终交付，所有素材都在节点画布里重新组织、预览和完善。</p>
      <div class="intro-actions">
        <button id="enterWorkbenchButton" class="intro-button primary" type="button">进入节点编辑器</button>
        <button id="pickProjectButton" class="intro-button" type="button">选择项目</button>
      </div>
    </div>
  </section>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">VM</div>
        <div class="brand-text">
          <strong>节点式分镜预览编辑器</strong>
          <span id="serverState">正在连接本地工作流</span>
        </div>
      </div>
      <div class="root-control">
        <input id="rootInput" type="text" spellcheck="false" aria-label="项目根目录">
        <button id="refreshButton" class="top-button" type="button">刷新项目</button>
      </div>
      <button id="showIntroButton" class="top-button" type="button">开场</button>
      <button id="toggleSideButton" class="top-button" type="button">隐藏项目库</button>
      <button id="toggleInspectorButton" class="top-button" type="button">隐藏检查器</button>
      <button id="fitButton" class="top-button" type="button">适配画布</button>
      <button id="writeStateButton" class="top-button primary-button" type="button">写入状态</button>
    </header>

    <nav class="rail" aria-label="画布工具">
      <button id="zoomInButton" class="rail-button" type="button" title="放大">+</button>
      <button id="zoomOutButton" class="rail-button" type="button" title="缩小">-</button>
      <button id="resetZoomButton" class="rail-button active" type="button" title="重置">1</button>
      <button id="reloadCanvasButton" class="rail-button" type="button" title="刷新">R</button>
    </nav>

    <aside class="side">
      <section class="side-section">
        <div class="section-head">
          <h2>项目库</h2>
          <span id="projectCount" class="small">0 个项目</span>
        </div>
        <div id="projectList" class="project-list"></div>
      </section>

      <section class="side-section">
        <div class="section-head">
          <h2>交付结构</h2>
          <span id="graphSummary" class="small">未选择</span>
        </div>
        <div id="miniMap" class="mini-map"></div>
      </section>
    </aside>

    <main class="canvas">
      <div class="canvas-head">
        <div class="canvas-title">
          <h1 id="projectTitle">未选择项目</h1>
          <div id="modeBadges" class="badge-row"></div>
        </div>
        <div class="canvas-tools">
          <button id="showAllButton" type="button">全部节点</button>
          <button id="showShotsButton" type="button">只看分镜</button>
          <button id="showPackagingButton" type="button">包装旁路</button>
        </div>
      </div>
      <div id="viewport" class="viewport">
        <div id="world" class="world">
          <svg id="connectionLayer" class="connection-layer"></svg>
          <div id="nodeLayer" class="node-layer"></div>
        </div>
      </div>
    </main>

    <aside class="inspector">
      <div class="section-head">
        <h2>节点检查器</h2>
        <span id="inspectorType" class="small"></span>
      </div>
      <div id="inspector" class="inspector-panel"></div>
    </aside>
  </div>

  <script>
    const state = {
      root: "",
      projects: [],
      currentProject: "",
      project: null,
      heroMedia: null,
      graph: { nodes: [], edges: [] },
      selectedNodeId: "",
      zoom: 1,
      filter: "all",
      sideHidden: false,
      inspectorHidden: false,
      pan: null,
      nodeDrag: null,
      suppressClickUntil: 0,
    };

    const els = {
      intro: document.querySelector("#intro"),
      introVideo: document.querySelector("#introVideo"),
      introImage: document.querySelector("#introImage"),
      introFallback: document.querySelector("#introFallback"),
      enterWorkbenchButton: document.querySelector("#enterWorkbenchButton"),
      pickProjectButton: document.querySelector("#pickProjectButton"),
      serverState: document.querySelector("#serverState"),
      rootInput: document.querySelector("#rootInput"),
      refreshButton: document.querySelector("#refreshButton"),
      showIntroButton: document.querySelector("#showIntroButton"),
      toggleSideButton: document.querySelector("#toggleSideButton"),
      toggleInspectorButton: document.querySelector("#toggleInspectorButton"),
      fitButton: document.querySelector("#fitButton"),
      writeStateButton: document.querySelector("#writeStateButton"),
      zoomInButton: document.querySelector("#zoomInButton"),
      zoomOutButton: document.querySelector("#zoomOutButton"),
      resetZoomButton: document.querySelector("#resetZoomButton"),
      reloadCanvasButton: document.querySelector("#reloadCanvasButton"),
      showAllButton: document.querySelector("#showAllButton"),
      showShotsButton: document.querySelector("#showShotsButton"),
      showPackagingButton: document.querySelector("#showPackagingButton"),
      projectList: document.querySelector("#projectList"),
      projectCount: document.querySelector("#projectCount"),
      projectTitle: document.querySelector("#projectTitle"),
      modeBadges: document.querySelector("#modeBadges"),
      graphSummary: document.querySelector("#graphSummary"),
      miniMap: document.querySelector("#miniMap"),
      viewport: document.querySelector("#viewport"),
      world: document.querySelector("#world"),
      connectionLayer: document.querySelector("#connectionLayer"),
      nodeLayer: document.querySelector("#nodeLayer"),
      inspector: document.querySelector("#inspector"),
      inspectorType: document.querySelector("#inspectorType"),
    };

    const statusNames = {
      complete: "完成",
      partial: "进行中",
      missing: "缺失",
      skipped: "跳过",
      ready: "就绪",
      unknown: "未知",
    };

    const workflowNames = {
      autopilot: "全委托",
      guided: "协作导演",
      unknown: "未识别",
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function badge(text, className = "") {
      return `<span class="badge ${className}">${escapeHtml(text)}</span>`;
    }

    function statusClass(value) {
      return String(value || "unknown").toLowerCase().replace(/[^a-z0-9_-]/g, "");
    }

    function tStatus(value) {
      return statusNames[value] || value || "未知";
    }

    function tWorkflow(value) {
      return workflowNames[value] || value || "未设置";
    }

    function fileUrl(projectPath, filePath) {
      const params = new URLSearchParams({ project: projectPath, path: filePath });
      return `/api/file?${params.toString()}`;
    }

    async function readJson(url) {
      const response = await fetch(url);
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || response.statusText);
      }
      return payload;
    }

    async function loadProjects(selectFirst = true) {
      els.serverState.textContent = "读取项目中";
      const params = new URLSearchParams();
      const root = els.rootInput.value.trim();
      if (root) params.set("root", root);
      const payload = await readJson(`/api/projects?${params.toString()}`);
      state.root = payload.root || root;
      state.projects = payload.projects || [];
      els.rootInput.value = state.root;
      els.serverState.textContent = "本地工作流已连接";
      renderProjectList();
      loadHeroMedia().catch(showIntroFallback);

      const stillExists = state.projects.some((project) => project.path === state.currentProject);
      if (selectFirst && state.projects.length) {
        await loadProject(state.projects[0].path, false);
      } else if (stillExists && state.currentProject) {
        await loadProject(state.currentProject, false);
      } else if (state.projects.length) {
        await loadProject(state.projects[0].path, false);
      } else {
        state.currentProject = "";
        state.project = null;
        state.graph = { nodes: [], edges: [] };
        renderProject();
      }
    }

    async function loadProject(projectPath, writeState) {
      state.currentProject = projectPath;
      state.selectedNodeId = "";
      const params = new URLSearchParams({ path: projectPath });
      if (writeState) params.set("write", "true");
      state.project = await readJson(`/api/project?${params.toString()}`);
      state.graph = buildGraph(state.project);
      state.selectedNodeId = state.graph.nodes[0]?.id || "";
      renderProjectList();
      renderProject();
      setTimeout(fitCanvas, 20);
    }

    async function loadHeroMedia() {
      const params = new URLSearchParams();
      const root = els.rootInput.value.trim();
      if (root) params.set("root", root);
      const media = await readJson(`/api/hero-media?${params.toString()}`);
      state.heroMedia = media;
      applyHeroMedia(media);
    }

    function applyHeroMedia(media) {
      if (!media || media.kind === "none") {
        showIntroFallback();
        return;
      }
      if (media.kind === "video") {
        els.introVideo.hidden = false;
        els.introImage.hidden = true;
        els.introVideo.src = media.url;
        els.introVideo.play().catch(showIntroFallback);
        els.introFallback.classList.remove("visible");
        return;
      }
      if (media.kind === "image") {
        els.introVideo.removeAttribute("src");
        els.introVideo.hidden = true;
        els.introImage.hidden = false;
        els.introImage.style.setProperty("--intro-image", `url("${media.url}")`);
        els.introFallback.classList.remove("visible");
        return;
      }
      showIntroFallback();
    }

    function showIntroFallback() {
      els.introVideo.hidden = true;
      els.introImage.hidden = true;
      els.introFallback.classList.add("visible");
    }

    function hideIntro() {
      els.intro.classList.add("hidden");
      sessionStorage.setItem("video-master-intro-seen", "1");
    }

    function showIntro() {
      els.intro.classList.remove("hidden");
      sessionStorage.removeItem("video-master-intro-seen");
      if (state.heroMedia) applyHeroMedia(state.heroMedia);
    }

    function renderProjectList() {
      els.projectCount.textContent = `${state.projects.length} 个项目`;
      if (!state.projects.length) {
        els.projectList.innerHTML = `<div class="empty">没有找到项目</div>`;
        return;
      }

      els.projectList.innerHTML = state.projects.map((project) => {
        const active = project.path === state.currentProject ? " active" : "";
        return `
          <button class="project-item${active}" type="button" data-project="${escapeHtml(project.path)}">
            <span class="project-name">
              <span>${escapeHtml(project.name)}</span>
              ${badge(tWorkflow(project.workflow_mode), statusClass(project.workflow_mode))}
            </span>
            <span class="badge-row">
              ${badge(`${project.shot_count || 0} 镜`)}
              ${badge(`${project.completed_nodes || 0}/${project.total_nodes || 0} 节点`)}
            </span>
          </button>
        `;
      }).join("");

      els.projectList.querySelectorAll("[data-project]").forEach((button) => {
        button.addEventListener("click", () => {
          loadProject(button.dataset.project, false).catch(showError);
        });
      });
    }

    function buildGraph(project) {
      if (!project) return { nodes: [], edges: [] };
      const nodes = [];
      const edges = [];
      const shots = project.shots || [];
      const workflow = project.workflow || {};
      const production = project.production_mode || {};
      const style = project.visual_style || {};
      const characters = project.character_design || {};
      const titleItems = project.deliverables?.title_packaging_manifest?.items || [];

      nodes.push({
        id: "project_input",
        type: "source",
        title: "项目入口",
        subtitle: tWorkflow(workflow.workflow_mode),
        x: 70,
        y: 72,
        width: 286,
        height: 168,
        meta: {
          "入口模式": tWorkflow(workflow.workflow_mode),
          "确认策略": tPolicy(workflow.confirmation_policy),
          "影片类型": tVideoMode(production.video_mode),
        },
        text: "从 brief、spec lock、最终交付目录读取项目状态，并转成可视化节点图。",
      });

      nodes.push({
        id: "style_lock",
        type: "style",
        title: "视觉风格锁定",
        subtitle: style.visual_style_preset_id ? tStyle(style.visual_style_preset_id) : "待定",
        x: 70,
        y: 294,
        width: 286,
        height: 168,
        meta: {
          "风格预设": style.visual_style_preset_id ? tStyle(style.visual_style_preset_id) : "待定",
          "锁定状态": style.visual_style_lock || "未记录",
        },
        text: style.art_direction || style.storyboard_prompt_rules || "视觉风格会影响每张分镜图和视频提示词。",
      });

      nodes.push({
        id: "character_lock",
        type: "character",
        title: "人物形象锁定",
        subtitle: characterStatus(project),
        x: 70,
        y: 516,
        width: 286,
        height: 168,
        meta: {
          "状态": characterStatus(project),
          "固定人物": characters.fixed_characters || "未启用",
          "参考目录": characters.character_reference_dir || "characters/",
        },
        text: characters.character_prompt_rules || "固定人物项目会先定稿人设图和角色描述，再进入分镜图与视频提示词生成。",
      });

      if (shots.length) {
        shots.forEach((shot, index) => {
          const y = 72 + index * 318;
          const frameNode = {
            id: `frame_${shot.shot_id}`,
            type: "frame",
            title: `${shot.shot_id} 最终分镜图`,
            subtitle: shot.beat || `${shot.duration_seconds || "-"} 秒`,
            x: 430,
            y,
            width: 340,
            height: 260,
            shot,
            image: shot.frame?.exists ? fileUrl(project.project.path, shot.frame.path) : "",
            meta: {
              "镜头": shot.shot_id,
              "时间": `${shot.start || "-"} 至 ${shot.end || "-"}`,
              "时长": `${shot.duration_seconds ?? "-"} 秒`,
              "画面文件": shot.frame?.path || "未生成",
            },
            text: shot.visual_action || shot.purpose || "最终分镜图节点。",
          };
          const promptNode = {
            id: `prompt_${shot.shot_id}`,
            type: "prompt",
            title: `${shot.shot_id} 视频提示词`,
            subtitle: "copy-ready prompt",
            x: 846,
            y: y + 18,
            width: 300,
            height: 214,
            shot,
            meta: {
              "提示词来源": "最终交付/02_提示词",
              "镜头": shot.shot_id,
            },
            text: shot.video_prompt || "暂无视频提示词。",
          };
          const outputNode = {
            id: `output_${shot.shot_id}`,
            type: "output",
            title: `${shot.shot_id} 视频片段`,
            subtitle: "待送入视频模型",
            x: 1226,
            y: y + 38,
            width: 250,
            height: 172,
            shot,
            meta: {
              "输出阶段": "视频模型生成",
              "交付状态": project.deliverables?.preview_video?.exists ? "预览已生成" : "等待生成视频片段",
            },
            text: "这里代表由分镜图和视频提示词合成的视频片段节点。",
          };
          nodes.push(frameNode, promptNode, outputNode);
          edges.push(["project_input", frameNode.id, "main"]);
          edges.push(["style_lock", frameNode.id, "alt"]);
          edges.push(["character_lock", frameNode.id, "alt"]);
          edges.push([frameNode.id, promptNode.id, "main"]);
          edges.push([promptNode.id, outputNode.id, "main"]);
        });
      } else {
        const framePlaceholder = {
          id: "frame_placeholder",
          type: "frame",
          title: "最终分镜图",
          subtitle: "等待生成 shot_list",
          x: 430,
          y: 72,
          width: 340,
          height: 246,
          meta: {
            "状态": "暂无分镜",
            "来源": "最终交付/01_分镜图",
          },
          text: "生成项目分镜后，每一张最终分镜图会在这里展开成独立节点。",
        };
        const promptPlaceholder = {
          id: "prompt_placeholder",
          type: "prompt",
          title: "视频提示词",
          subtitle: "等待生成 prompts",
          x: 846,
          y: 92,
          width: 300,
          height: 192,
          meta: {
            "状态": "暂无提示词",
            "来源": "最终交付/02_提示词",
          },
          text: "生成视频提示词后，每个镜头的 copy-ready prompt 会连接到对应分镜图。",
        };
        const outputPlaceholder = {
          id: "output_placeholder",
          type: "output",
          title: "视频片段",
          subtitle: "等待模型生成",
          x: 1226,
          y: 112,
          width: 250,
          height: 166,
          meta: {
            "状态": "等待分镜和提示词",
          },
          text: "这里会承接分镜图和提示词，表示后续送入视频模型生成的片段。",
        };
        nodes.push(framePlaceholder, promptPlaceholder, outputPlaceholder);
        edges.push(["project_input", "frame_placeholder", "main"]);
        edges.push(["style_lock", "frame_placeholder", "alt"]);
        edges.push(["character_lock", "frame_placeholder", "alt"]);
        edges.push(["frame_placeholder", "prompt_placeholder", "main"]);
        edges.push(["prompt_placeholder", "output_placeholder", "main"]);
      }

      const baseY = shots.length ? 72 + shots.length * 318 + 86 : 650;
      if (titleItems.length) {
        titleItems.forEach((item, index) => {
          const node = {
            id: `packaging_${item.id || index}`,
            type: "packaging",
            title: `文字包装 ${item.id || index + 1}`,
            subtitle: item.type || "title packaging",
            x: 430 + (index % 2) * 386,
            y: baseY + Math.floor(index / 2) * 220,
            width: 294,
            height: 168,
            meta: {
              "类型": item.type || "-",
              "透明 PNG": item.transparent_png || "-",
              "Alpha MOV": item.alpha_mov || "未生成",
            },
            text: "包装资产是旁路节点，不写入视频提示词。",
          };
          nodes.push(node);
          edges.push(["project_input", node.id, "alt"]);
        });
      } else {
        nodes.push({
          id: "packaging_sidecar",
          type: "packaging",
          title: "文字包装旁路",
          subtitle: packagingStatus(project),
          x: 430,
          y: baseY,
          width: 294,
          height: 168,
          meta: { "状态": packagingStatus(project) },
          text: "大标题、章节卡、人名条、关键数据等包装素材会在这里形成旁路节点。",
        });
        edges.push(["project_input", "packaging_sidecar", "alt"]);
      }

      const deliverableY = baseY + (titleItems.length ? Math.ceil(titleItems.length / 2) * 220 + 40 : 228);
      nodes.push({
        id: "final_delivery",
        type: "deliverable",
        title: "最终交付包",
        subtitle: "最终交付目录",
        x: 846,
        y: deliverableY,
        width: 300,
        height: 178,
        meta: {
          "分镜总览": project.deliverables?.storyboard_overview?.exists ? "已生成" : "缺失",
          "制作总表": project.deliverables?.workbook?.exists ? "已生成" : "缺失",
          "预览视频": project.deliverables?.preview_video?.exists ? "已生成" : "缺失",
        },
        text: "最终交付目录汇总分镜图、提示词、字幕、预览视频、制作总表和包装素材。",
      });

      nodes
        .filter((node) => node.type === "output" || node.type === "packaging")
        .forEach((node) => edges.push([node.id, "final_delivery", node.type === "packaging" ? "alt" : "main"]));

      applySavedLayout(project, nodes);
      return { nodes, edges };
    }

    function renderProject() {
      const project = state.project;
      if (!project) {
        els.projectTitle.textContent = "未选择项目";
        els.modeBadges.innerHTML = "";
        els.graphSummary.textContent = "未选择";
        els.miniMap.innerHTML = `<div class="empty">暂无项目</div>`;
        renderBoard();
        renderInspector();
        return;
      }

      const workflow = project.workflow || {};
      const style = project.visual_style || {};
      const shots = project.shots || [];
      const nodes = state.graph.nodes || [];
      const edges = state.graph.edges || [];
      els.projectTitle.textContent = project.project?.name || "未命名项目";
      els.modeBadges.innerHTML = [
        badge(tWorkflow(workflow.workflow_mode), statusClass(workflow.workflow_mode || "guided")),
        badge(`${shots.length} 个分镜`),
        badge(style.visual_style_preset_id ? tStyle(style.visual_style_preset_id) : "视觉风格待定", "style"),
        badge(packagingStatus(project), "skipped"),
      ].join("");
      els.graphSummary.textContent = `${nodes.length} 节点 / ${edges.length} 连线`;
      renderMiniMap(project);
      renderBoard();
      renderInspector();
    }

    function renderMiniMap(project) {
      const nodes = state.graph.nodes || [];
      const shots = project.shots || [];
      const promptFiles = Object.values(project.prompts || {});
      const promptReady = promptFiles.filter((item) => item && item.exists).length;
      const deliverables = Object.values(project.deliverables || {}).filter((item) => item && item.exists !== undefined);
      const deliverableReady = deliverables.filter((item) => item.exists).length;
      const rows = [
        ["节点", nodes.length, Math.min(nodes.length / 18, 1)],
        ["分镜", shots.length, Math.min(shots.length / 12, 1)],
        ["提示词", `${promptReady}/${promptFiles.length}`, promptFiles.length ? promptReady / promptFiles.length : 0],
        ["交付物", `${deliverableReady}/${deliverables.length}`, deliverables.length ? deliverableReady / deliverables.length : 0],
      ];
      els.miniMap.innerHTML = rows.map(([label, value, ratio]) => `
        <div class="mini-row">
          <span>${escapeHtml(label)} ${escapeHtml(value)}</span>
          <span class="mini-bar"><i style="width:${Math.round(Number(ratio) * 100)}%"></i></span>
        </div>
      `).join("");
    }

    function renderBoard() {
      const visibleNodes = filteredNodes();
      const visibleIds = new Set(visibleNodes.map((node) => node.id));
      const visibleEdges = (state.graph.edges || []).filter(([from, to]) => visibleIds.has(from) && visibleIds.has(to));
      const maxX = Math.max(1500, ...visibleNodes.map((node) => node.x + node.width + 100));
      const maxY = Math.max(820, ...visibleNodes.map((node) => node.y + node.height + 100));
      const scaledWidth = Math.max(maxX * state.zoom, els.viewport.clientWidth + 120);
      const scaledHeight = Math.max(maxY * state.zoom, els.viewport.clientHeight + 120);
      els.world.style.width = `${scaledWidth}px`;
      els.world.style.height = `${scaledHeight}px`;
      els.connectionLayer.setAttribute("width", maxX);
      els.connectionLayer.setAttribute("height", maxY);
      els.world.style.transform = `scale(${state.zoom})`;

      renderEdgesOnly(visibleNodes, visibleEdges);
      els.nodeLayer.innerHTML = visibleNodes.map(renderNode).join("");

      els.nodeLayer.querySelectorAll("[data-node]").forEach((nodeEl) => {
        nodeEl.addEventListener("click", () => {
          if (Date.now() < state.suppressClickUntil) return;
          state.selectedNodeId = nodeEl.dataset.node;
          renderBoard();
          renderInspector();
        });
        nodeEl.addEventListener("pointerdown", (event) => startNodeDrag(event, nodeEl.dataset.node));
      });
    }

    function renderEdgesOnly(nodes = filteredNodes(), edges = null) {
      const visibleIds = new Set(nodes.map((node) => node.id));
      const visibleEdges = edges || (state.graph.edges || []).filter(([from, to]) => visibleIds.has(from) && visibleIds.has(to));
      els.connectionLayer.innerHTML = visibleEdges.map((edge) => renderEdge(edge, nodes)).join("");
    }

    function filteredNodes() {
      const nodes = state.graph.nodes || [];
      if (state.filter === "shots") {
        return nodes.filter((node) => ["source", "style", "character", "frame", "prompt", "output", "deliverable"].includes(node.type));
      }
      if (state.filter === "packaging") {
        return nodes.filter((node) => ["source", "style", "packaging", "deliverable"].includes(node.type));
      }
      return nodes;
    }

    function renderEdge(edge, nodes) {
      const [fromId, toId, edgeType] = edge;
      const from = nodes.find((node) => node.id === fromId);
      const to = nodes.find((node) => node.id === toId);
      if (!from || !to) return "";
      const x1 = from.x + from.width;
      const y1 = from.y + from.height / 2;
      const x2 = to.x;
      const y2 = to.y + to.height / 2;
      const bend = Math.max(82, Math.abs(x2 - x1) * 0.34);
      const d = `M ${x1} ${y1} C ${x1 + bend} ${y1}, ${x2 - bend} ${y2}, ${x2} ${y2}`;
      const alt = edgeType === "alt" ? " alt" : "";
      return `
        <path class="edge-path${alt}" d="${d}"></path>
        <circle class="edge-dot" cx="${x1}" cy="${y1}" r="7"></circle>
        <circle class="edge-dot" cx="${x2}" cy="${y2}" r="7"></circle>
      `;
    }

    function renderNode(node) {
      const selected = node.id === state.selectedNodeId ? " selected" : "";
      const body = node.type === "frame" ? renderFrameBody(node) : renderTextBody(node);
      return `
        <article class="graph-node ${escapeHtml(node.type)}${selected}" data-node="${escapeHtml(node.id)}" style="left:${node.x}px;top:${node.y}px;width:${node.width}px;min-height:${node.height}px">
          <div class="node-head">
            <span>${escapeHtml(node.title)}</span>
            <span class="node-drag-hint">拖动</span>
            <span class="node-port">+</span>
          </div>
          ${body}
        </article>
      `;
    }

    function renderFrameBody(node) {
      const shot = node.shot || {};
      const image = node.image ? `<img src="${node.image}" alt="${escapeHtml(node.title)}">` : `<span>暂无分镜图</span>`;
      return `
        <div class="node-body">
          <div class="node-thumb">${image}</div>
          <div class="node-meta">
            ${badge(shot.duration_seconds !== undefined ? `${shot.duration_seconds} 秒` : "时长待定")}
            ${badge(shot.start || "起点待定")}
          </div>
          <div class="node-text">${escapeHtml(node.text || "")}</div>
        </div>
      `;
    }

    function renderTextBody(node) {
      return `
        <div class="node-body">
          <div class="node-meta">
            ${badge(node.subtitle || "节点")}
            ${node.type === "packaging" ? badge("旁路", "skipped") : ""}
            ${node.type === "deliverable" ? badge("最终包", "complete") : ""}
          </div>
          <div class="node-text">${escapeHtml(node.text || "")}</div>
        </div>
      `;
    }

    function renderInspector() {
      const node = (state.graph.nodes || []).find((item) => item.id === state.selectedNodeId);
      if (!node) {
        els.inspectorType.textContent = "";
        els.inspector.innerHTML = `<div class="empty">点击画布节点查看详情</div>`;
        return;
      }

      els.inspectorType.textContent = node.title;
      const meta = Object.entries(node.meta || {}).map(([key, value]) => kv(key, value)).join("");
      const promptBlocks = node.shot ? `
        <div class="detail-block">
          <h3>视频提示词</h3>
          <pre>${escapeHtml(node.shot.video_prompt || "暂无")}</pre>
        </div>
        <div class="detail-block">
          <h3>分镜图提示词</h3>
          <pre>${escapeHtml(node.shot.image_prompt || "暂无")}</pre>
        </div>
      ` : "";
      const noteKey = draftKey(node.id);
      const noteValue = localStorage.getItem(noteKey) || "";
      els.inspector.innerHTML = `
        <div class="detail-block">
          <h3>${escapeHtml(node.title)}</h3>
          ${kv("节点类型", node.type)}
          ${kv("说明", node.subtitle || "-")}
          ${meta}
        </div>
        <div class="detail-block">
          <h3>节点内容</h3>
          <pre>${escapeHtml(node.text || "暂无")}</pre>
        </div>
        ${promptBlocks}
        <div class="detail-block">
          <h3>修改草稿</h3>
          <textarea id="draftNote" placeholder="在这里记录想改的分镜、提示词或包装方向；当前只保存在浏览器本地，后续由 Codex 写回项目文件。">${escapeHtml(noteValue)}</textarea>
          <button id="saveDraftButton" class="top-button primary-button" type="button">保存草稿</button>
        </div>
      `;
      const button = document.querySelector("#saveDraftButton");
      const textarea = document.querySelector("#draftNote");
      if (button && textarea) {
        button.addEventListener("click", () => {
          localStorage.setItem(noteKey, textarea.value);
          button.textContent = "已保存";
          setTimeout(() => { button.textContent = "保存草稿"; }, 900);
        });
      }
    }

    function kv(label, value) {
      return `
        <div class="kv-row">
          <span>${escapeHtml(label)}</span>
          <span>${escapeHtml(value || "-")}</span>
        </div>
      `;
    }

    function draftKey(nodeId) {
      return `video-master-node-draft:${state.currentProject}:${nodeId}`;
    }

    function layoutKey() {
      return `video-master-node-layout:${state.currentProject}`;
    }

    function loadSavedLayout() {
      try {
        return JSON.parse(localStorage.getItem(layoutKey()) || "{}");
      } catch {
        return {};
      }
    }

    function saveNodeLayout(node) {
      if (!state.currentProject || !node) return;
      const layout = loadSavedLayout();
      layout[node.id] = { x: Math.round(node.x), y: Math.round(node.y) };
      localStorage.setItem(layoutKey(), JSON.stringify(layout));
    }

    function applySavedLayout(project, nodes) {
      if (!project?.project?.path) return;
      const previousProject = state.currentProject;
      state.currentProject = project.project.path;
      const layout = loadSavedLayout();
      state.currentProject = previousProject;
      nodes.forEach((node) => {
        const saved = layout[node.id];
        if (saved && Number.isFinite(saved.x) && Number.isFinite(saved.y)) {
          node.x = saved.x;
          node.y = saved.y;
        }
      });
    }

    function packagingStatus(project) {
      const manifest = project.deliverables?.title_packaging_manifest;
      if (manifest && Array.isArray(manifest.items) && manifest.items.length) return `${manifest.items.length} 个包装`;
      const enabled = project.title_packaging?.title_packaging_enabled;
      if (enabled === "true" || enabled === true) return "待生成包装";
      return "未启用包装";
    }

    function characterStatus(project) {
      const design = project.character_design || {};
      const enabled = design.character_lock_enabled === "true" || design.character_lock_enabled === true;
      const status = String(design.character_lock_status || "").toLowerCase();
      if (status === "confirmed") return "形象已锁定";
      if (enabled || design.fixed_characters || ["required", "pending", "assumed"].includes(status)) return "待锁定人物";
      return "无固定人物";
    }

    function tPolicy(value) {
      const map = {
        ask_only_blockers: "只问阻塞点",
        confirm_each_phase: "逐阶段确认",
        auto_fill_with_log: "自动补全并记录",
        require_user_confirmation: "需要用户确认",
      };
      return map[value] || value || "未设置";
    }

    function tVideoMode(value) {
      const map = {
        "fast-paced-tvc": "快节奏广告",
        "product-promo": "产品宣传",
        "story-short": "故事短片",
        tutorial: "教程讲解",
        animation: "动画",
        "brand-film": "品牌片",
      };
      return map[value] || value || "影片类型待定";
    }

    function tStyle(value) {
      const map = {
        imax_70mm_realism: "IMAX 写实",
        photoreal_commercial: "商业写实",
        eastern_fantasy_3d: "东方幻想 3D",
        hyperreal_3d_render: "超写实 3D",
        graphic_2d_editorial: "图漫 2D",
        soft_storybook_2d: "日漫 2D",
        anime_cinematic_light: "动画电影感",
        noir_gothic: "暗黑哥特",
        future_tech_clean: "未来科技",
        custom: "自定义",
      };
      return map[value] || value || "待定";
    }

    function setFilter(filter) {
      state.filter = filter;
      renderBoard();
    }

    function setZoom(value) {
      state.zoom = Math.max(0.35, Math.min(2.2, value));
      renderBoard();
    }

    function setZoomAt(value, clientX, clientY) {
      const oldZoom = state.zoom;
      const nextZoom = Math.max(0.35, Math.min(2.2, value));
      if (Math.abs(nextZoom - oldZoom) < 0.001) return;
      const rect = els.viewport.getBoundingClientRect();
      const localX = clientX - rect.left;
      const localY = clientY - rect.top;
      const worldX = (els.viewport.scrollLeft + localX) / oldZoom;
      const worldY = (els.viewport.scrollTop + localY) / oldZoom;
      state.zoom = nextZoom;
      renderBoard();
      els.viewport.scrollLeft = worldX * nextZoom - localX;
      els.viewport.scrollTop = worldY * nextZoom - localY;
    }

    function fitCanvas() {
      state.zoom = 0.82;
      renderBoard();
      els.viewport.scrollTo({ left: 0, top: 0, behavior: "smooth" });
    }

    function isInteractiveTarget(target) {
      return Boolean(target.closest("button, input, textarea, select, a"));
    }

    function startCanvasPan(event) {
      if (event.button !== 0 || event.target.closest(".graph-node") || isInteractiveTarget(event.target)) return;
      event.preventDefault();
      state.pan = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        scrollLeft: els.viewport.scrollLeft,
        scrollTop: els.viewport.scrollTop,
      };
      els.viewport.classList.add("panning");
      els.viewport.setPointerCapture(event.pointerId);
    }

    function moveCanvasPan(event) {
      if (!state.pan || event.pointerId !== state.pan.pointerId) return;
      event.preventDefault();
      els.viewport.scrollLeft = state.pan.scrollLeft - (event.clientX - state.pan.startX);
      els.viewport.scrollTop = state.pan.scrollTop - (event.clientY - state.pan.startY);
    }

    function endCanvasPan(event) {
      if (!state.pan || event.pointerId !== state.pan.pointerId) return;
      state.pan = null;
      els.viewport.classList.remove("panning");
      if (els.viewport.hasPointerCapture(event.pointerId)) {
        els.viewport.releasePointerCapture(event.pointerId);
      }
    }

    function startNodeDrag(event, nodeId) {
      if (event.button !== 0 || isInteractiveTarget(event.target)) return;
      const node = (state.graph.nodes || []).find((item) => item.id === nodeId);
      if (!node) return;
      event.preventDefault();
      event.stopPropagation();
      state.selectedNodeId = nodeId;
      state.nodeDrag = {
        pointerId: event.pointerId,
        nodeId,
        startX: event.clientX,
        startY: event.clientY,
        originalX: node.x,
        originalY: node.y,
        moved: false,
      };
      event.currentTarget.classList.add("dragging");
      event.currentTarget.setPointerCapture(event.pointerId);
      renderInspector();
    }

    function moveNodeDrag(event) {
      if (!state.nodeDrag || event.pointerId !== state.nodeDrag.pointerId) return;
      event.preventDefault();
      const node = (state.graph.nodes || []).find((item) => item.id === state.nodeDrag.nodeId);
      if (!node) return;
      const dx = (event.clientX - state.nodeDrag.startX) / state.zoom;
      const dy = (event.clientY - state.nodeDrag.startY) / state.zoom;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) state.nodeDrag.moved = true;
      node.x = Math.max(0, state.nodeDrag.originalX + dx);
      node.y = Math.max(0, state.nodeDrag.originalY + dy);
      const nodeEl = findNodeElement(node.id);
      if (nodeEl) {
        nodeEl.style.left = `${node.x}px`;
        nodeEl.style.top = `${node.y}px`;
      }
      renderEdgesOnly();
    }

    function endNodeDrag(event) {
      if (!state.nodeDrag || event.pointerId !== state.nodeDrag.pointerId) return;
      const node = (state.graph.nodes || []).find((item) => item.id === state.nodeDrag.nodeId);
      const moved = state.nodeDrag.moved;
      const nodeEl = findNodeElement(state.nodeDrag.nodeId);
      if (nodeEl) {
        nodeEl.classList.remove("dragging");
        if (nodeEl.hasPointerCapture(event.pointerId)) {
          nodeEl.releasePointerCapture(event.pointerId);
        }
      }
      state.nodeDrag = null;
      if (node) saveNodeLayout(node);
      if (moved) state.suppressClickUntil = Date.now() + 250;
      renderBoard();
      renderInspector();
    }

    function findNodeElement(nodeId) {
      return Array.from(els.nodeLayer.querySelectorAll("[data-node]")).find((item) => item.dataset.node === nodeId);
    }

    function updatePanelVisibility() {
      const app = document.querySelector(".app");
      app.classList.toggle("side-hidden", state.sideHidden);
      app.classList.toggle("inspector-hidden", state.inspectorHidden);
      els.toggleSideButton.textContent = state.sideHidden ? "显示项目库" : "隐藏项目库";
      els.toggleInspectorButton.textContent = state.inspectorHidden ? "显示检查器" : "隐藏检查器";
      els.toggleSideButton.setAttribute("aria-pressed", String(state.sideHidden));
      els.toggleInspectorButton.setAttribute("aria-pressed", String(state.inspectorHidden));
      setTimeout(renderBoard, 0);
    }

    function showError(error) {
      els.serverState.textContent = "服务异常";
      els.inspectorType.textContent = "错误";
      els.inspector.innerHTML = `<div class="empty error">${escapeHtml(error.message || error)}</div>`;
    }

    els.refreshButton.addEventListener("click", () => loadProjects(false).catch(showError));
    els.reloadCanvasButton.addEventListener("click", () => loadProjects(false).catch(showError));
    els.enterWorkbenchButton.addEventListener("click", hideIntro);
    els.pickProjectButton.addEventListener("click", () => {
      state.sideHidden = false;
      updatePanelVisibility();
      hideIntro();
    });
    els.showIntroButton.addEventListener("click", showIntro);
    els.introVideo.addEventListener("error", () => {
      showIntroFallback();
    });
    els.fitButton.addEventListener("click", fitCanvas);
    els.toggleSideButton.addEventListener("click", () => {
      state.sideHidden = !state.sideHidden;
      updatePanelVisibility();
    });
    els.toggleInspectorButton.addEventListener("click", () => {
      state.inspectorHidden = !state.inspectorHidden;
      updatePanelVisibility();
    });
    els.zoomInButton.addEventListener("click", () => setZoom(state.zoom + 0.1));
    els.zoomOutButton.addEventListener("click", () => setZoom(state.zoom - 0.1));
    els.resetZoomButton.addEventListener("click", () => setZoom(1));
    els.showAllButton.addEventListener("click", () => setFilter("all"));
    els.showShotsButton.addEventListener("click", () => setFilter("shots"));
    els.showPackagingButton.addEventListener("click", () => setFilter("packaging"));
    els.rootInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") loadProjects(true).catch(showError);
    });
    els.writeStateButton.addEventListener("click", () => {
      if (!state.currentProject) return;
      loadProject(state.currentProject, true).catch(showError);
    });
    els.viewport.addEventListener("pointerdown", startCanvasPan);
    els.viewport.addEventListener("pointermove", moveCanvasPan);
    els.viewport.addEventListener("pointerup", endCanvasPan);
    els.viewport.addEventListener("pointercancel", endCanvasPan);
    els.viewport.addEventListener("wheel", (event) => {
      if (isInteractiveTarget(event.target)) return;
      event.preventDefault();
      const delta = event.deltaY > 0 ? -0.08 : 0.08;
      setZoomAt(state.zoom + delta, event.clientX, event.clientY);
    }, { passive: false });
    window.addEventListener("pointermove", moveNodeDrag);
    window.addEventListener("pointerup", endNodeDrag);
    window.addEventListener("pointercancel", endNodeDrag);
    if (sessionStorage.getItem("video-master-intro-seen") === "1") {
      els.intro.classList.add("hidden");
    }
    updatePanelVisibility();

    loadProjects(true).catch(showError);
  </script>
</body>
</html>
